<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>間取りすと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#f5f0e8;
  --warm:#e8ddd0;
  --brown:#5a4a3a;
  --brown-light:#8a7060;
  --brown-dark:#3a2a1a;
  --accent:#c8a060;
  --accent-light:#e8c880;
  --green:#6a8a50;
  --blue:#5080a8;
}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}

/* ── ① スタート ── */
#screen-start{background:var(--cream);position:relative;overflow:hidden;}
#screen-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,160,96,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 20%,rgba(106,138,80,.08) 0%,transparent 60%);pointer-events:none;}
.logo-wrap{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(90,74,58,.15));}
.logo-title{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);letter-spacing:.15em;line-height:1;}
.logo-sub{font-size:12px;color:var(--brown-light);letter-spacing:.3em;margin-top:8px;}
.btn-start{display:block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;letter-spacing:.2em;padding:22px 80px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(58,42,26,.25);animation:fadeUp .8s .2s ease both;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(58,42,26,.32);}
.btn-start:hover::after{background:rgba(255,255,255,.06);}
.btn-start:active{transform:translateY(0);}
.start-sub-btns{display:flex;gap:24px;margin-top:36px;animation:fadeUp .8s .4s ease both;}
.btn-sub{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);font-size:12px;letter-spacing:.15em;padding:10px 24px;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-sub:hover{border-color:var(--brown-light);color:var(--brown);background:rgba(90,74,58,.05);}

/* ── ② ゲーム画面 ── */
#screen-game{justify-content:flex-start;align-items:stretch;padding:0;position:relative;background:var(--cream);overflow:hidden;width:100%;min-height:100vh;}
#game-container{display:flex;justify-content:center;align-items:center;flex:1;}
#game-container canvas{display:block;margin:0 auto;}

/* 上部NEXT/HOLDバー */
#game-top-bar{
  display:none;background:rgba(245,240,232,.97);border-bottom:1px solid rgba(90,74,58,.12);
  padding:8px 12px 8px 12px;align-items:center;gap:8px;flex-shrink:0;
  position:relative;z-index:30;
}
#game-top-bar.active{display:flex;}
.next-hold-wrap{display:flex;gap:8px;flex:1;align-items:center;}
.piece-preview-box{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:#fff;border:1px solid rgba(90,74,58,.15);border-radius:8px;
  padding:6px 10px;min-width:64px;
}
.piece-preview-box.hold-box{border-color:var(--accent);background:rgba(200,160,96,.06);}
.piece-preview-label{font-size:9px;letter-spacing:.1em;color:var(--brown-light);font-weight:500;}
.piece-preview-canvas{display:block;}
.piece-name-text{font-size:9px;color:var(--brown);margin-top:1px;text-align:center;}
.part-count-badge{
  font-size:10px;color:var(--brown-light);letter-spacing:.05em;
  background:rgba(90,74,58,.06);border-radius:20px;padding:3px 10px;flex-shrink:0;
  border:1px solid rgba(90,74,58,.12);
}

/* ゲーム下部ボタンバー */
#game-bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  display:none;
  background:rgba(245,240,232,.97);
  border-top:1px solid rgba(90,74,58,.12);
  backdrop-filter:blur(8px);
  z-index:50;
  padding:10px 16px 16px;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
#game-bottom-bar.active{display:flex;}
.btn-op{
  background:#fff;border:1.5px solid rgba(90,74,58,.25);color:var(--brown);
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.08em;
  padding:12px 0;border-radius:12px;cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.btn-op:active{background:rgba(90,74,58,.08);transform:scale(.96);}
.btn-op .op-icon{font-size:22px;line-height:1;}
.btn-op .op-label{font-size:10px;color:var(--brown-light);letter-spacing:.08em;}
.btn-op.btn-rotate-r{background:var(--brown-dark);border-color:var(--brown-dark);color:#f5f0e8;flex:1.4;}
.btn-op.btn-rotate-r .op-label{color:rgba(245,240,232,.7);}
.btn-op.btn-hold-action{background:rgba(200,160,96,.15);border-color:var(--accent);color:var(--brown-dark);flex:1.2;}
.btn-op-sep{width:1px;height:40px;background:rgba(90,74,58,.1);flex-shrink:0;}
/* PC向けヒントバー（スマホでは非表示） */
.hint-text{font-size:10px;color:var(--brown-light);letter-spacing:.08em;line-height:1.7;flex:1;}
.game-nav-btns{display:flex;gap:8px;flex-shrink:0;}
.btn-game{
  background:none;border:1px solid rgba(90,74,58,.25);color:var(--brown-light);
  font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:.12em;
  padding:8px 14px;border-radius:3px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-game:hover{border-color:var(--brown);color:var(--brown);background:rgba(90,74,58,.05);}
@media(max-width:600px){.hint-text{display:none;}.game-nav-btns{flex-direction:column;gap:4px;}}

/* 完成ボタン */
#btn-complete-overlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:auto;}
#btn-complete-overlay.visible{display:block;}
#btn-complete-overlay button{
  background:rgba(58,42,26,.92);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:.2em;
  padding:20px 56px;border:2px solid rgba(200,160,96,.6);border-radius:6px;
  cursor:pointer;animation:gentlePulse 2s ease-in-out infinite;backdrop-filter:blur(4px);
}
#btn-complete-overlay button:hover{background:rgba(58,42,26,1);animation:none;transform:scale(1.04);transition:transform .15s;}

/* ── ③ ルーレット ── */
#screen-roulette{background:rgba(245,240,232,0.82);}
.roulette-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--brown-dark);letter-spacing:.15em;margin-bottom:28px;text-align:center;}
.roulette-item{width:340px;background:#fff;border:1.5px solid rgba(90,74,58,.15);border-radius:10px;padding:20px 24px 20px 24px;margin-bottom:18px;cursor:pointer;transition:all .25s;position:relative;overflow:visible;opacity:.45;pointer-events:none;}
.roulette-item.active-slot{opacity:1;pointer-events:auto;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,160,96,.25),0 6px 24px rgba(90,74,58,.12);animation:slotPulse 1.4s ease-in-out infinite;}
.roulette-item.locked{opacity:1;pointer-events:none;border-color:rgba(90,74,58,.2);box-shadow:none;animation:none;cursor:default;background:linear-gradient(135deg,#fffbf5,#fff8ec);}
/* locked でも再抽選ボタンだけは押せるようにする */
.roulette-item.locked .reroll-slot-btn{pointer-events:auto;}
.roulette-item-label{font-size:14px;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:6px;font-weight:700;text-align:center;}
.roulette-item-value{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);transition:all .1s;line-height:1.1;text-align:center;display:block;}
.roulette-item-value.spinning{animation:spin .08s linear infinite;color:var(--brown-light);}
/* レア値：金色グロー */
.roulette-item.rare .roulette-item-value{
  background:linear-gradient(135deg,#c8860a,#f5c842,#e8a020,#f5c842);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShine 2s linear infinite;
  filter:drop-shadow(0 0 6px rgba(200,160,10,.5));
  font-size:44px;
}
@keyframes goldShine{0%{background-position:0% center}100%{background-position:200% center}}
.roulette-item.rare{border-color:#c8a020;background:linear-gradient(135deg,#fffbec,#fff8d6);}
.roulette-item.rare::before{content:'✦ PREMIUM';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:.2em;color:#c8860a;background:#fff8d6;padding:2px 10px;border-radius:20px;border:1px solid #e8c040;white-space:nowrap;}
/* tap-hint */
.roulette-item .tap-hint{display:block;font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;font-weight:500;letter-spacing:.05em;text-align:center;margin-top:4px;}
.roulette-item.active-slot .tap-hint{opacity:1;}
.roulette-item.locked .tap-hint{display:none;}
.roulette-item.locked::after{content:'✓ 確定';position:absolute;top:12px;right:14px;font-size:11px;color:var(--brown-light);letter-spacing:.1em;}
.roulette-item.rare.locked::after{color:#c8860a;}
.roulette-item.active-slot:hover{transform:translateX(4px);}
/* 各スロット個別の再抽選ボタン */
.reroll-slot-btn{
  position:absolute;right:-16px;bottom:-16px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.08em;
  padding:10px 20px;border-radius:24px;border:none;cursor:pointer;
  white-space:nowrap;box-shadow:0 3px 10px rgba(58,42,26,.35);
  transition:all .2s;display:none;z-index:20;pointer-events:auto;
}
.reroll-slot-btn.visible{display:block;}
.reroll-slot-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(58,42,26,.45);}
.reroll-slot-btn.used{background:rgba(90,74,58,.25);color:var(--brown-light);cursor:not-allowed;box-shadow:none;}
.reroll-slot-btn.used:hover{transform:none;box-shadow:none;}
@keyframes slotPulse{0%,100%{box-shadow:0 0 0 3px rgba(200,160,96,.25),0 6px 24px rgba(90,74,58,.12);}50%{box-shadow:0 0 0 5px rgba(200,160,96,.4),0 8px 28px rgba(90,74,58,.18);}}
.btn-roulette-next{margin-top:32px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;padding:16px 56px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;}
.btn-roulette-next.visible{opacity:1;pointer-events:auto;}
.btn-roulette-next:hover{transform:translateY(-2px);}

/* ── ④ 結果 ── */
#screen-result{background:rgba(245,240,232,0.82);}
.result-wrap{text-align:center;max-width:400px;width:100%;}
.result-title{font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.3em;color:var(--brown-light);margin-bottom:24px;}
.result-property-card{background:#fff;border:1px solid rgba(90,74,58,.12);border-radius:12px;padding:28px 32px;margin-bottom:28px;box-shadow:0 4px 20px rgba(90,74,58,.08);}
.result-property-name{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--brown-light);letter-spacing:.2em;margin-bottom:4px;}
.result-stats{display:flex;justify-content:center;gap:24px;margin-top:16px;}
.result-stat{text-align:center;}
.result-stat-label{font-size:10px;color:var(--brown-light);letter-spacing:.15em;margin-bottom:4px;}
.result-stat-value{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--brown-dark);}
.result-stat-unit{font-size:11px;color:var(--brown-light);margin-left:2px;}
.result-divider{border:none;border-top:1px solid rgba(90,74,58,.1);margin:24px 0;}
.result-title-section{margin-bottom:28px;}
.result-title-label{font-size:11px;letter-spacing:.25em;color:var(--brown-light);margin-bottom:12px;}
.result-title-badge{display:inline-block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:18px;letter-spacing:.15em;padding:10px 32px;border-radius:4px;}
.result-title-badge.new::before{content:'NEW！ ';font-size:11px;color:var(--accent-light);vertical-align:middle;}
.result-comment{font-size:13px;color:var(--brown);line-height:1.8;margin-bottom:24px;min-height:44px;}
.result-btns{display:flex;gap:16px;justify-content:center;margin-top:8px;}
.btn-result{flex:1;max-width:160px;padding:14px 0;border-radius:4px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.15em;cursor:pointer;transition:all .2s;border:none;}
.btn-result.primary{background:var(--brown-dark);color:#f5f0e8;}
.btn-result.secondary{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);}
.btn-result:hover{transform:translateY(-2px);}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--cream);border-radius:12px;padding:32px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--brown-dark);margin-bottom:20px;letter-spacing:.1em;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;margin-top:-4px;}
.modal-empty{font-size:13px;color:var(--brown-light);text-align:center;padding:24px 0;line-height:2;}

/* ── 間取り背景 ── */
.madori-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .6s ease;}
.madori-bg.visible{opacity:1;}
.madori-bg canvas{max-width:80vw;max-height:80vh;opacity:.18;filter:blur(1px) sepia(.2);border-radius:8px;}
#screen-roulette,#screen-result{position:relative;z-index:1;background:transparent!important;}

/* ── アニメーション ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
@keyframes gentlePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,160,96,0);}50%{opacity:.75;box-shadow:0 0 20px 6px rgba(200,160,96,.25);}}
.pop-in{animation:popIn .4s ease both;}
.res-titles-new{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0 4px;}
.res-title-new-badge{display:inline-flex;align-items:center;gap:6px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.12em;padding:10px 20px;border-radius:4px;animation:popIn .4s ease both;}
.res-title-new-label{font-size:10px;color:var(--accent-light);letter-spacing:.1em;background:rgba(255,255,255,.15);padding:2px 6px;border-radius:2px;}
.res-titles-all{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
.res-title-old-badge{display:inline-block;background:rgba(90,74,58,.08);color:var(--brown-light);font-size:12px;letter-spacing:.1em;padding:6px 14px;border-radius:3px;border:1px solid rgba(90,74,58,.15);}
</style>
</head>
<body>

<!-- ① スタート -->
<div id="screen-start" class="screen active">
  <div class="logo-wrap">
    <span class="logo-icon">🏠</span>
    <div class="logo-title">間取りすと</div>
    <div class="logo-sub">MADORI-ST</div>
  </div>
  <div id="name-input-wrap" style="margin-bottom:28px;text-align:center;animation:fadeUp .8s .15s ease both;">
    <div style="font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:8px;">マドリスト名</div>
    <input id="player-name-input" type="text" maxlength="12" placeholder="名前を入力（任意）"
      style="background:#fff;border:1px solid rgba(90,74,58,.25);border-radius:4px;padding:10px 18px;font-size:15px;color:var(--brown-dark);font-family:'Noto Serif JP',serif;letter-spacing:.1em;outline:none;width:240px;text-align:center;"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(90,74,58,.25)'">
  </div>
  <button class="btn-start" onclick="gotoGame()">は じ め る</button>
  <div class="start-sub-btns">
    <button class="btn-sub" onclick="openModal('saves')">間取り保存一覧</button>
    <button class="btn-sub" onclick="openModal('titles')">称号一覧</button>
  </div>
</div>

<!-- ② ゲーム -->
<div id="screen-game" class="screen">
  <!-- 上部 NEXT / HOLD バー -->
  <div id="game-top-bar">
    <div class="next-hold-wrap">
      <!-- 2個後 -->
      <div class="piece-preview-box" id="preview-next2">
        <div class="piece-preview-label">NEXT2</div>
        <canvas class="piece-preview-canvas" id="canvas-next2" width="40" height="40"></canvas>
        <div class="piece-name-text" id="name-next2">---</div>
      </div>
      <!-- 1個後 -->
      <div class="piece-preview-box" id="preview-next1">
        <div class="piece-preview-label">NEXT</div>
        <canvas class="piece-preview-canvas" id="canvas-next1" width="40" height="40"></canvas>
        <div class="piece-name-text" id="name-next1">---</div>
      </div>
      <!-- HOLD -->
      <div class="piece-preview-box hold-box" id="preview-hold">
        <div class="piece-preview-label">HOLD</div>
        <canvas class="piece-preview-canvas" id="canvas-hold" width="40" height="40"></canvas>
        <div class="piece-name-text" id="name-hold">なし</div>
      </div>
    </div>
    <!-- 配置数 -->
    <div class="part-count-badge" id="part-count-badge">0個</div>
  </div>

  <div id="game-container"></div>
  <div id="btn-complete-overlay">
    <button onclick="onCompleteBtn()">完　成</button>
  </div>
</div>

<!-- ゲーム下部ボタンバー -->
<div id="game-bottom-bar">
  <!-- 左：戻す -->
  <button class="btn-op" id="btn-undo" onclick="if(gameScene)gameScene.doUndo()">
    <span class="op-icon">↩</span>
    <span class="op-label">戻す</span>
  </button>
  <div class="btn-op-sep"></div>
  <!-- 中：左回転 -->
  <button class="btn-op" onclick="if(gameScene)gameScene.rotatePiece(-1)">
    <span class="op-icon">↺</span>
    <span class="op-label">左回転</span>
  </button>
  <!-- 中右：右回転（大きめ・右手優遇） -->
  <button class="btn-op btn-rotate-r" onclick="if(gameScene)gameScene.rotatePiece(1)">
    <span class="op-icon">↻</span>
    <span class="op-label">右回転</span>
  </button>
  <div class="btn-op-sep"></div>
  <!-- 右：HOLD -->
  <button class="btn-op btn-hold-action" onclick="if(gameScene)gameScene.doHold()">
    <span class="op-icon">⏸</span>
    <span class="op-label">ホールド</span>
  </button>
  <!-- 右端：リトライ・スタート -->
  <div class="btn-op-sep"></div>
  <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
    <button class="btn-game" onclick="gotoGame()">リトライ</button>
    <button class="btn-game" onclick="gotoStart()">スタートへ</button>
  </div>
</div>

<!-- 間取り背景 -->
<div class="madori-bg" id="madori-bg"></div>

<!-- ③ ルーレット -->
<div id="screen-roulette" class="screen">
  <div class="roulette-title">物件情報を引いてみよう</div>
  <div class="roulette-item" id="rou-0" onclick="lockRoulette(0)">
    <div class="roulette-item-label">築 年 数</div>
    <div class="roulette-item-value" id="rou-val-0">---</div>
    <span class="tap-hint">タップで確定</span>
    <button class="reroll-slot-btn" id="reroll-btn-0" onclick="event.stopPropagation();doRerollSlot(0)">🎲 再抽選</button>
  </div>
  <div class="roulette-item" id="rou-1" onclick="lockRoulette(1)">
    <div class="roulette-item-label">駅 徒 歩</div>
    <div class="roulette-item-value" id="rou-val-1">---</div>
    <span class="tap-hint">タップで確定</span>
    <button class="reroll-slot-btn" id="reroll-btn-1" onclick="event.stopPropagation();doRerollSlot(1)">🎲 再抽選</button>
  </div>
  <div class="roulette-item" id="rou-2" onclick="lockRoulette(2)">
    <div class="roulette-item-label">家 賃</div>
    <div class="roulette-item-value" id="rou-val-2">---</div>
    <span class="tap-hint">タップで確定</span>
    <button class="reroll-slot-btn" id="reroll-btn-2" onclick="event.stopPropagation();doRerollSlot(2)">🎲 再抽選</button>
  </div>
  <button class="btn-roulette-next" id="btn-rou-next" onclick="gotoResult()">物 件 完 成 →</button>
</div>

<!-- ④ 結果 -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="result-title">間 取 り 結 果</div>
    <div id="res-player-name" style="font-size:12px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:12px;margin-top:-16px;display:none;text-align:center;"></div>

    <!-- ① 物件詳細カード -->
    <div class="result-property-card pop-in">
      <div class="result-property-name" id="res-room-label">---</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-label">築年数</div>
          <div class="result-stat-value" id="res-age">--<span class="result-stat-unit">年</span></div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">駅徒歩</div>
          <div class="result-stat-value" id="res-walk">--<span class="result-stat-unit">分</span></div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">家賃</div>
          <div class="result-stat-value" id="res-rent">--<span class="result-stat-unit">万円</span></div>
        </div>
      </div>

      <button class="btn-result secondary" onclick="saveMadori()">💾 保 存</button>
      <button class="btn-result secondary" onclick="gotoStart()">戻 る</button>
    </div>
    <div id="save-toast" style="display:none;margin-top:12px;font-size:12px;color:var(--green);letter-spacing:.1em;text-align:center;">✓ 保存しました</div>

<script>
// ────────────────────────────────────────
// 画面管理
// ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar=document.getElementById('game-bottom-bar');
  const topBar=document.getElementById('game-top-bar');
  if(id==='screen-game'){
    bar.classList.add('active');
    if(topBar) topBar.classList.add('active');
  }else{
    bar.classList.remove('active');
    if(topBar) topBar.classList.remove('active');
  }
}

let madoriSnapshot=null;
function captureMadoriSnapshot(){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas)return;
  const clone=document.createElement('canvas');
  clone.width=canvas.width; clone.height=canvas.height;
  clone.getContext('2d').drawImage(canvas,0,0);
  madoriSnapshot=clone;
}
function showMadoriBg(visible){
  const bg=document.getElementById('madori-bg');
  if(visible&&madoriSnapshot){
    bg.innerHTML='';
    const c=document.createElement('canvas');
    c.width=madoriSnapshot.width; c.height=madoriSnapshot.height;
    c.getContext('2d').drawImage(madoriSnapshot,0,0);
    bg.appendChild(c);
    requestAnimationFrame(()=>bg.classList.add('visible'));
  }else{
    bg.classList.remove('visible');
    setTimeout(()=>{bg.innerHTML='';},600);
  }
}

let gameStarted=false;
let gameScene=null;

function gotoStart(){
  showMadoriBg(false);
  showScreen('screen-start');
}

// ────────────────────────────────────────
// 再抽選（各スロット1日1回）
// ────────────────────────────────────────
// レア判定
const RARE_COND=[
  v=>v<=5,    // 築年数5以下
  v=>v<=5,    // 駅徒歩5以下
  v=>v<=9,    // 家賃1桁（9以下）
];
function isRare(idx,val){return RARE_COND[idx](val);}

function getRerollKey(idx){return 'madori-reroll-'+idx+'-date';}
function isRerollUsed(idx){return localStorage.getItem(getRerollKey(idx))===new Date().toDateString();}
function markRerollUsed(idx){localStorage.setItem(getRerollKey(idx),new Date().toDateString());}

function updateRerollBtnSlot(idx){
  const btn=document.getElementById('reroll-btn-'+idx);
  if(!btn)return;
  if(isRerollUsed(idx)){
    btn.classList.add('used');
    btn.textContent='使用済み';
  }else{
    btn.classList.remove('used');
    btn.textContent='🎲 再抽選';
  }
}

function doRerollSlot(idx){
  if(isRerollUsed(idx))return;
  markRerollUsed(idx);
  // スピン開始
  const valEl=document.getElementById('rou-val-'+idx);
  const item=document.getElementById('rou-'+idx);
  item.classList.remove('rare');
  valEl.classList.add('spinning');
  const pool=ROULETTE_POOLS[rouletteKeys[idx]];
  // 500msスピンして確定
  const spinInterval=setInterval(()=>{
    valEl.textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
  },80);
  setTimeout(()=>{
    clearInterval(spinInterval);
    const val=pool[Math.floor(Math.random()*pool.length)];
    rouletteValues[idx]=val;
    valEl.textContent=val+rouletteUnits[idx];
    valEl.classList.remove('spinning');
    if(isRare(idx,val)) item.classList.add('rare');
    updateRerollBtnSlot(idx);
  },500);
  updateRerollBtnSlot(idx);
}

// 旧doReroll（互換用・呼ばれないが念のため）
function doReroll(){}

// ────────────────────────────────────────
// 間取り保存（最大10件）
// ────────────────────────────────────────
function saveMadori(){
  const data=window._lastResult;
  if(!data){alert('まだ結果がありません');return;}
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  list.unshift({...data,id:Date.now()});
  if(list.length>10)list.splice(10);
  localStorage.setItem('madori-saves',JSON.stringify(list));
  const toast=document.getElementById('save-toast');
  if(toast){toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2000);}
}
function gotoGame(){
  // マドリスト名を保存
  const inp=document.getElementById('player-name-input');
  if(inp) window._playerName=inp.value.trim()||'';
  showMadoriBg(false);
  showScreen('screen-game');
  document.getElementById('btn-complete-overlay').classList.remove('visible');
  if(!gameStarted){
    gameStarted=true;
    setTimeout(()=>startPhaserGame(),50);
  }else if(gameScene){
    gameScene.scene.restart();
  }
}
function onCompleteBtn(){
  if(!gameScene)return;
  // プレビュー（赤いパーツ表示）を消す
  gameScene.stopPreviewTween();
  if(gameScene.previewImg){gameScene.previewImg.destroy();gameScene.previewImg=null;}
  gameScene.previewGfx.clear();
  // 収納を描画してスナップショット
  gameScene.fillEmptyAsStorage();
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      captureMadoriSnapshot();
      showMadoriBg(true);
      showScreen('screen-roulette');
      startRoulette();
    });
  });
}
function gotoResult(){
  showMadoriBg(true);
  showScreen('screen-result');
  showResult();
}

// ────────────────────────────────────────
// モーダル
// ────────────────────────────────────────
function openModal(type){
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  if(type==='saves'){
    title.textContent='間取り保存一覧';
    const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
    if(list.length===0){
      body.innerHTML='<div class="modal-empty">保存された間取りはありません。<br>ゲームプレイ後に「💾 保存」ボタンで保存できます。</div>';
    }else{
      body.innerHTML=list.map(s=>`
        <div style="padding:12px 0;border-bottom:1px solid rgba(90,74,58,.1);">
          <div style="font-family:'Noto Serif JP',serif;font-size:15px;color:var(--brown-dark);font-weight:700;">${s.labelRaw||s.label||'--'}</div>
          <div style="font-size:11px;color:var(--brown-light);margin-top:3px;letter-spacing:.05em;">${s.name} ／ 築${s.age}年 駅${s.walk}分 ${s.rent}万円 ／ ${s.date}</div>
          <div style="font-size:11px;color:var(--brown-light);margin-top:2px;">${(s.titles||[]).join('・')}</div>
        </div>`).join('');
    }
  }else{
    const titles=JSON.parse(localStorage.getItem('madori-titles')||'[]');
    title.textContent='称号一覧';
    body.innerHTML=titles.length===0
      ?'<div class="modal-empty">まだ称号がありません。<br>プレイして称号を獲得しよう！</div>'
      :titles.map(t=>`<div style="padding:10px 0;border-bottom:1px solid rgba(90,74,58,.1);font-family:'Noto Serif JP',serif;color:var(--brown-dark)">${t}</div>`).join('');
  }
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('active');
}

// ────────────────────────────────────────
// ルーレット
// ────────────────────────────────────────
const ROULETTE_POOLS={
  age:[0,1,2,3,4,5,10,15,20,25,30,35,40,45,50],
  walk:[1,2,3,4,5,7,10,12,15,20,30,40,50],
  rent:[4,5,6,7,8,9,10,12,15,18,20,25,30,35,40,50,75,100]
};
const rouletteKeys=['age','walk','rent'];
const rouletteLocked=[false,false,false];
const rouletteValues=[null,null,null];
const rouletteUnits=['年','分','万円'];
let rouletteIntervals=[null,null,null];
let lockedCount=0;
function startRoulette(){
  lockedCount=0;
  for(let i=0;i<3;i++){
    rouletteLocked[i]=false; rouletteValues[i]=null;
    document.getElementById('rou-'+i).classList.remove('locked','active-slot','rare');
    document.getElementById('rou-val-'+i).classList.add('spinning');
    const rb=document.getElementById('reroll-btn-'+i);
    if(rb) rb.classList.remove('visible');
  }
  // 最初は0番目だけアクティブ
  document.getElementById('rou-0').classList.add('active-slot');
  document.getElementById('btn-rou-next').classList.remove('visible');
  for(let i=0;i<3;i++){
    if(rouletteIntervals[i])clearInterval(rouletteIntervals[i]);
    (idx=>{
      rouletteIntervals[idx]=setInterval(()=>{
        const pool=ROULETTE_POOLS[rouletteKeys[idx]];
        document.getElementById('rou-val-'+idx).textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
      },80);
    })(i);
  }
}
function lockRoulette(idx){
  if(rouletteLocked[idx])return;
  for(let i=0;i<idx;i++)if(!rouletteLocked[i])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  // レア演出
  if(isRare(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 個別再抽選ボタン表示
  const rb=document.getElementById('reroll-btn-'+idx);
  if(rb){rb.classList.add('visible');updateRerollBtnSlot(idx);}
  // 次のスロットをアクティブに
  if(idx+1<3) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  if(++lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
  }
}

// ────────────────────────────────────────
// 称号・結果
// ────────────────────────────────────────
function generateTitles(age,walk,rent,roomTypes){
  // 複数称号を返す（条件に合うものを全部）
  const has=t=>roomTypes.has(t);
  const earned=[];
  if(age<=5&&walk<=5&&rent<=8) earned.push({title:'掘り出し物件の達人',comment:'新しくて駅近で安い！夢の物件を作り上げました。'});
  if(age>=40) earned.push({title:'レトロ愛好家',comment:'年季の入った物件に味わいを感じる間取りすとです。'});
  if(walk<=3) earned.push({title:'駅前派',comment:'徒歩3分以内！毎日の通勤が楽になりそうです。'});
  if(walk>=30) earned.push({title:'静寂の探求者',comment:'駅から離れた場所での静かな暮らし。'});
  if(rent>=50) earned.push({title:'高級志向',comment:'上質な暮らしを追求した間取りです。'});
  if(rent<=6&&walk<=10) earned.push({title:'コスパ王',comment:'リーズナブルな家賃で駅近を確保。'});
  if(has('washitsu')&&has('youshitsu')) earned.push({title:'和洋折衷の使い手',comment:'和室と洋室を組み合わせたセンス溢れる間取り。'});
  if(has('wic')) earned.push({title:'収納マニア',comment:'WICを完備！整理整頓が行き届いた暮らし。'});
  if(has('balcony')) earned.push({title:'採光重視派',comment:'バルコニーで光と風を取り込む間取りです。'});
  if(!has('bath')&&!has('toilet')) earned.push({title:'謎の間取りすと',comment:'お風呂もトイレもない…独自の美学の間取りすとです。'});
  if(earned.length===0) earned.push({title:'間取りすと見習い',comment:'はじめての一歩！経験を積んで素敵な間取りを目指そう。'});
  return earned;
}
function generateTitle(age,walk,rent,roomTypes){
  return generateTitles(age,walk,rent,roomTypes)[0];
}
function countRoomLabel(roomTypes,counts){
  // 部屋数：洋室と和室のみ
  const rooms=(counts['youshitsu']||0)+(counts['washitsu']||0);
  // キッチン配置数：1個は'K'、2個以上はK²K³...
  const sup={2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
  const k=counts['kitchen']||0;
  const kLabel=k===0?'':`K${k>=2?(sup[k]||String(k)):''}`;
  // LDK表記（和室+洋室の数をLDKの前に）
  const ldkLabel=rooms===0?kLabel:`${rooms}LD${kLabel||'K'}`;
  // トイレ・風呂
  const wc=counts['toilet']||0;
  const bath=counts['bath']||0;
  let extra='';
  if(wc>0) extra+=`+${wc>1?wc:''}WC`;
  if(bath>0) extra+=`+${bath>1?bath:''}B`;
  return ldkLabel+extra;
}
function showResult(){
  // マドリスト名表示
  const nameEl=document.getElementById('res-player-name');
  if(nameEl){
    const pname=window._playerName||'';
    if(pname){nameEl.textContent=pname+' の間取り';nameEl.style.display='block';}
    else{nameEl.style.display='none';}
  }
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  document.getElementById('res-age').innerHTML=age+'<span class="result-stat-unit">年</span>';
  document.getElementById('res-walk').innerHTML=walk+'<span class="result-stat-unit">分</span>';
  document.getElementById('res-rent').innerHTML=rent+'<span class="result-stat-unit">万円</span>';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    // pid単位でカウント（セル数ではなくパーツ数）
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  // 完成間取りをcanvasプレビューとして結果画面に表示
  const prevEl=document.getElementById('res-madori-preview');
  if(prevEl&&madoriSnapshot){
    prevEl.innerHTML='';
    const cv=document.createElement('canvas');
    const maxW=Math.min(360, window.innerWidth-40);
    const maxH=260;
    const scale=Math.min(maxW/madoriSnapshot.width, maxH/madoriSnapshot.height);
    cv.width=madoriSnapshot.width*scale;
    cv.height=madoriSnapshot.height*scale;
    cv.style.cssText='border-radius:10px;border:1px solid rgba(90,74,58,.15);box-shadow:0 4px 20px rgba(90,74,58,.12);max-width:100%;';
    cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
    prevEl.appendChild(cv);
  }
  // 間取りラベル（太字LDK）
  const roomLabel=countRoomLabel(roomTypes,counts);
  const ldkMatch=roomLabel.match(/^([^+]+)(.*)/);
  document.getElementById('res-room-label').innerHTML=
    ldkMatch?`<span style="font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif;color:var(--brown-dark)">${ldkMatch[1]}</span><span style="font-size:14px;color:var(--brown-light)">${ldkMatch[2]}</span>`:roomLabel;
  // 複数称号
  const earned=generateTitles(age,walk,rent,roomTypes);
  const saved=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const newTitles=[], oldTitles=[];
  earned.forEach(t=>{
    if(!saved.includes(t.title)){newTitles.push(t);saved.unshift(t.title);}
    else oldTitles.push(t);
  });
  localStorage.setItem('madori-titles',JSON.stringify(saved));
  // 結果データを一時保存（saveMadori用）
  window._lastResult={
    name:window._playerName||'マドリスト',
    label:document.getElementById('res-room-label')?.textContent||roomLabel,
    labelRaw:roomLabel, age, walk, rent,
    titles:earned.map(t=>t.title),
    date:new Date().toLocaleDateString('ja-JP'),
  };
  // 新獲得称号（目立つ）
  const newEl=document.getElementById('res-titles-new');
  newEl.innerHTML=newTitles.length>0
    ?newTitles.map((t,i)=>`<div class="res-title-new-badge" style="animation-delay:${i*0.1}s"><span class="res-title-new-label">NEW！</span>${t.title}</div>`).join('')
    :(earned.length>0?`<div class="res-title-new-badge"><span style="font-size:10px;color:var(--accent-light);margin-right:6px">獲得</span>${earned[0].title}</div>`:'');
  // コメント
  document.getElementById('res-comment').textContent=earned[0]?.comment||'';
  // 所持称号一覧（全部）
  const allEl=document.getElementById('res-titles-all');
  allEl.innerHTML=saved.map(t=>`<span class="res-title-old-badge">${t}</span>`).join('');
}

// ────────────────────────────────────────
// SVGテクスチャ

const PARTS_DEF=[
  {name:'洋室8畳',w:3,h:3,color:0xF5E8C8,label:'洋室\n8畳',type:'youshitsu',  weight:22},
  {name:'和室8畳',w:3,h:3,color:0xC8D8A0,label:'和室\n8畳',type:'washitsu',  weight:18},
  {name:'廊下',   w:1,h:2,color:0xE8E0D4,label:'廊下',     type:'roka',      weight:16},
  {name:'キッチン',w:3,h:2,color:0xFFB870,label:'キッチン', type:'kitchen',   weight:16},
  {name:'トイレ', w:1,h:2,color:0xD4EEF8,label:'トイレ\n2畳',type:'toilet',  weight:9},

  {name:'バルコニー',w:3,h:1,color:0xFFE566,label:'バルコニー',type:'balcony',weight:10},
];
const PARTS_WEIGHT_TOTAL=PARTS_DEF.reduce((s,d)=>s+d.weight,0);

function svgToCanvas(dataUrl){
  return new Promise(resolve=>{
    const b64=dataUrl.split(',')[1];
    const bin=atob(b64), bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth||80; cv.height=img.naturalHeight||80;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url); resolve(cv);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

const CS=40,COLS=7,ROWS=8,UI_R=0;
const CANVAS_W=COLS*CS, CANVAS_H=ROWS*CS;
const GENKAN_COLOR=0xD4A870;

class PuzzleGame extends Phaser.Scene{
  constructor(){super('PuzzleGame');}
  sx(c){return c*CS;} sy(r){return r*CS;}

  create(){
    gameScene=this;
    // セッションIDで古いPromiseコールバックを無効化（玄関重複防止）
    this._sessionId=(this._sessionId||0)+1;
    const sessionId=this._sessionId;
    this._storageGfx=null;
    this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    this.boardImgs={};
    this.boardLabels={};
    this.partCount=0;
    this.undoStack=[];
    this.currentDef=null; this.rotation=0;
    this.curC=Math.floor(COLS/2); this.curR=0;
    this.holdDef=null; this.holdUsed=false;
    this.queue=[];
    for(let i=0;i<4;i++)this.queue.push(this.pickRandom());
    this.bgGfx=this.add.graphics().setDepth(0);
    this.gridGfx=this.add.graphics().setDepth(1);
    this.previewGfx=this.add.graphics().setDepth(4);
    this.previewImg=null;
    this.drawBg();
    // テクスチャをロードしてから玄関・ゲーム開始
    const entries=Object.entries(SVG_TEX);
    Promise.all(entries.map(([k,v])=>svgToCanvas(v).then(cv=>{
      if(cv&&!this.textures.exists(k))this.textures.addCanvas(k,cv);
    }))).then(()=>{
      // セッションが変わっていたら（restart済み）何もしない
      if(this._sessionId!==sessionId)return;
      this.placeGenkan();
      this.drawBoard();
      this.nextPiece();
      this.drawUI();
    });
    this.setupKeys();
  }

  setupKeys(){
    const K=Phaser.Input.Keyboard.KeyCodes;
    this.xKey    =this.input.keyboard.addKey(K.X);
    this.zKey    =this.input.keyboard.addKey(K.Z);
    this.ctrlKey =this.input.keyboard.addKey(K.CTRL);
    this.cKey    =this.input.keyboard.addKey(K.C);
    this.shiftKey=this.input.keyboard.addKey(K.SHIFT);
    this.leftKey =this.input.keyboard.addKey(K.LEFT);
    this.rightKey=this.input.keyboard.addKey(K.RIGHT);
    this.downKey =this.input.keyboard.addKey(K.DOWN);
    this.upKey   =this.input.keyboard.addKey(K.UP);
    this.spaceKey=this.input.keyboard.addKey(K.SPACE);
    this.enterKey=this.input.keyboard.addKey(K.ENTER);
    this.xKey.on('down',()=>this.rotatePiece(1));
    this.zKey.on('down',()=>{ if(this.ctrlKey.isDown)this.doUndo(); else this.rotatePiece(-1); });
    this.cKey.on('down',()=>this.doHold());
    this.shiftKey.on('down',()=>this.doHold());
    this.spaceKey.on('down',()=>this.placeAtCursor());
    this.enterKey.on('down',()=>this.placeAtCursor());
    this._moveRepeat={timer:null,delay:200,interval:80};
    const startRepeat=(dc,dr)=>{
      this.moveCursor(dc,dr);
      const rep=this._moveRepeat; clearTimeout(rep.timer);
      rep.timer=setTimeout(()=>{rep.timer=setInterval(()=>this.moveCursor(dc,dr),rep.interval);},rep.delay);
    };
    const stopRepeat=()=>{
      const rep=this._moveRepeat; clearTimeout(rep.timer); clearInterval(rep.timer); rep.timer=null;
    };
    this.leftKey.on('down',()=>startRepeat(-1,0)); this.rightKey.on('down',()=>startRepeat(1,0));
    this.downKey.on('down',()=>startRepeat(0,1));  this.upKey.on('down',()=>startRepeat(0,-1));
    this.leftKey.on('up',stopRepeat); this.rightKey.on('up',stopRepeat);
    this.downKey.on('up',stopRepeat); this.upKey.on('up',stopRepeat);
    // タッチ・クリック操作（グリッドのみ。回転/ホールドはHTMLボタン）
    this._lastTapTime=0;
    this.input.on('pointerdown',(p)=>{
      const canvas=this.game.canvas;
      const scaleX=CANVAS_W/canvas.offsetWidth;
      const scaleY=CANVAS_H/canvas.offsetHeight;
      const bx=p.x*scaleX, by=p.y*scaleY;
      if(!this.currentDef)return;
      const shape=this.getShape(this.currentDef,this.rotation);
      let tc=Phaser.Math.Clamp(Math.floor(bx/CS)-Math.floor(shape[0].length/2),0,COLS-shape[0].length);
      let tr=Phaser.Math.Clamp(Math.floor(by/CS)-Math.floor(shape.length/2),0,ROWS-shape.length);
      const now=Date.now();
      const isSamePos=(tc===this.curC&&tr===this.curR);
      if(isSamePos&&now-this._lastTapTime<600){
        this.placeAtCursor();
        this._lastTapTime=0;
      }else{
        this.curC=tc; this.curR=tr;
        this.updatePreview(this.curC,this.curR);
        this._lastTapTime=now;
      }
    });
  }

  pickRandom(){
    let r=Math.random()*PARTS_WEIGHT_TOTAL;
    for(const d of PARTS_DEF){r-=d.weight;if(r<=0)return d;}
    return PARTS_DEF[PARTS_DEF.length-1];
  }
  getShape(def,rot){
    let s=[];
    for(let r=0;r<def.h;r++){s.push([]);for(let c=0;c<def.w;c++)s[r].push(1);}
    for(let i=0;i<(rot%4);i++){
      const nr=[],rows=s.length,cols=s[0].length;
      for(let c=0;c<cols;c++){nr.push([]);for(let r=rows-1;r>=0;r--)nr[c].push(s[r][c]);}
      s=nr;
    }
    return s;
  }

  nextPiece(){
    this.currentDef=this.queue.shift(); this.queue.push(this.pickRandom());
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this.drawUI(); this.updatePreview(this.curC,this.curR); this.checkNoPlace();
  }
  rotatePiece(dir=1){
    if(!this.currentDef)return;
    this.rotation=(this.rotation+dir+4)%4;
    this.updatePreview(this.curC,this.curR); this.drawUI();
  }
  doHold(){
    if(!this.currentDef)return;
    if(this.holdDef){[this.holdDef,this.currentDef]=[this.currentDef,this.holdDef];}
    else{this.holdDef=this.currentDef;this.currentDef=this.queue.shift();this.queue.push(this.pickRandom());}
    this.rotation=0; this.holdUsed=false;
    this.updatePreview(this.curC,this.curR); this.drawUI();
    // checkNoPlace()はキー離し後のnextPiece()から呼ばれるので、ここでは呼ばない
  }
  doUndo(){
    if(this.undoStack.length===0)return;
    const state=this.undoStack.pop();
    this.grid=state.grid;
    this.currentDef=state.currentDef; this.rotation=state.rotation;
    this.queue=state.queue.slice(); this.holdDef=state.holdDef;
    this.holdUsed=state.holdUsed; this.partCount=state.partCount;
    // 全ビジュアルを破棄して再構築
    this._destroyAllBoardVisuals();
    this.rebuildBoardVisuals();
    this.drawBoard(); this.drawUI();
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.updatePreview(this.curC,this.curR);
    document.getElementById('btn-complete-overlay').classList.remove('visible');
    this.checkNoPlace();
  }

  // ★ ビジュアル全破棄（boardImgs + boardLabels を Map として管理）
  _destroyAllBoardVisuals(){
    Object.values(this.boardImgs).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardImgs={};
    Object.values(this.boardLabels).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardLabels={};
  }

  // ★ ビジュアル再構築（グリッドを走査、pid単位で1度だけ生成）
  rebuildBoardVisuals(){
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=this.grid[r][c];
        if(!cell||drawn.has(cell.pid))continue;
        drawn.add(cell.pid);
        this._createCellVisual(cell);
      }
    }
  }

  // ★ 1セル分のビジュアル生成（img + label を boardImgs/boardLabels[pid] に登録）
  _createCellVisual(cell){
    // 既に生成済みなら何もしない（重複防止）
    if(this.boardImgs.hasOwnProperty(cell.pid)) return;
    const px=this.sx(cell.mnC), py=this.sy(cell.mnR);
    const pw=(cell.mxC-cell.mnC+1)*CS, ph=(cell.mxR-cell.mnR+1)*CS;
    const pid=cell.pid;
    // 画像
    if(cell.fixed){
      // 玄関はGraphicsで直接描画（SVGの文字化け回避）
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(0xD4A870,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      g.lineStyle(3,0x986830,1); g.strokeRect(px+2,py+2,pw-4,ph-4);
      g.lineStyle(1.5,0x986830,1); g.lineBetween(px+2,py+ph/2,px+pw-2,py+ph/2);
      this.boardImgs[pid]=g;
    }else if(cell.type==='washitsu'){
      const g=this.add.graphics().setDepth(2);
      this.drawWashitsuOnGraphics(g,px,py,pw,ph);
      this.boardImgs[pid]=g;
    }else if(this.textures.exists(cell.type)){
      const rot=(cell.rotation||0)%4;
      const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
      const img=this.add.image(px+pw/2,py+ph/2,cell.type)
        .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setDepth(2);
      this.boardImgs[pid]=img;
    }else{
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(cell.color,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      this.boardImgs[pid]=g;
    }
    // ラベルテキスト追加
    const labelText=cell.fixed?'玄関':(cell.label||'');
    const lbl=this.add.text(px+pw/2,py+ph/4,labelText,{
      fontSize:cell.fixed?'13px':'11px',
      fill:cell.fixed?'#604010':'#3a3028',
      align:'center',fontFamily:'Meiryo,sans-serif',
      stroke:'#ffffffcc',strokeThickness:2
    }).setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels[pid]=lbl;
  }

  placeGenkan(){
    const gx=Phaser.Math.Between(1,COLS-3);
    const pid='genkan';
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)
      this.grid[ROWS-2+dr][gx+dc]={color:GENKAN_COLOR,fixed:true,pid,
        mnR:ROWS-2,mxR:ROWS-1,mnC:gx,mxC:gx+1,label:'玄関',rotation:0};
    this._createCellVisual(this.grid[ROWS-2][gx]);
  }

  checkNoPlace(){
    // 置けるかチェックする関数
    const canPlaceAnywhere=(def)=>{
      if(!def)return false;
      for(let rot=0;rot<4;rot++){
        const shape=this.getShape(def,rot);
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.canPlace(shape,c,r))return true;
      }
      return false;
    };
    // 現在のピースが置ける→完成しない
    if(canPlaceAnywhere(this.currentDef))return;
    // holdDefが置ける→完成しない（ホールドすれば今のが消えてholdが来る）
    if(canPlaceAnywhere(this.holdDef))return;
    // holdDefがない場合：ホールドすればqueue[0]が現在になる→置ければ完成しない
    if(!this.holdDef&&this.queue.length>0&&canPlaceAnywhere(this.queue[0]))return;
    // 全部ダメ→完成ボタン表示、プレビューを非表示
    document.getElementById('btn-complete-overlay').classList.add('visible');
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
  }
  canPlace(shape,c,r){
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||this.grid[nr][nc])return false;
      }
    return true;
  }
  placePiece(def,shape,c,r){
    this.undoStack.push({
      grid:this.grid.map(row=>row.map(cell=>cell?{...cell}:null)),
      currentDef:def,rotation:this.rotation,queue:this.queue.slice(),
      holdDef:this.holdDef,holdUsed:this.holdUsed,partCount:this.partCount
    });
    if(this.undoStack.length>1)this.undoStack.shift();
    const pid='p'+(++this.partCount);
    const color=def.color;
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++)
        if(shape[dr][dc])
          this.grid[r+dr][c+dc]={color,pid,type:def.type,rotation:this.rotation,
            mnR:r,mxR:r+shape.length-1,mnC:c,mxC:c+shape[0].length-1,label:def.label};
    this._createCellVisual(this.grid[r][c]);
    this.drawBoard();
    this.nextPiece();
  }

  drawBg(){
    const g=this.bgGfx; g.clear();
    g.fillStyle(0xf8f4ee,1); g.fillRect(0,0,COLS*CS,ROWS*CS);
    g.lineStyle(1,0xd8cfc4,1);
    for(let r=0;r<=ROWS;r++)g.lineBetween(0,this.sy(r),COLS*CS,this.sy(r));
    for(let c=0;c<=COLS;c++)g.lineBetween(this.sx(c),0,this.sx(c),ROWS*CS);
    g.lineStyle(3,0x8a7060,1); g.strokeRect(0,0,COLS*CS,ROWS*CS);
  }
  drawBoard(){
    const g=this.gridGfx; g.clear();
    const drawn=new Set();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=this.grid[r][c];
      if(!cell||drawn.has(cell.pid))continue;
      drawn.add(cell.pid);
      const px=this.sx(cell.mnC),py=this.sy(cell.mnR);
      const pw=(cell.mxC-cell.mnC+1)*CS,ph=(cell.mxR-cell.mnR+1)*CS;
      if(!this.boardImgs.hasOwnProperty(cell.pid)){g.fillStyle(cell.color,1);g.fillRect(px+1,py+1,pw-2,ph-2);}
      g.lineStyle(2,0x705840,1); g.strokeRect(px+1,py+1,pw-2,ph-2);
    }
  }

  drawUI(){
    // Phaser内のUIオブジェクトは不要なのでクリアのみ
    if(this._uiObjs){this._uiObjs.forEach(o=>o&&o.destroy()); this._uiObjs=[];}
    // HTML側の上部バーを更新
    this._updateTopBar();
  }

  _updateTopBar(){
    // 配置数
    const badge=document.getElementById('part-count-badge');
    if(badge) badge.textContent=this.partCount+'個';
    // NEXT1（queue[0]）・NEXT2（queue[1]）・HOLD
    const slots=[
      {def:this.queue[1], canvasId:'canvas-next2', nameId:'name-next2'},
      {def:this.queue[0], canvasId:'canvas-next1', nameId:'name-next1'},
      {def:this.holdDef,  canvasId:'canvas-hold',  nameId:'name-hold'},
    ];
    for(const {def,canvasId,nameId} of slots){
      const cv=document.getElementById(canvasId);
      const nm=document.getElementById(nameId);
      if(!cv)continue;
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,cv.width,cv.height);
      if(nm) nm.textContent=def?def.name:'なし';
      if(!def)continue;
      const shape=this.getShape(def,0);
      const sh=shape.length,sw=shape[0].length;
      const csz=Math.min(Math.floor(cv.width/sw),Math.floor(cv.height/sh));
      const ox=Math.floor((cv.width-sw*csz)/2), oy=Math.floor((cv.height-sh*csz)/2);
      // 色を16進→CSS変換
      const hex='#'+def.color.toString(16).padStart(6,'0');
      ctx.fillStyle=hex;
      for(let r=0;r<sh;r++)for(let c=0;c<sw;c++){
        if(!shape[r][c])continue;
        ctx.fillRect(ox+c*csz+1,oy+r*csz+1,csz-2,csz-2);
      }
      ctx.strokeStyle='rgba(90,74,58,.4)';ctx.lineWidth=1;
      ctx.strokeRect(ox,oy,sw*csz,sh*csz);
      // 和室は緑枠
      if(def.type==='washitsu'){ctx.strokeStyle='#5a8040';ctx.lineWidth=2;ctx.strokeRect(ox+1,oy+1,sw*csz-2,sh*csz-2);}
    }
  }

  moveCursor(dc,dr){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    this.curC=Phaser.Math.Clamp(this.curC+dc,0,COLS-shape[0].length);
    this.curR=Phaser.Math.Clamp(this.curR+dr,0,ROWS-shape.length);
    this.updatePreview(this.curC,this.curR);
  }
  placeAtCursor(){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    if(!this.canPlace(shape,this.curC,this.curR))return;
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.placePiece(this.currentDef,shape,this.curC,this.curR);
  }
  stopPreviewTween(){
    if(this._previewTween){this._previewTween.stop();this._previewTween=null;}
    this._clearPreviewLabels();
  }
  updatePreview(c,r){
    // 完成ボタン表示中はプレビューを出さない
    if(document.getElementById('btn-complete-overlay').classList.contains('visible'))return;
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this._clearPreviewLabels();
    this.previewGfx.clear();
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    const ok=this.canPlace(shape,c,r);
    const g=this.previewGfx;
    for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++){
      if(!shape[dr][dc])continue;
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      g.fillStyle(ok?0x88cc88:0xcc4444,ok?0.2:0.22);
      g.fillRect(this.sx(nc)+1,this.sy(nr)+1,CS-2,CS-2);
    }
    // ok/NGどちらでも画像プレビューを表示（赤くても何のパーツか分かるように）
    {
      const pw=shape[0].length*CS,ph=shape.length*CS;
      const px=this.sx(c),py=this.sy(r);
      let target=null;
      if(this.currentDef.type==='washitsu'){
        const g2=this.add.graphics().setDepth(4);
        this.drawWashitsuOnGraphics(g2,px,py,pw,ph);
        g2.setAlpha(ok?0.75:0.65);
        // NG時は赤いオーバーレイをgraphicsで追加
        if(!ok){
          g2.fillStyle(0xff4444,0.12);
          g2.fillRect(px,py,pw,ph);
        }
        target=g2;
      }else if(this.textures.exists(this.currentDef.type)){
        const rot=this.rotation%4,dw=rot%2===0?pw:ph,dh=rot%2===0?ph:pw;
        target=this.add.image(px+pw/2,py+ph/2,this.currentDef.type)
          .setDisplaySize(dw-2,dh-2).setAngle(rot*90)
          .setAlpha(ok?0.75:0.68).setDepth(4);
        if(!ok) target.setTint(0xffcccc);
      }
      if(target){
        this.previewImg=target;
        // ok/NG どちらでも点滅（NG時は赤みがかった範囲で点滅）
        const alphaFrom=ok?0.75:0.68;
        const alphaTo  =ok?0.35:0.25;
        this._previewTween=this.tweens.add({targets:target,alpha:{from:alphaFrom,to:alphaTo},duration:600,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      }
      // プレビュー中ラベルテキスト（全パーツ共通）
      {
        const pw2=shape[0].length*CS, ph2=shape.length*CS;
        const px2=this.sx(c), py2=this.sy(r);
        const lbl=this.add.text(px2+pw2/2, py2+ph2/4, this.currentDef.label||this.currentDef.name,{
          fontSize:'10px',fill:'#3a3028',align:'center',fontFamily:'Meiryo,sans-serif',
          stroke:'#ffffffcc',strokeThickness:2
        }).setOrigin(0.5,0.5).setDepth(6).setAlpha(ok?0.95:0.75);
        if(!this._previewLabels) this._previewLabels=[];
        this._previewLabels.push(lbl);
      }
    }
  }

  _clearPreviewLabels(){
    if(this._previewLabels){
      this._previewLabels.forEach(l=>{if(l&&l.destroy)l.destroy();});
      this._previewLabels=[];
    }
  }

  fillEmptyAsStorage(){
    if(this._storageGfx){this._storageGfx.destroy();}
    const g=this.add.graphics().setDepth(2);
    this._storageGfx=g;
    const storageColor=0xEEDCC8,storageStroke=0xA07848;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(this.grid[r][c])continue;
      const px=this.sx(c),py=this.sy(r);
      g.fillStyle(storageColor,.85);g.fillRect(px+1,py+1,CS-2,CS-2);
      g.lineStyle(.7,storageStroke,.35);
      for(let d=4;d<CS*2;d+=8){
        const x1=px+1+Math.max(0,d-CS+2),y1=py+1+Math.max(0,CS-2-d);
        const x2=px+1+Math.min(CS-2,d),y2=py+1+Math.min(CS-2,d);
        if(x1<px+CS-1&&y1<py+CS-1)g.lineBetween(x1,y1,x2,y2);
      }
    }
    let labelPlaced=false;
    for(let r=0;r<ROWS&&!labelPlaced;r++)for(let c=0;c<COLS&&!labelPlaced;c++){
      if(!this.grid[r][c]){
        this.add.text(this.sx(c)+CS/2,this.sy(r)+CS/2,'収納',
          {fontSize:'9px',fill:'#8a6840',fontFamily:'Meiryo',stroke:'#ffffffaa',strokeThickness:1.5})
          .setOrigin(.5,.5).setDepth(6).setAlpha(.7);
        labelPlaced=true;
      }
    }
  }

  drawWashitsuOnGraphics(g,px,py,pw,ph){
    g.fillStyle(0xeaf2da,1);g.fillRect(px,py,pw,ph);
    const cw2=pw/2,cw3=pw/3,ch=ph/4;
    this.drawTatami(g,px,py,cw2,ch,true);this.drawTatami(g,px+cw2,py,cw2,ch,true);
    this.drawTatami(g,px,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px+cw3,py+ch,cw3,ch,true);this.drawTatami(g,px+cw3,py+ch*2,cw3,ch,true);
    this.drawTatami(g,px+cw3*2,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px,py+ch*3,cw2,ch,true);this.drawTatami(g,px+cw2,py+ch*3,cw2,ch,true);
    g.lineStyle(3,0x5a8040,1);g.strokeRect(px+1,py+1,pw-2,ph-2);
  }
  drawTatami(g,x,y,w,h,horizontal){
    if(w<=2||h<=2)return;
    const p=2;
    g.fillStyle(0xe0eeca,1);g.fillRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(1,0x7a9a55,1);g.strokeRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(.5,0x8aab6a,.55);
    if(horizontal){for(let ly=y+p+4;ly<y+h-p;ly+=4)g.lineBetween(x+p+2,ly,x+w-p-2,ly);}
    else{for(let lx=x+p+4;lx<x+w-p;lx+=4)g.lineBetween(lx,y+p+2,lx,y+h-p-2);}
  }
}

function startPhaserGame(){
  const topBarH=document.getElementById('game-top-bar')?.offsetHeight||72;
  const botBarH=document.getElementById('game-bottom-bar')?.offsetHeight||90;
  const availH=window.innerHeight-topBarH-botBarH;
  const maxW=Math.min(window.innerWidth, CANVAS_W);
  const maxH=Math.min(availH, CANVAS_H);
  const scaleRatio=Math.min(maxW/CANVAS_W, maxH/CANVAS_H, 1);
  new Phaser.Game({
    type:Phaser.AUTO,
    width:CANVAS_W,height:CANVAS_H,
    backgroundColor:'#f0ece6',
    parent:'game-container',
    scene:PuzzleGame,
    scale:{mode:Phaser.Scale.NONE,zoom:scaleRatio}
  });
}
</script>

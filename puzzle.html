const CANVAS_W=COLS*CS, CANVAS_H=ROWS*CS;
// 土地形状定義（将来の変形土地対応）
// null = 配置不可マス、0 = 通常マス
// 現在は全マス配置可能な長方形
const LAND_MAP=Array.from({length:ROWS},()=>Array(COLS).fill(0));
// canPlace でLAND_MAPを参照するためグローバルに持つ
const GENKAN_COLOR=0xD4A870;

class PuzzleGame extends Phaser.Scene{
  constructor(){super('PuzzleGame');}
  sx(c){return c*CS;} sy(r){return r*CS;}

  create(){
    gameScene=this;
    this._sessionId=(this._sessionId||0)+1;
    const sessionId=this._sessionId;
    this._storageGfx=null;
    this._storageTexts=[];
    this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    this.boardImgs={};
    this.boardLabels={};
    this.partCount=0;
    this.undoStack=[];
    this.currentDef=null; this.rotation=0;
    this.curC=Math.floor(COLS/2); this.curR=0;
    this.holdDef=null; this.holdUsed=false;
    this.queue=[];
    for(let i=0;i<4;i++)this.queue.push(this.pickRandom());
    // ドラッグ状態リセット（リトライ時にゴーストが残らないよう）
    this._dragging=false;
    this._justDropped=false;
    this._previewActive=false;
    const ghost=document.getElementById('drag-ghost');
    if(ghost){ghost.style.display='none';}
    // document レベルのリスナーをリセット
    if(document._madoriMouseMove){document.removeEventListener('mousemove',document._madoriMouseMove);document._madoriMouseMove=null;}
    if(document._madoriMouseUp)  {document.removeEventListener('mouseup',  document._madoriMouseUp);  document._madoriMouseUp=null;}
    this.bgGfx=this.add.graphics().setDepth(0);
    this.gridGfx=this.add.graphics().setDepth(1);
    this.previewGfx=this.add.graphics().setDepth(4);
    this.previewImg=null;
    this.drawBg();
    // テクスチャをロードしてから玄関・ゲーム開始
    // images/フォルダのPNGを優先、なければSVG_TEXにフォールバック
    const loadTexture=(k,svgDataUrl)=>{
      return new Promise(resolve=>{
        const imgPath='image/'+k+'.png';
        const img=new Image();
        img.onload=()=>{
          const dpr=window.devicePixelRatio||1;
          const cv=document.createElement('canvas');
          cv.width=img.naturalWidth*dpr; cv.height=img.naturalHeight*dpr;
          const ctx=cv.getContext('2d');
          ctx.scale(dpr,dpr);
          ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight);
          if(this.textures.exists(k))this.textures.remove(k);
          this.textures.addCanvas(k,cv);
          resolve();
        };
        img.onerror=()=>{
          svgToCanvas(svgDataUrl).then(cv=>{
            if(!cv){resolve();return;}
            if(this.textures.exists(k))this.textures.remove(k);
            this.textures.addCanvas(k,cv);
            resolve();
          });
        };
        img.src=imgPath;
      });
    };
    const entries=Object.entries(SVG_TEX);
    Promise.all(entries.map(([k,v])=>loadTexture(k,v))).then(()=>{
      if(this._sessionId!==sessionId)return;
      this.placeGenkan();
      this.drawBoard();
      this.nextPiece();
      this.drawUI();
    });
    this.setupKeys();
  }

  setupKeys(){
    const K=Phaser.Input.Keyboard.KeyCodes;
    this.xKey    =this.input.keyboard.addKey(K.X);
    this.zKey    =this.input.keyboard.addKey(K.Z);
    this.ctrlKey =this.input.keyboard.addKey(K.CTRL);
    this.cKey    =this.input.keyboard.addKey(K.C);
    this.shiftKey=this.input.keyboard.addKey(K.SHIFT);
    this.leftKey =this.input.keyboard.addKey(K.LEFT);
    this.rightKey=this.input.keyboard.addKey(K.RIGHT);
    this.downKey =this.input.keyboard.addKey(K.DOWN);
    this.upKey   =this.input.keyboard.addKey(K.UP);
    this.spaceKey=this.input.keyboard.addKey(K.SPACE);
    this.enterKey=this.input.keyboard.addKey(K.ENTER);
    // ウィンドウがフォーカスを失ったときキーボード入力を無効化
    // （スクショショートカット等でholdやundoが誤発動するのを防ぐ）
    this.input.keyboard.disableGlobalCapture();
    this.game.canvas.addEventListener('mousedown',()=>this.game.canvas.focus());
    this.game.canvas.setAttribute('tabindex','0');
    this.xKey.on('down',()=>this.rotatePiece(1));
    this.zKey.on('down',()=>{ if(this.ctrlKey.isDown)this.doUndo(); else this.rotatePiece(-1); });
    this.cKey.on('down',()=>this.doHold());
    // Shiftはスクショショートカットと競合するため hold から除外
    this.spaceKey.on('down',()=>this.placeAtCursor());
    this.enterKey.on('down',()=>this.placeAtCursor());
    this._moveRepeat={timer:null,delay:200,interval:80};
    const startRepeat=(dc,dr)=>{
      this.moveCursor(dc,dr);
      const rep=this._moveRepeat; clearTimeout(rep.timer);
      rep.timer=setTimeout(()=>{rep.timer=setInterval(()=>this.moveCursor(dc,dr),rep.interval);},rep.delay);
    };
    const stopRepeat=()=>{
      const rep=this._moveRepeat; clearTimeout(rep.timer); clearInterval(rep.timer); rep.timer=null;
    };
    this.leftKey.on('down',()=>startRepeat(-1,0)); this.rightKey.on('down',()=>startRepeat(1,0));
    this.downKey.on('down',()=>startRepeat(0,1));  this.upKey.on('down',()=>startRepeat(0,-1));
    this.leftKey.on('up',stopRepeat); this.rightKey.on('up',stopRepeat);
    this.downKey.on('up',stopRepeat); this.upKey.on('up',stopRepeat);
    // タッチ・クリック操作（グリッド内）
    // pointerdownを記録してpointerupで判定（回転ボタン競合回避）
    this._pdownTime=0;
    this._pdownX=0; this._pdownY=0;
    this.input.on('pointerdown',(p)=>{
      if(p.rightButtonDown()){ this.rotatePiece(1); return; }
      if(this._dragging)return;
      this._pdownTime=Date.now();
      this._pdownX=p.x; this._pdownY=p.y;
    });
    this.input.on('pointerup',(p)=>{
      if(p.rightButtonDown())return;
      if(this._dragging)return;
      if(this._justDropped)return;
      const elapsed=Date.now()-this._pdownTime;
      if(elapsed>350)return; // 長押し後は無視（350msに短縮して誤確定を減らす）
      if(!this.currentDef)return;
      // p.x/p.y = Phaserゲーム内座標 (0〜CANVAS_W/H)
      const bx=p.x, by=p.y;
      const shape=this.getShape(this.currentDef,this.rotation);
      const pw=shape[0].length, ph=shape.length;
      const tapC=Math.floor(bx/CS), tapR=Math.floor(by/CS);
      const tc=Phaser.Math.Clamp(Math.round(bx/CS-pw/2),0,COLS-pw);
      const tr=Phaser.Math.Clamp(Math.round(by/CS-ph/2),0,ROWS-ph);
      if(this._previewActive){
        const inPiece=(tapC>=this.curC&&tapC<this.curC+pw&&tapR>=this.curR&&tapR<this.curR+ph);
        if(inPiece) this.placeAtCursor();
        else { this.curC=tc; this.curR=tr; this.updatePreview(this.curC,this.curR); }
      }
      // プレビューなし→何もしない（ドラッグ後のみプレビュー）
    });
    if(this.game.canvas){
      this.game.canvas.addEventListener('contextmenu',e=>e.preventDefault());
    }
    this._setupDrag();
  }

  _setupDrag(){
    const wrap    = document.getElementById('current-piece-wrap');
    const holdCol = document.getElementById('hold-col');
    const canvas  = this.game.canvas;
    if(!wrap||!canvas)return;

    this._dragging    = false;
    this._justDropped = false;
    this._previewActive = false;

    // ── ユーティリティ ──
    const toGame=(cx,cy)=>{
      const r=canvas.getBoundingClientRect();
      const bx=(cx-r.left)*(CANVAS_W/canvas.offsetWidth);
      const by=(cy-r.top )*(CANVAS_H/canvas.offsetHeight);
      return{bx,by,ok:bx>=0&&by>=0&&bx<=CANVAS_W&&by<=CANVAS_H};
    };
    const doPreview=(cx,cy)=>{
      const g=toGame(cx,cy); if(!g.ok||!this.currentDef)return;
      const sh=this.getShape(this.currentDef,this.rotation);
      const c=Phaser.Math.Clamp(Math.round(g.bx/CS-sh[0].length/2),0,COLS-sh[0].length);
      const r=Phaser.Math.Clamp(Math.round(g.by/CS-sh.length/2),0,ROWS-sh.length);
      this.curC=c; this.curR=r; this.updatePreview(c,r);
    };
    // canvas-currentにパーツを描画（ドラッグ中グリッド外で使用）
    const drawCC=()=>{
      if(!this.currentDef)return;
      const cc=document.getElementById('canvas-current'); if(!cc)return;
      const W=80,H=80;
      cc.width=W; cc.height=H; cc.style.width=W+'px'; cc.style.height=H+'px';
      const sh=this.getShape(this.currentDef,this.rotation);
      const sw=sh[0].length,sr=sh.length;
      const scale=window._gameScaleRatio||1;
      const cp=Math.min(Math.round(CS*scale),Math.floor(W/sw),Math.floor(H/sr));
      const ox=Math.floor((W-sw*cp)/2),oy=Math.floor((H-sr*cp)/2);
      const ctx=cc.getContext('2d'); ctx.clearRect(0,0,W,H);
      this._drawDefOnCanvasFixed(ctx,this.currentDef,ox,oy,sw*cp,sr*cp,this.rotation);
    };
    const clearCC=()=>{
      const cc=document.getElementById('canvas-current'); if(!cc)return;
      cc.getContext('2d').clearRect(0,0,cc.width,cc.height);
    };

    // ── startDrag / moveDrag / endDrag ──
    const startDrag=(cx,cy)=>{
      if(!this.currentDef||this._dragging)return;
      this._dragging=true;
      const g=toGame(cx,cy);
      if(g.ok){ clearCC(); doPreview(cx,cy); }
      // グリッド外からのドラッグ開始はcanvas-currentを維持
    };

    const moveDrag=(cx,cy)=>{
      if(!this._dragging)return;
      // 保留枠ハイライト
      if(holdCol){
        const h=holdCol.getBoundingClientRect();
        holdCol.classList.toggle('drag-over',cx>=h.left&&cx<=h.right&&cy>=h.top&&cy<=h.bottom);
      }
      const g=toGame(cx,cy);
      if(g.ok){
        // グリッド内→プレビュー更新、canvas-currentはクリアのまま
        clearCC(); doPreview(cx,cy);
      } else {
        // グリッド外→canvas-currentにパーツを表示
        drawCC();
      }
    };

    const endDrag=(cx,cy)=>{
      if(!this._dragging)return;
      this._dragging=false;
      if(holdCol)holdCol.classList.remove('drag-over');
      // 保留枠チェック（最優先）
      if(holdCol){
        const h=holdCol.getBoundingClientRect();
        if(cx>=h.left&&cx<=h.right&&cy>=h.top&&cy<=h.bottom){
          this.doHold(); this._clearPreview(); this.drawUI(); return;
        }
      }
      // グリッド内→プレビュー残す
      const g=toGame(cx,cy);
      if(g.ok){
        doPreview(cx,cy);
        this._justDropped=true;
        setTimeout(()=>{this._justDropped=false;},500);
      } else {
        this._clearPreview(); this.drawUI();
      }
    };

    const cancelDrag=()=>{
      if(!this._dragging)return;
      this._dragging=false;
      if(holdCol)holdCol.classList.remove('drag-over');
      this._clearPreview(); this.drawUI();
    };

    // ── wrap リスナー ──
    ['_wMD','_wCM','_wTS','_wTM','_wTE','_wTC'].forEach(k=>{
      const ev={_wMD:'mousedown',_wCM:'contextmenu',_wTS:'touchstart',
                _wTM:'touchmove',_wTE:'touchend',_wTC:'touchcancel'}[k];
      if(wrap[k]){wrap.removeEventListener(ev,wrap[k]);delete wrap[k];}
    });
    wrap._wMD=(e)=>{ if(e.button!==0)return; e.preventDefault(); startDrag(e.clientX,e.clientY); };
    wrap._wCM=(e)=>{ e.preventDefault(); this.rotatePiece(1); };
    wrap._wTS=(e)=>{ e.preventDefault(); startDrag(e.touches[0].clientX,e.touches[0].clientY); };
    wrap._wTM=(e)=>{ e.preventDefault(); moveDrag(e.touches[0].clientX,e.touches[0].clientY); };
    wrap._wTE=(e)=>{ e.preventDefault();
      if(this._dragging)endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY); };
    wrap._wTC=cancelDrag;
    wrap.addEventListener('mousedown',  wrap._wMD);
    wrap.addEventListener('contextmenu',wrap._wCM);
    wrap.addEventListener('touchstart', wrap._wTS,{passive:false});
    wrap.addEventListener('touchmove',  wrap._wTM,{passive:false});
    wrap.addEventListener('touchend',   wrap._wTE,{passive:false});
    wrap.addEventListener('touchcancel',wrap._wTC);

    // ── document（マウス専用：wrap外追従用）──
    if(document._dMM)document.removeEventListener('mousemove',document._dMM);
    if(document._dMU)document.removeEventListener('mouseup',  document._dMU);
    document._dMM=(e)=>{ if(this._dragging)moveDrag(e.clientX,e.clientY); };
    document._dMU=(e)=>{ if(this._dragging)endDrag(e.clientX,e.clientY); };
    document.addEventListener('mousemove',document._dMM);
    document.addEventListener('mouseup',  document._dMU);

    // ── canvas（土地）リスナー ──
    ['_cLD','_cLU','_cLM','_cLTS','_cLTE','_cLTM'].forEach(k=>{
      const ev={_cLD:'mousedown',_cLU:'mouseup',_cLM:'mousemove',
                _cLTS:'touchstart',_cLTE:'touchend',_cLTM:'touchmove'}[k];
      if(canvas[k]){canvas.removeEventListener(ev,canvas[k]);delete canvas[k];}
    });

    let _lt=null,_lx=0,_ly=0;
    const _lstart=(cx,cy)=>{
      if(this._dragging)return;
      _lx=cx;_ly=cy;
      if(_lt)clearTimeout(_lt);
      _lt=setTimeout(()=>{
        _lt=null;
        if(this._dragging||!this.undoStack.length)return;
        this.doUndo();
        if(this.currentDef)startDrag(_lx,_ly);
      },500);
    };
    const _lcancel=()=>{if(_lt){clearTimeout(_lt);_lt=null;}};

    // マウス操作
    canvas._cLD=(e)=>{ if(e.button===0)_lstart(e.clientX,e.clientY); };
    canvas._cLU=(e)=>{ _lcancel(); }; // endDragはdocument.mouseupが担当
    canvas._cLM=(e)=>{
      if(this._dragging){
        moveDrag(e.clientX,e.clientY);
      } else if(_lt){
        // 長押し待機中に20px超え動いたらキャンセル
        if((e.clientX-_lx)**2+(e.clientY-_ly)**2>400)_lcancel();
      }
    };

    // タッチ操作
    // ⑤ポイント：touchmoveで_draggingがtrueになっていたらmoveDrag呼ぶ
    //    長押し500ms確定→startDrag(_dragging=true)→その後のtouchmoveでmoveDrag
    canvas._cLTS=(e)=>{
      if(this._dragging)return;
      e.preventDefault(); // スクロール抑制
      _lstart(e.touches[0].clientX,e.touches[0].clientY);
    };
    canvas._cLTE=(e)=>{
      _lcancel();
      // ⑧ touchendでendDrag（土地内ドラッグ→保留枠へのドロップ対応）
      if(this._dragging){
        const t=e.changedTouches[0];
        endDrag(t.clientX,t.clientY);
      }
    };
    canvas._cLTM=(e)=>{
      const t=e.touches[0];
      if(this._dragging){
        // ⑤ 長押し確定後にそのまま指を動かすとプレビューが追従
        e.preventDefault();
        moveDrag(t.clientX,t.clientY);
      } else if(_lt){
        // 長押し待機中：20px超えたらキャンセル（それ以下は継続）
        if((t.clientX-_lx)**2+(t.clientY-_ly)**2>400)_lcancel();
      }
    };
    canvas.addEventListener('mousedown', canvas._cLD);
    canvas.addEventListener('mouseup',   canvas._cLU);
    canvas.addEventListener('mousemove', canvas._cLM);
    canvas.addEventListener('touchstart',canvas._cLTS,{passive:false});
    canvas.addEventListener('touchend',  canvas._cLTE,{passive:false});
    canvas.addEventListener('touchmove', canvas._cLTM,{passive:false});
  }


  pickRandom(){
    let r=Math.random()*PARTS_WEIGHT_TOTAL;
    for(const d of PARTS_DEF){r-=d.weight;if(r<=0)return d;}
    return PARTS_DEF[PARTS_DEF.length-1];
  }
  getShape(def,rot){
    let s=[];
    for(let r=0;r<def.h;r++){s.push([]);for(let c=0;c<def.w;c++)s[r].push(1);}
    for(let i=0;i<(rot%4);i++){
      const nr=[],rows=s.length,cols=s[0].length;
      for(let c=0;c<cols;c++){nr.push([]);for(let r=rows-1;r>=0;r--)nr[c].push(s[r][c]);}
      s=nr;
    }
    return s;
  }

  nextPiece(){
    this.currentDef=this.queue.shift(); this.queue.push(this.pickRandom());
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this.drawUI();
    // プレビューはドラッグ開始まで表示しない
    this._clearPreview();
    this.checkNoPlace();
  }
  rotatePiece(dir=1){
    if(!this.currentDef)return;
    this.rotation=(this.rotation+dir+4)%4;
    const newShape=this.getShape(this.currentDef,this.rotation);
    this.curC=Phaser.Math.Clamp(this.curC,0,COLS-newShape[0].length);
    this.curR=Phaser.Math.Clamp(this.curR,0,ROWS-newShape.length);
    if(this._previewActive){
      this.updatePreview(this.curC,this.curR);
    } else {
      this._clearPreview();
    }
    // ドラッグ中・プレビュー中はcanvas-currentを再描画しない
    if(!this._dragging&&!this._previewActive) this.drawUI();
    else this._updateTopBar(); // カウント等だけ更新
  }
  doHold(){
    if(!this.currentDef)return;
    if(this.holdDef){[this.holdDef,this.currentDef]=[this.currentDef,this.holdDef];}
    else{this.holdDef=this.currentDef;this.currentDef=this.queue.shift();this.queue.push(this.pickRandom());}
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this._clearPreview();
    this.drawUI();
  }
  doUndo(){
    if(this.undoStack.length===0)return;
    const state=this.undoStack.pop();
    this.grid=state.grid;
    this.currentDef=state.currentDef; this.rotation=state.rotation;
    this.queue=state.queue.slice(); this.holdDef=state.holdDef;
    this.holdUsed=state.holdUsed; this.partCount=state.partCount;
    // 全ビジュアルを破棄して再構築
    this._destroyAllBoardVisuals();
    this.rebuildBoardVisuals();
    this.drawBoard(); this.drawUI();
    this._clearPreview();
    // プレビューはドラッグ開始まで表示しない
    document.getElementById('btn-complete-overlay').classList.remove('visible');
    this.checkNoPlace();
  }

  // ★ ビジュアル全破棄（boardImgs + boardLabels を Map として管理）
  _destroyAllBoardVisuals(){
    Object.values(this.boardImgs).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardImgs={};
    Object.values(this.boardLabels).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardLabels={};
  }

  // ★ ビジュアル再構築（グリッドを走査、pid単位で1度だけ生成）
  rebuildBoardVisuals(){
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=this.grid[r][c];
        if(!cell||drawn.has(cell.pid))continue;
        drawn.add(cell.pid);
        this._createCellVisual(cell);
      }
    }
  }

  // ★ 1セル分のビジュアル生成（img + label を boardImgs/boardLabels[pid] に登録）
  _createCellVisual(cell){
    // 既に生成済みなら何もしない（重複防止）
    if(this.boardImgs.hasOwnProperty(cell.pid)) return;
    const px=this.sx(cell.mnC), py=this.sy(cell.mnR);
    const pw=(cell.mxC-cell.mnC+1)*CS, ph=(cell.mxR-cell.mnR+1)*CS;
    const pid=cell.pid;
    // 画像
    if(cell.fixed){
      // 玄関はGraphicsで直接描画（SVGの文字化け回避）
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(0xD4A870,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      g.lineStyle(3,0x986830,1); g.strokeRect(px+2,py+2,pw-4,ph-4);
      g.lineStyle(1.5,0x986830,1); g.lineBetween(px+2,py+ph/2,px+pw-2,py+ph/2);
      this.boardImgs[pid]=g;
    }else if(this.textures.exists(cell.type)){
      const rot=(cell.rotation||0)%4;
      const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
      const img=this.add.image(px+pw/2,py+ph/2,cell.type)
        .setDisplaySize(dw,dh).setAngle(rot*90).setDepth(2);
      this.boardImgs[pid]=img;
    }else{
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(cell.color,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      this.boardImgs[pid]=g;
    }
    // ラベルテキスト追加（中央配置・サイズをパーツに合わせる）
    const labelText=cell.fixed?'玄関':(cell.label||'');
    const labelFs=cell.fixed?13:Math.min(11,Math.floor(pw*0.28),Math.floor(ph*0.32));
    const lbl=this.add.text(px+pw/2, py+ph/2, labelText,{
      fontSize:labelFs+'px',
      fill:cell.fixed?'#604010':'#3a3028',
      align:'center',fontFamily:'Meiryo,sans-serif',
      stroke:'#ffffffcc',strokeThickness:2,
      wordWrap:{width:pw-4}
    }).setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels[pid]=lbl;
  }

  placeGenkan(){
    const gx=Phaser.Math.Between(1,COLS-3);
    const pid='genkan';
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)
      this.grid[ROWS-2+dr][gx+dc]={color:GENKAN_COLOR,fixed:true,pid,
        mnR:ROWS-2,mxR:ROWS-1,mnC:gx,mxC:gx+1,label:'玄関',rotation:0};
    this._createCellVisual(this.grid[ROWS-2][gx]);
  }

  checkNoPlace(){
    if(document.getElementById('btn-complete-overlay').classList.contains('visible'))return;

    const canPlaceAnywhere=(def)=>{
      if(!def)return false;
      for(let rot=0;rot<4;rot++){
        const shape=this.getShape(def,rot);
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.canPlace(shape,c,r))return true;
      }
      return false;
    };

    const curOk=canPlaceAnywhere(this.currentDef);
    const holdOk=canPlaceAnywhere(this.holdDef);
    const queueResults=this.queue.map(d=>({name:d.name,ok:canPlaceAnywhere(d)}));
    const queueOk=queueResults.some(x=>x.ok);

    // holdの動作を正確にシミュレート:
    // holdDef あり → current ↔ holdDef の交換のみ。queueには届かない。
    // holdDef なし → holdを押すたびにqueueから引き出せる。
    // holdDefありの場合: holdを押してもqueueに届かない（current↔holdのみ）
    // → currentもholdも置けなければ終了
    // holdDefなしの場合: holdを押すとqueueから引き出せる
    // → currentもqueueも置けなければ終了
    const shouldEnd = this.holdDef
      ? (!curOk && !holdOk)
      : (!curOk && !queueOk);

    if(!shouldEnd)return;

    // ★ デバッグ：終了判定直前の状態をコンソールと画面に表示
    const debugInfo={
      current:this.currentDef?.name,
      currentOk:curOk,
      hold:this.holdDef?.name||'なし',
      holdOk,
      queue:queueResults,
      gridEmpty:this.grid.flat().filter(c=>!c).length
    };
    console.warn('[終了判定]',JSON.stringify(debugInfo,null,2));
    // 画面上にデバッグ表示（左下に小さく）
    const dbgEl=document.getElementById('debug-end-log')||(() => {
      const el=document.createElement('div');
      el.id='debug-end-log';
      el.style.cssText='position:fixed;bottom:120px;left:4px;background:rgba(0,0,0,.82);color:#0f0;font-size:9px;padding:4px 6px;border-radius:4px;z-index:9999;max-width:calc(100vw - 8px);word-break:break-all;pointer-events:none;white-space:pre-wrap;';
      document.body.appendChild(el);
      return el;
    })();
    dbgEl.textContent=`[終了判定]\ncurrent: ${debugInfo.current}(${curOk?'OK':'NG'})\nhold: ${debugInfo.hold}(${holdOk?'OK':'NG'})\nqueue: ${queueResults.map(x=>x.name+'('+(x.ok?'OK':'NG')+')').join(' ')}\n空きマス: ${debugInfo.gridEmpty}`;

    // 全て置けない → 終了
    this.fillEmptyAsStorage();
    document.getElementById('btn-complete-overlay').classList.add('visible');
    this._clearPreview();
  }
  canPlace(shape,c,r){
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
        if(LAND_MAP[nr][nc]===null)return false; // 配置不可マス
        if(this.grid[nr][nc])return false;
      }
    return true;
  }
  placePiece(def,shape,c,r){
    this.undoStack.push({
      grid:this.grid.map(row=>row.map(cell=>cell?{...cell}:null)),
      currentDef:def,rotation:this.rotation,queue:this.queue.slice(),
      holdDef:this.holdDef,holdUsed:this.holdUsed,partCount:this.partCount
    });
    if(this.undoStack.length>1)this.undoStack.shift();
    const pid='p'+(++this.partCount);
    const color=def.color;
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++)
        if(shape[dr][dc])
          this.grid[r+dr][c+dc]={color,pid,type:def.type,rotation:this.rotation,
            mnR:r,mxR:r+shape.length-1,mnC:c,mxC:c+shape[0].length-1,label:def.label};
    this._createCellVisual(this.grid[r][c]);
    this.drawBoard();
    this.nextPiece();
  }

  drawBg(){
    const g=this.bgGfx; g.clear();
    g.fillStyle(0xf8f4ee,1); g.fillRect(0,0,COLS*CS,ROWS*CS);
    // LAND_MAPのnullマスをグレーで塗りつぶし（配置不可エリア）
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(LAND_MAP[r][c]===null){
        g.fillStyle(0xd8d0c8,1);
        g.fillRect(c*CS,r*CS,CS,CS);
      }
    }
    g.lineStyle(1,0xd8cfc4,1);
    for(let r=0;r<=ROWS;r++)g.lineBetween(0,this.sy(r),COLS*CS,this.sy(r));
    for(let c=0;c<=COLS;c++)g.lineBetween(this.sx(c),0,this.sx(c),ROWS*CS);
    g.lineStyle(3,0x8a7060,1); g.strokeRect(0,0,COLS*CS,ROWS*CS);
  }
  drawBoard(){
    const g=this.gridGfx; g.clear();
    const drawn=new Set();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=this.grid[r][c];
      if(!cell||drawn.has(cell.pid))continue;
      drawn.add(cell.pid);
      const px=this.sx(cell.mnC),py=this.sy(cell.mnR);
      const pw=(cell.mxC-cell.mnC+1)*CS,ph=(cell.mxR-cell.mnR+1)*CS;
      const hasImg=this.textures.exists(cell.type);
      if(!this.boardImgs.hasOwnProperty(cell.pid)){g.fillStyle(cell.color,1);g.fillRect(px+1,py+1,pw-2,ph-2);}
      if(!hasImg){g.lineStyle(2,0x705840,1); g.strokeRect(px+1,py+1,pw-2,ph-2);}
    }
  }

  drawUI(){
    // Phaser内のUIオブジェクトは不要なのでクリアのみ
    if(this._uiObjs){this._uiObjs.forEach(o=>o&&o.destroy()); this._uiObjs=[];}
    // HTML側の上部バーを更新
    this._updateTopBar();
  }

  _updateTopBar(){
    // ── 設置数グリッド ──
    const grid=document.getElementById('part-count-grid');
    if(grid){
      const counts={};
      const seenPids=new Set();
      this.grid.forEach(row=>row.forEach(cell=>{
        if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
          seenPids.add(cell.pid);
          counts[cell.type]=(counts[cell.type]||0)+1;
        }
      }));
      const labels={youshitsu:'洋室',washitsu:'和室',roka:'廊下',kitchen:'キッチン',
                    toilet:'トイレ',bath:'お風呂',balcony:'バルコニー',storage:'収納'};
      grid.innerHTML='';
      PARTS_DEF.forEach(d=>{
        const item=document.createElement('div');
        item.className='pc-item';
        item.innerHTML=`<span class="pc-name">${labels[d.type]||d.name}</span><span class="pc-count">${counts[d.type]||0}</span>`;
        grid.appendChild(item);
      });
    }

    // ── 次/次次 canvas ──
    const nextSlots=[
      {def:this.queue[1], canvasId:'canvas-next2', size:56},
      {def:this.queue[0], canvasId:'canvas-next1', size:72},
      {def:this.holdDef,  canvasId:'canvas-hold',  size:72},
    ];
    for(const {def,canvasId,size} of nextSlots){
      const cv=document.getElementById(canvasId);
      if(!cv)continue;
      cv.width=size; cv.height=size;
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,size,size);
      if(!def){
        // holdが空のとき「なし」表示
        if(canvasId==='canvas-hold'){
          ctx.fillStyle='rgba(90,74,58,.18)';
          ctx.font='9px Meiryo,sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('なし',size/2,size/2);
        }
        continue;
      }
      this._drawDefOnCanvas(ctx,def,size,size);
    }

    // ── 現在パーツ canvas（固定80×80） ──
    const cc=document.getElementById('canvas-current');
    if(cc){
      const W=80,H=80;
      cc.width=W; cc.height=H;
      cc.style.width=W+'px'; cc.style.height=H+'px';
      const ctx=cc.getContext('2d');
      ctx.clearRect(0,0,W,H);
      // ドラッグ中・プレビュー中は空欄のまま（パーツは土地上のプレビューで表示）
      if(this.currentDef&&!this._dragging&&!this._previewActive){
        const shape=this.getShape(this.currentDef,this.rotation);
        const sw=shape[0].length,sh=shape.length;
        const scale=window._gameScaleRatio||1;
        const cellPx=Math.min(Math.round(CS*scale),Math.floor(W/sw),Math.floor(H/sh));
        const pw=sw*cellPx,ph=sh*cellPx;
        const ox=Math.floor((W-pw)/2),oy=Math.floor((H-ph)/2);
        this._drawDefOnCanvasFixed(ctx,this.currentDef,ox,oy,pw,ph,this.rotation);
      }
    }
  }

  // canvas に def を描画するユーティリティ
  _drawDefOnCanvas(ctx,def,W,H,rot=0){
    const shape=this.getShape(def,rot);
    const sh=shape.length, sw=shape[0].length;
    const csz=Math.min(Math.floor((W-4)/sw), Math.floor((H-4)/sh));
    const ox=Math.floor((W-sw*csz)/2), oy=Math.floor((H-sh*csz)/2);
    const hasImg=this.textures.exists(def.type);
    if(hasImg){
      const srcCanvas=this.textures.get(def.type).source[0].image;
      if(srcCanvas){
        ctx.save();
        ctx.translate(ox+sw*csz/2, oy+sh*csz/2);
        ctx.rotate(rot*Math.PI/2);
        const dw=rot%2===0?sw*csz:sh*csz, dh=rot%2===0?sh*csz:sw*csz;
        ctx.drawImage(srcCanvas,-dw/2,-dh/2,dw,dh);
        ctx.restore();
      } else {
        ctx.fillStyle='#'+def.color.toString(16).padStart(6,'0');
        ctx.fillRect(ox,oy,sw*csz,sh*csz);
      }
    } else {
      ctx.fillStyle='#'+def.color.toString(16).padStart(6,'0');
      ctx.fillRect(ox+1,oy+1,sw*csz-2,sh*csz-2);
      ctx.strokeStyle='rgba(90,74,58,.5)'; ctx.lineWidth=1.5;
      ctx.strokeRect(ox+0.75,oy+0.75,sw*csz-1.5,sh*csz-1.5);
    }
    const labelStr=def.label?def.label.split('\n')[0]:def.name;
    ctx.fillStyle='rgba(58,42,26,0.8)';
    ctx.font=`bold ${Math.max(7,Math.min(10,csz*0.55))}px Meiryo,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(labelStr, ox+sw*csz/2, oy+sh*csz/2);
  }

  // 固定位置・固定サイズで描画（現在パーツ枠用）
  _drawDefOnCanvasFixed(ctx,def,ox,oy,pw,ph,rot=0){
    const hasImg=this.textures.exists(def.type);
    if(hasImg){
      const srcCanvas=this.textures.get(def.type).source[0].image;
      if(srcCanvas){
        ctx.save();
        ctx.translate(ox+pw/2, oy+ph/2);
        ctx.rotate(rot*Math.PI/2);
        const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
        ctx.drawImage(srcCanvas,-dw/2,-dh/2,dw,dh);
        ctx.restore();
      } else {
        ctx.fillStyle='#'+def.color.toString(16).padStart(6,'0');
        ctx.fillRect(ox,oy,pw,ph);
      }
    } else {
      ctx.fillStyle='#'+def.color.toString(16).padStart(6,'0');
      ctx.fillRect(ox+1,oy+1,pw-2,ph-2);
      ctx.strokeStyle='rgba(90,74,58,.6)'; ctx.lineWidth=2;
      ctx.strokeRect(ox+1,oy+1,pw-2,ph-2);
    }
    const labelStr=def.label?def.label.split('\n')[0]:def.name;
    ctx.fillStyle='rgba(58,42,26,0.85)';
    ctx.font=`bold ${Math.min(13,Math.floor(Math.min(pw,ph)*0.28))}px Meiryo,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(labelStr, ox+pw/2, oy+ph/2);
  }

  moveCursor(dc,dr){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    this.curC=Phaser.Math.Clamp(this.curC+dc,0,COLS-shape[0].length);
    this.curR=Phaser.Math.Clamp(this.curR+dr,0,ROWS-shape.length);
    this.updatePreview(this.curC,this.curR);
  }
  placeAtCursor(){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    if(!this.canPlace(shape,this.curC,this.curR))return;
    this._clearPreview();
    this.placePiece(this.currentDef,shape,this.curC,this.curR);
  }
  _isPreviewEmpty(){ return !this._previewActive; }
  stopPreviewTween(){
    if(this._previewTween){this._previewTween.stop();this._previewTween=null;}
    this._clearPreviewLabels();
  }
  _clearPreview(){
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this._clearPreviewLabels();
    this.previewGfx.clear();
    this._previewActive=false;
    this._previewDefKey=null;
  }
  updatePreview(c,r){
    if(document.getElementById('btn-complete-overlay').classList.contains('visible'))return;
    if(!this.currentDef)return;
    // 毎回クリアして再描画（シンプル・確実）
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this._clearPreviewLabels();
    this.previewGfx.clear();
    this._previewDefKey=null;
    const shape=this.getShape(this.currentDef,this.rotation);
    const ok=this.canPlace(shape,c,r);
    const pw=shape[0].length*CS, ph=shape.length*CS;
    const px=this.sx(c), py=this.sy(r);
    // グリッドハイライト
    for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++){
      if(!shape[dr][dc])continue;
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      this.previewGfx.fillStyle(ok?0x88cc88:0xdd8888,ok?0.18:0.12);
      this.previewGfx.fillRect(this.sx(nc)+1,this.sy(nr)+1,CS-2,CS-2);
    }
    // プレビュー画像
    if(this.textures.exists(this.currentDef.type)){
      const rot=this.rotation%4,dw=rot%2===0?pw:ph,dh=rot%2===0?ph:pw;
      this.previewImg=this.add.image(px+pw/2,py+ph/2,this.currentDef.type)
        .setDisplaySize(dw,dh).setAngle(rot*90).setDepth(4);
    }
    if(this.previewImg){
      this._previewTween=this.tweens.add({
        targets:this.previewImg,alpha:{from:0.9,to:0.5},
        duration:500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'
      });
    }
    // ラベル
    const lbl=this.add.text(px+pw/2,py+ph/2,this.currentDef.label||this.currentDef.name,{
      fontSize:'10px',fill:'#3a3028',align:'center',fontFamily:'Meiryo,sans-serif',
      stroke:'#ffffffcc',strokeThickness:2
    }).setOrigin(0.5,0.5).setDepth(6).setAlpha(ok?0.95:0.75);
    if(!this._previewLabels)this._previewLabels=[];
    this._previewLabels.push(lbl);
    this._previewActive=true;
  }

  _clearPreviewLabels(){
    if(this._previewLabels){
      this._previewLabels.forEach(l=>{if(l&&l.destroy)l.destroy();});
      this._previewLabels=[];
    }
  }

  fillEmptyAsStorage(){
    if(this._storageGfx){this._storageGfx.destroy();}
    // 前回生成した収納テキストを全て破棄（重複防止）
    if(this._storageTexts){this._storageTexts.forEach(t=>{if(t&&t.destroy)t.destroy();});}
    this._storageTexts=[];
    this._storageGfx=this.add.graphics().setDepth(2);
    const g=this._storageGfx;
    const storageColor=0xC9A882;  // 暗めブラウンベージュ
    const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));

    for(let r0=0;r0<ROWS;r0++)for(let c0=0;c0<COLS;c0++){
      if(this.grid[r0][c0]||visited[r0][c0])continue;
      // BFSで連結した空きマスを収集
      const cells=[];
      const queue=[[r0,c0]];
      visited[r0][c0]=true;
      while(queue.length){
        const [r,c]=queue.shift();
        cells.push([r,c]);
        for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!this.grid[nr][nc]&&!visited[nr][nc]){
            visited[nr][nc]=true;
            queue.push([nr,nc]);
          }
        }
      }
      // 塊全体をベージュで塗る（境界線なし・隙間なし）
      for(const [r,c] of cells){
        const px=this.sx(c),py=this.sy(r);
        g.fillStyle(storageColor,0.9);
        g.fillRect(px,py,CS,CS);  // 隙間なし
      }
      // 塊の重心（塊に含まれる全マスの平均位置）に「収納」を表示
      const minR=Math.min(...cells.map(([r])=>r));
      const maxR=Math.max(...cells.map(([r])=>r));
      const minC=Math.min(...cells.map(([,c])=>c));
      const maxC=Math.max(...cells.map(([,c])=>c));
      // 重心計算
      const cx=cells.reduce((s,[,c])=>s+this.sx(c)+CS/2,0)/cells.length;
      const cy=cells.reduce((s,[r])=>s+this.sy(r)+CS/2,0)/cells.length;
      const blockW=(maxC-minC+1)*CS;
      const blockH=(maxR-minR+1)*CS;
      // 1マスのとき小さく、複数マスのとき少し大きく
      const fs=cells.length===1?8:Math.min(11, Math.floor(Math.sqrt(cells.length)*5));
      const t=this.add.text(cx, cy, '収納', {
        fontSize:fs+'px',fill:'#6a4e2e',align:'center',
        fontFamily:'Meiryo,sans-serif',stroke:'#ffffffdd',strokeThickness:2,
        wordWrap:{width:CS*Math.min(cells.length,3)-4}
      }).setOrigin(0.5,0.5).setDepth(3);
      this._storageTexts.push(t);
    }
  }

}

function startPhaserGame(){
  // screen-gameがdisplay:flexになった後、barのoffsetHeightを計測して起動
  const launch=()=>{
    const topBar=document.getElementById('game-top-bar');
    const botBar=document.getElementById('game-bottom-bar');
    const tH=topBar?.offsetHeight||0;
    const bH=botBar?.offsetHeight||0;
    if(tH===0||bH===0){
      // まだレイアウト未確定 → ResizeObserverで待つ
      let done=false;
      const ro=new ResizeObserver(()=>{
        const t2=topBar?.offsetHeight||0, b2=botBar?.offsetHeight||0;
        if(t2>0&&b2>0&&!done){done=true;ro.disconnect();go(t2,b2);}
      });
      if(topBar)ro.observe(topBar);
      if(botBar)ro.observe(botBar);
      setTimeout(()=>{if(!done){done=true;ro.disconnect();go(topBar?.offsetHeight||0,botBar?.offsetHeight||0);}},600);
      return;
    }
    go(tH,bH);
  };
  const go=(tH,bH)=>{
    // game-containerのCSSピクセル高さを直接計測（flexで確定済み）
    const container=document.getElementById('game-container');
    const cH=container?.clientHeight||Math.max(1,window.innerHeight-tH-bH);
    const cW=container?.clientWidth||window.innerWidth;
    const dpr=window.devicePixelRatio||1;
    const scaleRatio=Math.min(cW/CANVAS_W, cH/CANVAS_H, 1.0); // 1.0を超えない（土地が拡大しすぎない）
    window._gameScaleRatio=scaleRatio;
    console.log('[Phaser起動] tH:'+tH+' bH:'+bH+' cH:'+cH+' cW:'+cW+' scale:'+scaleRatio.toFixed(3)+' dpr:'+dpr);
    window._phaserGame=new Phaser.Game({
      type:Phaser.AUTO,
      width:CANVAS_W,height:CANVAS_H,
      backgroundColor:'#f5f0e8',
      parent:'game-container',
      scene:PuzzleGame,
      resolution:dpr,          // Retina対応：物理ピクセルでCanvasを確保
      scale:{mode:Phaser.Scale.NONE,zoom:scaleRatio}
    });
  };
  requestAnimationFrame(()=>requestAnimationFrame(launch));
}

// 起動時プロフィール表示
updateStartProfile();
</script>

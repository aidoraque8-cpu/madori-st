<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>間取りすと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#f5f0e8;
  --warm:#e8ddd0;
  --brown:#5a4a3a;
  --brown-light:#8a7060;
  --brown-dark:#3a2a1a;
  --accent:#c8a060;
  --accent-light:#e8c880;
  --green:#6a8a50;
  --blue:#5080a8;
}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 24px 24px;}
.screen.active{display:flex;}

/* ── ① スタート ── */
#screen-start{background:var(--cream);position:relative;overflow:hidden;justify-content:center;}
#screen-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,160,96,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 20%,rgba(106,138,80,.08) 0%,transparent 60%);pointer-events:none;}
.logo-wrap{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(90,74,58,.15));}
.logo-title{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);letter-spacing:.15em;line-height:1;}
.logo-sub{font-size:12px;color:var(--brown-light);letter-spacing:.3em;margin-top:8px;}
.btn-start{display:block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;letter-spacing:.2em;padding:22px 80px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(58,42,26,.25);animation:fadeUp .8s .2s ease both;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(58,42,26,.32);}
.btn-start:hover::after{background:rgba(255,255,255,.06);}
.btn-start:active{transform:translateY(0);}
.start-sub-btns{display:flex;gap:24px;margin-top:36px;animation:fadeUp .8s .4s ease both;}
.btn-sub{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);font-size:12px;letter-spacing:.15em;padding:10px 24px;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-sub:hover{border-color:var(--brown-light);color:var(--brown);background:rgba(90,74,58,.05);}

/* ── ② ゲーム画面 ── */
#screen-game{
  display:none;flex-direction:column;align-items:stretch;
  padding:0;position:relative;background:var(--cream);
  overflow:hidden;width:100%;height:100vh;
}
#screen-game.active{display:flex;}
#game-container{
  flex:1;display:flex;justify-content:center;align-items:center;
  overflow:hidden;min-height:0;position:relative;
}
#game-container canvas{display:block;}

/* 上部NEXT/HOLDバー */
#game-top-bar{
  display:flex;flex-shrink:0;background:rgba(245,240,232,.97);border-bottom:1px solid rgba(90,74,58,.12);
  padding:10px 12px 10px;align-items:center;justify-content:center;gap:10px;
  position:relative;z-index:30;
}
#game-top-bar.active{display:flex;}
/* NEXT合体枠（次の次＋次のパーツを横並び） */
.next-combined-box{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#fff;border:1px solid rgba(90,74,58,.15);border-radius:10px;
  padding:8px 14px 6px;flex:1;max-width:200px;
}
.next-combined-label{font-size:10px;letter-spacing:.12em;color:var(--brown-light);font-weight:600;margin-bottom:2px;}
.next-combined-pieces{display:flex;align-items:center;justify-content:center;gap:10px;}
.next-piece-slot{display:flex;flex-direction:column;align-items:center;gap:3px;}
.next-piece-sublabel{font-size:9px;letter-spacing:.08em;color:var(--brown-light);}
.next-piece-name{font-size:10px;color:var(--brown);text-align:center;font-weight:500;}
/* HOLD枠 */
.hold-combined-box{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(200,160,96,.06);border:1.5px solid var(--accent);border-radius:10px;
  padding:8px 14px 6px;flex:0 0 auto;min-width:80px;
}
.next-piece-name{font-size:10px;color:var(--brown);text-align:center;font-weight:500;display:none;}
.hold-piece-name{font-size:10px;color:var(--brown);text-align:center;font-weight:500;display:none;}
/* 配置数バッジ */
.part-count-badge{
  font-size:10px;color:var(--brown-light);letter-spacing:.05em;
  background:rgba(90,74,58,.06);border-radius:20px;padding:4px 10px;flex-shrink:0;
  border:1px solid rgba(90,74,58,.12);position:absolute;right:12px;top:50%;transform:translateY(-50%);
}

/* ゲーム下部ボタンバー */
#game-bottom-bar{
  display:flex;flex-shrink:0;
  background:rgba(245,240,232,.97);
  border-top:1px solid rgba(90,74,58,.12);
  backdrop-filter:blur(8px);
  z-index:50;
  padding:8px 12px 14px;
  align-items:center;
  justify-content:center;
  gap:8px;
}
/* 共通ボタン */
.btn-op{
  background:#fff;
  border:1.5px solid rgba(90,74,58,.22);
  color:var(--brown);
  font-family:'Noto Sans JP',sans-serif;
  font-size:11px;
  letter-spacing:.04em;
  padding:10px 0 7px;
  border-radius:14px;
  cursor:pointer;
  transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  width:58px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  box-shadow:0 1px 4px rgba(90,74,58,.08);
}
.btn-op:active{background:rgba(90,74,58,.08);transform:scale(.93);box-shadow:none;}
.btn-op .op-icon{font-size:20px;line-height:1.1;}
.btn-op .op-label{font-size:9px;color:var(--brown-light);}
/* 回転ボタン強調 */
.btn-op.btn-rotate{
  width:70px;padding:12px 0 8px;border-radius:16px;
  border-color:var(--brown-dark);background:var(--brown-dark);color:#f5f0e8;
  box-shadow:0 3px 10px rgba(58,42,26,.28);
}
.btn-op.btn-rotate .op-icon{font-size:24px;}
.btn-op.btn-rotate .op-label{color:rgba(245,240,232,.65);}
.btn-op.btn-rotate:active{background:var(--brown);transform:scale(.93);}
/* 保留ボタン */
.btn-op.btn-hold-action{border-color:var(--accent);background:rgba(200,160,96,.1);color:var(--brown-dark);}
.btn-op.btn-hold-action .op-label{color:var(--brown-light);}
.btn-op.btn-hold-action:active{background:rgba(200,160,96,.25);}
/* 仕切り */
.btn-op-sep{width:1px;height:44px;background:rgba(90,74,58,.1);flex-shrink:0;}
/* ナビボタン */
.btn-game{
  background:none;border:1px solid rgba(90,74,58,.2);color:var(--brown-light);
  font-family:'Noto Sans JP',sans-serif;font-size:10px;letter-spacing:.04em;
  padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-game:hover{border-color:var(--brown);color:var(--brown);background:rgba(90,74,58,.05);}
.game-nav-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}

/* 完成ボタン */
#btn-complete-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:auto;}
#btn-complete-overlay.visible{display:block;}
#btn-complete-overlay button{
  background:#3a2a1a;color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:.2em;
  padding:20px 56px;border:2px solid rgba(200,160,96,.7);border-radius:6px;
  cursor:pointer;animation:gentlePulse 2s ease-in-out infinite;
}
#btn-complete-overlay button:hover{background:#2a1a0a;animation:none;transform:scale(1.04);transition:transform .15s;}

/* ── ③ ルーレット ── */
#screen-roulette{background:rgba(245,240,232,0.82);}
.roulette-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--brown-dark);letter-spacing:.15em;margin-bottom:28px;text-align:center;}
/* スロットのラッパー：高さを固定してブレを防ぐ */
.roulette-item-wrap{width:340px;height:120px;margin-bottom:40px;position:relative;flex-shrink:0;}
.roulette-item{
  position:absolute;inset:0;
  background:#fff;border:1.5px solid rgba(90,74,58,.15);border-radius:10px;
  padding:20px 24px;cursor:pointer;
  transition:border-color .2s,outline-color .2s;
  overflow:visible;opacity:.45;pointer-events:none;
  outline:3px solid transparent;outline-offset:2px;
}
.roulette-item.active-slot{opacity:1;pointer-events:auto;border-color:var(--accent);outline-color:rgba(200,160,96,.4);}
.roulette-item.locked{opacity:1;pointer-events:none;border-color:rgba(90,74,58,.2);outline-color:transparent;animation:none;cursor:default;background:linear-gradient(135deg,#fffbf5,#fff8ec);}
.roulette-item.locked .reroll-slot-btn{pointer-events:auto;}
.roulette-item-label{font-size:14px;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:6px;font-weight:700;text-align:center;}
.roulette-item-value{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);transition:color .1s;line-height:1.1;text-align:center;display:block;}
.roulette-item-value.spinning{animation:spin .08s linear infinite;color:var(--brown-light);}
/* レア値：金色グロー */
.roulette-item.rare .roulette-item-value{
  background:linear-gradient(135deg,#c8860a,#f5c842,#e8a020,#f5c842);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShine 2s linear infinite;
  filter:drop-shadow(0 0 6px rgba(200,160,10,.5));
  font-size:44px;
}
@keyframes goldShine{0%{background-position:0% center}100%{background-position:200% center}}
.roulette-item.rare{border-color:#c8a020;background:linear-gradient(135deg,#fffbec,#fff8d6);}
.roulette-item.rare::before{content:'✦ PREMIUM';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:.2em;color:#c8860a;background:#fff8d6;padding:2px 10px;border-radius:20px;border:1px solid #e8c040;white-space:nowrap;}
/* tap-hint */
.roulette-item .tap-hint{display:block;font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;font-weight:500;letter-spacing:.05em;text-align:center;margin-top:4px;}
.roulette-item.active-slot .tap-hint{opacity:1;}
.roulette-item.locked .tap-hint{display:none;}
.roulette-item.locked::after{content:'✓ 確定';position:absolute;top:12px;right:14px;font-size:11px;color:var(--brown-light);letter-spacing:.1em;}
.roulette-item.rare.locked::after{color:#c8860a;}
/* 各スロット個別の再抽選ボタン */
.reroll-slot-btn{
  position:absolute;right:-16px;bottom:-20px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.08em;
  padding:10px 20px;border-radius:24px;border:none;cursor:pointer;
  white-space:nowrap;box-shadow:0 3px 10px rgba(58,42,26,.35);
  transition:opacity .2s,transform .2s;
  visibility:hidden;opacity:0;
  z-index:20;pointer-events:none;
  will-change:transform;
}
.reroll-slot-btn.visible{visibility:visible;opacity:1;pointer-events:auto;}
.reroll-slot-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(58,42,26,.45);}
.reroll-slot-btn.used{background:rgba(90,74,58,.25);color:var(--brown-light);cursor:not-allowed;box-shadow:none;}
.reroll-slot-btn.used:hover{transform:none;box-shadow:none;}
/* 再抽選POP */
.reroll-pop{
  position:absolute;left:10px;top:10px;
  font-size:10px;font-weight:700;letter-spacing:.06em;
  color:#fff;background:#2a9d8f;padding:3px 10px;border-radius:20px;
  border:none;white-space:nowrap;pointer-events:none;
  visibility:hidden;opacity:0;transition:opacity .2s;
  box-shadow:0 2px 6px rgba(42,157,143,.35);z-index:5;
}
.reroll-pop.visible{visibility:visible;opacity:1;}
@keyframes slotPulse{0%,100%{outline-color:rgba(200,160,96,.25);}50%{outline-color:rgba(200,160,96,.5);}}
@keyframes titleBtnPulse{0%,100%{box-shadow:0 0 0 0 rgba(58,42,26,0),0 4px 14px rgba(58,42,26,.22);}60%{box-shadow:0 0 0 6px rgba(58,42,26,.12),0 4px 14px rgba(58,42,26,.22);}}
.btn-roulette-next{margin-top:32px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;padding:16px 56px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;}
.btn-roulette-next.visible{opacity:1;pointer-events:auto;}
.btn-roulette-next:hover{transform:translateY(-2px);}

/* ── ④ 結果 ── */
#screen-result{background:rgba(245,240,232,0.82);padding-top:20px;}
.result-wrap{text-align:center;max-width:440px;width:100%;}
.result-title-hero{font-family:'Noto Serif JP',serif;font-size:22px;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:10px;animation:popIn .5s ease both;text-shadow:0 2px 20px rgba(200,160,96,.5);}
.result-ldk-hero{font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:var(--brown-dark);line-height:1;margin-bottom:20px;letter-spacing:.04em;}
.result-spec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.result-spec-card{background:#fff;border:1px solid rgba(90,74,58,.1);border-radius:10px;padding:12px 6px 10px;text-align:center;}
.result-spec-label{font-size:10px;letter-spacing:.15em;color:var(--brown-light);margin-bottom:6px;font-weight:500;}
.result-spec-value{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--brown-dark);line-height:1;}
.result-spec-unit{font-size:11px;color:var(--brown-light);margin-left:1px;}
#res-madori-preview{display:flex;justify-content:center;margin-bottom:16px;}
/* 称号行 */
.res-title-new-chip{display:inline-flex;align-items:center;gap:5px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.1em;padding:6px 14px;border-radius:4px;animation:popIn .4s ease both;}
.res-title-new-label{font-size:9px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:2px;letter-spacing:.06em;flex-shrink:0;}
.res-title-owned-chip{background:rgba(90,74,58,.07);color:var(--brown-light);font-size:11px;letter-spacing:.06em;padding:4px 10px;border-radius:20px;border:1px solid rgba(90,74,58,.12);}
/* ボタン */
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:4px;}
.btn-result{flex:1;max-width:130px;padding:13px 0;border-radius:8px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.1em;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;}
.btn-result.primary{background:var(--brown-dark);color:#f5f0e8;box-shadow:0 4px 14px rgba(58,42,26,.22);}
.btn-result.secondary{background:#fff;border:1px solid rgba(90,74,58,.22);color:var(--brown-light);}
.btn-result:hover{transform:translateY(-2px);}
.btn-result.primary:hover{box-shadow:0 6px 18px rgba(58,42,26,.3);}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--cream);border-radius:12px;padding:32px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--brown-dark);margin-bottom:20px;letter-spacing:.1em;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;margin-top:-4px;}
.modal-empty{font-size:13px;color:var(--brown-light);text-align:center;padding:24px 0;line-height:2;}

/* ── 間取り背景 ── */
.madori-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .6s ease;}
.madori-bg.visible{opacity:1;}
.madori-bg canvas{max-width:80vw;max-height:80vh;opacity:.18;filter:blur(1px) sepia(.2);border-radius:8px;}
#screen-roulette,#screen-result{position:relative;z-index:1;background:transparent!important;}

/* ── アニメーション ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
@keyframes gentlePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,160,96,0);}50%{opacity:1;box-shadow:0 0 20px 6px rgba(200,160,96,.35);}}
.pop-in{animation:popIn .4s ease both;}
/* 称号画面 */
.titles-heading{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:28px;}
.title-new-item{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:.12em;
  padding:14px 24px;border-radius:6px;width:100%;box-sizing:border-box;
  will-change:opacity,transform;
}
.title-new-badge-inline{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;}
.titles-owned-section{margin-top:20px;width:100%;}
.titles-owned-label-sm{font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:8px;opacity:.7;}
.titles-owned-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;opacity:.5;}
.title-owned-chip{background:rgba(90,74,58,.08);color:var(--brown-light);font-size:12px;letter-spacing:.08em;padding:6px 16px;border-radius:20px;border:1px solid rgba(90,74,58,.15);font-family:'Noto Serif JP',serif;will-change:opacity,transform;}
</style>
</head>
<body>

<!-- ① スタート -->
<div id="screen-start" class="screen active">
  <div class="logo-wrap">
    <span class="logo-icon">🏠</span>
    <div class="logo-title">間取りすと</div>
    <div class="logo-sub">MADORI-ST</div>
  </div>
  <div id="name-input-wrap" style="margin-bottom:28px;text-align:center;animation:fadeUp .8s .15s ease both;">
    <div style="font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:8px;">マドリスト名</div>
    <input id="player-name-input" type="text" maxlength="12" placeholder="名前を入力（任意）"
      style="background:#fff;border:1px solid rgba(90,74,58,.25);border-radius:4px;padding:10px 18px;font-size:15px;color:var(--brown-dark);font-family:'Noto Serif JP',serif;letter-spacing:.1em;outline:none;width:240px;text-align:center;"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(90,74,58,.25)'">
  </div>
  <button class="btn-start" onclick="gotoGame()">は じ め る</button>
  <div class="start-sub-btns">
    <button class="btn-sub" onclick="openModal('saves')">間取り保存一覧</button>
    <button class="btn-sub" onclick="openModal('titles')">称号一覧</button>
  </div>
</div>

<!-- ② ゲーム -->
<div id="screen-game" class="screen">
  <!-- 上部バー：保留枠（左） ＋ 次のパーツ合体枠（右） -->
  <div id="game-top-bar">
    <!-- 保留枠（左） -->
    <div class="hold-combined-box">
      <div class="hold-combined-label">保留</div>
      <canvas id="canvas-hold" width="56" height="56"></canvas>
      <div class="hold-piece-name" id="name-hold">なし</div>
    </div>
    <!-- NEXT合体枠（右）：次の次 + 次のパーツ -->
    <div class="next-combined-box">
      <div class="next-combined-label">次のパーツ</div>
      <div class="next-combined-pieces">
        <div class="next-piece-slot">
          <div class="next-piece-sublabel">次の次</div>
          <canvas id="canvas-next2" width="56" height="56"></canvas>
          <div class="next-piece-name" id="name-next2">---</div>
        </div>
        <div style="font-size:14px;color:var(--brown-light);margin-bottom:12px;">→</div>
        <div class="next-piece-slot">
          <div class="next-piece-sublabel" style="color:var(--brown);font-weight:700;">次</div>

<script>
// ────────────────────────────────────────
// 画面管理
// ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar=document.getElementById('game-bottom-bar');
  const topBar=document.getElementById('game-top-bar');
  if(id==='screen-game'){
    bar.classList.add('active');
    if(topBar) topBar.classList.add('active');
  }else{
    bar.classList.remove('active');
    if(topBar) topBar.classList.remove('active');
  }
}
// .screen の共通display指定をgame以外に限定
document.querySelectorAll('.screen').forEach(s=>{
  if(s.id==='screen-game') return; // game画面は独自制御
});

let madoriSnapshot=null;
function captureMadoriSnapshot(){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas)return;
  const clone=document.createElement('canvas');
  clone.width=canvas.width; clone.height=canvas.height;
  clone.getContext('2d').drawImage(canvas,0,0);
  madoriSnapshot=clone;
}
function showMadoriBg(visible){
  const bg=document.getElementById('madori-bg');
  if(visible&&madoriSnapshot){
    bg.innerHTML='';
    const c=document.createElement('canvas');
    c.width=madoriSnapshot.width; c.height=madoriSnapshot.height;
    c.getContext('2d').drawImage(madoriSnapshot,0,0);
    bg.appendChild(c);
    requestAnimationFrame(()=>bg.classList.add('visible'));
  }else{
    bg.classList.remove('visible');
    setTimeout(()=>{bg.innerHTML='';},600);
  }
}

let gameStarted=false;
let gameScene=null;

function gotoStart(){
  showMadoriBg(false);
  showScreen('screen-start');
}

// ────────────────────────────────────────
// 再抽選（各スロット1日1回）
// ────────────────────────────────────────
// レア判定
const RARE_COND=[
  v=>v<=5,    // 築年数5以下
  v=>v<=5,    // 駅徒歩5以下
  v=>v<=9,    // 家賃1桁（9以下）
];
function isRare(idx,val){return RARE_COND[idx](val);}

// 再抽選確定プール（築浅5以下・駅近5以下）
const REROLL_POOLS={
  0:[0,1,2,3,4,5],   // 築浅確定
  1:[1,2,3,4,5],     // 駅近確定
  2:null,            // 家賃はPOP保留なので通常プール
};
// 再抽選済みフラグ（per slot）
const rerollDone=[false,false,false];

// 開発中：再抽選制限なし（将来：広告視聴で1日1回）
function isRerollUsed(idx){return false;}
function markRerollUsed(idx){/* 開発中は何もしない */}

function updateRerollBtnSlot(idx){
  const btn=document.getElementById('reroll-btn-'+idx);
  if(!btn)return;
  if(isRerollUsed(idx)){
    btn.classList.add('used');
    btn.textContent='使用済み';
  }else{
    btn.classList.remove('used');
    btn.textContent='🎲 再抽選';
  }
}

function doRerollSlot(idx){
  if(isRerollUsed(idx))return;
  rerollDone[idx]=true;  // 再抽選済みフラグ
  const item=document.getElementById('rou-'+idx);
  const valEl=document.getElementById('rou-val-'+idx);
  const rb=document.getElementById('reroll-btn-'+idx);
  if(rb) rb.classList.remove('visible');
  const pop=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop) pop.classList.remove('visible');
  document.getElementById('btn-rou-next').classList.remove('visible');
  item.classList.remove('locked','rare','active-slot');
  item.classList.add('active-slot');
  valEl.classList.add('spinning');
  rouletteValues[idx]=null;
  rouletteLocked[idx]=false;
  lockedCount=[0,1,2].filter(i=>i!==idx&&rouletteLocked[i]).length;
  if(rouletteIntervals[idx])clearInterval(rouletteIntervals[idx]);
  const pool=REROLL_POOLS[idx]||ROULETTE_POOLS[rouletteKeys[idx]];
  rouletteIntervals[idx]=setInterval(()=>{
    valEl.textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
  },80);
  item.onclick=()=>lockRerollSlot(idx);
  updateRerollBtnSlot(idx);
}

// 再抽選後の確定用（専用プールから値を取る）
function lockRerollSlot(idx){
  if(rouletteLocked[idx])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=REROLL_POOLS[idx]||ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  if(isRare(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 再抽選後は自スロットのPOPを消す
  const pop2=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop2) pop2.classList.remove('visible');
  // 次のスロットをアクティブに（まだ確定していないスロットがある場合）
  if(idx+1<3 && !rouletteLocked[idx+1]) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  lockedCount=[0,1,2].filter(i=>rouletteLocked[i]).length;
  if(lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 再抽選完了後はどのスロットもPOPは表示しない
    }
  }
}

// ────────────────────────────────────────
// 間取り保存（最大10件）
// ────────────────────────────────────────
function saveMadori(){
  const data=window._lastResult;
  if(!data){alert('まだ結果がありません');return;}
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  // 間取り図をbase64で保存（幅120pxにリサイズ）
  let imgData='';
  if(madoriSnapshot){
    const cv=document.createElement('canvas');
    const sc=Math.min(120/madoriSnapshot.width,90/madoriSnapshot.height);
    cv.width=Math.floor(madoriSnapshot.width*sc);
    cv.height=Math.floor(madoriSnapshot.height*sc);
    cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
    imgData=cv.toDataURL('image/png');
  }
  list.unshift({...data,id:Date.now(),img:imgData});
  if(list.length>10)list.splice(10);
  localStorage.setItem('madori-saves',JSON.stringify(list));
  const toast=document.getElementById('save-toast');
  if(toast){toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2000);}
}
function gotoGame(){
  const inp=document.getElementById('player-name-input');
  if(inp) window._playerName=inp.value.trim()||'';
  showMadoriBg(false);
  showScreen('screen-game');
  document.getElementById('btn-complete-overlay').classList.remove('visible');
  // 既存のPhaserインスタンスを破棄して新規作成（再起動でツモが変わる問題を防ぐ）
  const existing=document.querySelector('#game-container canvas');
  if(existing){
    // Phaserゲームを完全に破棄
    if(window._phaserGame){window._phaserGame.destroy(true);window._phaserGame=null;}
    gameScene=null; gameStarted=false;
  }
  if(!gameStarted){
    gameStarted=true;
    setTimeout(()=>startPhaserGame(),50);
  }
}
function onCompleteBtn(){
  if(!gameScene)return;
  // プレビュー（赤いパーツ表示）を消す
  gameScene.stopPreviewTween();
  if(gameScene.previewImg){gameScene.previewImg.destroy();gameScene.previewImg=null;}
  gameScene.previewGfx.clear();
  // 収納を描画してスナップショット
  gameScene.fillEmptyAsStorage();
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      captureMadoriSnapshot();
      showMadoriBg(true);
      showScreen('screen-roulette');
      startRoulette();
    });
  });
}
function gotoTitles(){
  showMadoriBg(false);
  showScreen('screen-titles');
  showTitlesReveal();
}
function gotoResult(){
  showMadoriBg(false);
  showScreen('screen-result');
  showResult();
}

// 称号を1つずつ表示するアニメーション
function showTitlesReveal(){
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  const earned=generateTitles(age,walk,rent,roomTypes);
  const saved=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const newTitles=[], ownedTitles=[];
  earned.forEach(t=>{
    if(!saved.includes(t.title)){newTitles.push(t.title);saved.unshift(t.title);}
    else ownedTitles.push(t.title);
  });
  localStorage.setItem('madori-titles',JSON.stringify(saved));
  window._earnedTitles=earned;
  window._newTitles=newTitles;

  const listEl=document.getElementById('title-reveal-list');
  listEl.innerHTML='';
  const ownedSection=document.getElementById('titles-owned-section');
  const ownedChips=document.getElementById('titles-owned-chips');
  if(ownedSection) ownedSection.style.display='none';
  const btn=document.getElementById('title-next-btn');
  btn.style.opacity='0'; btn.style.pointerEvents='none';

  // 全称号を順番に優しく出現（NEW → 既所持の順）
  const allItems=[
    ...newTitles.map(t=>({title:t,isNew:true})),
    ...ownedTitles.map(t=>({title:t,isNew:false}))
  ];

  const INTERVAL=220; // 1件ごとの間隔ms
  const DURATION=320; // フェード時間ms

  allItems.forEach(({title,isNew},i)=>{
    const delay=200+i*INTERVAL;
    setTimeout(()=>{
      const el=document.createElement('div');
      if(isNew){
        el.className='title-new-item';
        el.innerHTML=`<span class="title-new-badge-inline">NEW！</span>${title}`;
      } else {
        el.className='title-owned-chip';
        el.style.display='block';
        el.style.marginBottom='8px';
        el.textContent=title;
      }
      el.style.opacity='0';
      el.style.transform='translateY(12px)';
      el.style.transition=`opacity ${DURATION}ms ease, transform ${DURATION}ms ease`;
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1';
        el.style.transform='translateY(0)';
      }));
    }, delay);
  });

  // 称号ゼロ
  if(earned.length===0){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='title-new-item';
      el.style.cssText='opacity:0;transform:translateY(12px);transition:opacity .38s ease,transform .38s ease;background:rgba(90,74,58,.1);color:var(--brown-light);';
      el.textContent='な し';
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1'; el.style.transform='translateY(0)';
      }));
    }, 200);
  }

  const totalDelay=200+Math.min(allItems.length,1)*INTERVAL+DURATION;
  setTimeout(()=>{
    btn.style.opacity='1'; btn.style.pointerEvents='auto';
    btn.style.animation='titleBtnPulse 2s ease-in-out infinite';
  }, totalDelay);
}

function renderSavesList(){
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  title.textContent='間取り保存一覧';
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  if(list.length===0){
    body.innerHTML='<div class="modal-empty">保存された間取りはありません。<br>ゲームプレイ後に「💾 保存」ボタンで保存できます。</div>';
    return;
  }
  body.innerHTML='';
  list.forEach((s)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(90,74,58,.1);';
    const thumb=document.createElement(s.img?'img':'div');
    thumb.style.cssText='width:80px;height:60px;object-fit:contain;border-radius:6px;border:1px solid rgba(90,74,58,.12);flex-shrink:0;background:#f5f0e8;';
    if(s.img) thumb.src=s.img;
    const info=document.createElement('div');
    info.style.cssText='flex:1;min-width:0;';
    info.innerHTML=`
      <div style="font-family:'Noto Serif JP',serif;font-size:17px;color:var(--brown-dark);font-weight:700;margin-bottom:4px;">${s.labelRaw||s.label||'--'}</div>
      <div style="font-size:11px;color:var(--brown-light);letter-spacing:.04em;">築${s.age??'--'}年　駅${s.walk??'--'}分　${s.rent??'--'}万円</div>
      <div style="font-size:10px;color:var(--brown-light);margin-top:3px;opacity:.7;">${s.date||''}</div>
      ${s.titles&&s.titles.length?`<div style="font-size:10px;color:var(--brown-light);margin-top:4px;opacity:.8;">${s.titles.join('・')}</div>`:''}
    `;
    const btn=document.createElement('button');
    btn.textContent='✕';
    btn.style.cssText='flex-shrink:0;background:none;border:none;color:rgba(90,74,58,.35);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;transition:color .15s;';
    btn.onmouseover=()=>btn.style.color='#c0392b';
    btn.onmouseout=()=>btn.style.color='rgba(90,74,58,.35)';
    btn.onclick=()=>{
      // idで特定して削除（インデックスズレを防ぐ）
      const cur=JSON.parse(localStorage.getItem('madori-saves')||'[]');
      const next=cur.filter(x=>x.id!==s.id);
      localStorage.setItem('madori-saves',JSON.stringify(next));
      renderSavesList();
    };
    row.appendChild(thumb);
    row.appendChild(info);
    row.appendChild(btn);
    body.appendChild(row);
  });
}
function deleteSave(index){
  // 旧実装の互換のため残す（使われない）
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  list.splice(index,1);
  localStorage.setItem('madori-saves',JSON.stringify(list));
  renderSavesList();
}

// ────────────────────────────────────────
// モーダル
// ────────────────────────────────────────
function openModal(type){
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  if(type==='saves'){
    renderSavesList();
  }else{
    const titles=JSON.parse(localStorage.getItem('madori-titles')||'[]');
    title.textContent='称号一覧';
    body.innerHTML=titles.length===0
      ?'<div class="modal-empty">まだ称号がありません。<br>プレイして称号を獲得しよう！</div>'
      :titles.map(t=>`<div style="padding:10px 0;border-bottom:1px solid rgba(90,74,58,.1);font-family:'Noto Serif JP',serif;color:var(--brown-dark)">${t}</div>`).join('');
  }
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal(e){

// ────────────────────────────────────────
// ルーレット
// ────────────────────────────────────────
const ROULETTE_POOLS={
  age:[0,1,2,3,4,5,10,15,20,25,30,35,40,45,50],
  walk:[1,2,3,4,5,7,10,12,15,20,30,40,50],
  rent:[4,5,6,7,8,9,10,12,15,18,20,25,30,35,40,50,75,100]
};
const rouletteKeys=['age','walk','rent'];
const rouletteLocked=[false,false,false];
const rouletteValues=[null,null,null];
const rouletteUnits=['年','分','万円'];
let rouletteIntervals=[null,null,null];
let lockedCount=0;
function startRoulette(){
  lockedCount=0;
  rerollDone[0]=rerollDone[1]=rerollDone[2]=false;
  for(let i=0;i<3;i++){
    rouletteLocked[i]=false; rouletteValues[i]=null;
    document.getElementById('rou-'+i).classList.remove('locked','active-slot','rare');
    document.getElementById('rou-val-'+i).classList.add('spinning');
    const rb=document.getElementById('reroll-btn-'+i);
    if(rb) rb.classList.remove('visible');
    // POPをCSSクラスでリセット（style.displayは使わない）
    const pop=document.querySelector('#rou-'+i+' .reroll-pop');
    if(pop){pop.classList.remove('visible');pop.style.display='';}
    // スロットのonclickをlockRouletteに戻す（クロージャに注意してIIFE使用）
    ;(function(n){ document.getElementById('rou-'+n).onclick=function(){lockRoulette(n);}; })(i);
  }
  document.getElementById('rou-0').classList.add('active-slot');
  document.getElementById('btn-rou-next').classList.remove('visible');
  for(let i=0;i<3;i++){
    if(rouletteIntervals[i])clearInterval(rouletteIntervals[i]);
    (idx=>{
      rouletteIntervals[idx]=setInterval(()=>{
        const pool=ROULETTE_POOLS[rouletteKeys[idx]];
        document.getElementById('rou-val-'+idx).textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
      },80);
    })(i);
  }
}
function lockRoulette(idx){
  if(rouletteLocked[idx])return;
  for(let i=0;i<idx;i++)if(!rouletteLocked[i])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  // レア演出
  if(isRare(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 次のスロットをアクティブに
  if(idx+1<3) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  if(++lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 初回確定後POP表示：再抽選で改善できる値のときだけ表示
      // idx=0(築年数) val>5、idx=1(駅徒歩) val>5 のときPOP表示（idx=2は対象外）
      if(i<2 && !rerollDone[i]){
        const pop=document.querySelector('#rou-'+i+' .reroll-pop');
        if(pop && rouletteValues[i]!==null && rouletteValues[i]>5){
          pop.classList.add('visible');
        }
      }
    }
  }
}

function generateTitles(age,walk,rent,roomTypes){
  // 複数称号を返す（条件に合うものを全部）
  const has=t=>roomTypes.has(t);
  const earned=[];
  if(age<=5&&walk<=5&&rent<=8) earned.push({title:'掘り出し物件の達人',comment:'新しくて駅近で安い！夢の物件を作り上げました。'});
  if(age>=40) earned.push({title:'レトロ愛好家',comment:'年季の入った物件に味わいを感じる間取りすとです。'});
  if(walk<=3) earned.push({title:'駅前派',comment:'徒歩3分以内！毎日の通勤が楽になりそうです。'});
  if(walk>=30) earned.push({title:'静寂の探求者',comment:'駅から離れた場所での静かな暮らし。'});
  if(rent>=50) earned.push({title:'高級志向',comment:'上質な暮らしを追求した間取りです。'});
  if(rent<=6&&walk<=10) earned.push({title:'コスパ王',comment:'リーズナブルな家賃で駅近を確保。'});
  if(has('washitsu')&&has('youshitsu')) earned.push({title:'和洋折衷の使い手',comment:'和室と洋室を組み合わせたセンス溢れる間取り。'});
  if(has('wic')) earned.push({title:'収納マニア',comment:'WICを完備！整理整頓が行き届いた暮らし。'});
  if(has('balcony')) earned.push({title:'採光重視派',comment:'バルコニーで光と風を取り込む間取りです。'});
  if(!has('bath')&&!has('toilet')) earned.push({title:'謎の間取りすと',comment:'お風呂もトイレもない…独自の美学の間取りすとです。'});
  if(earned.length===0) earned.push({title:'間取りすと見習い',comment:'はじめての一歩！経験を積んで素敵な間取りを目指そう。'});
  return earned;
}
function generateTitle(age,walk,rent,roomTypes){
  return generateTitles(age,walk,rent,roomTypes)[0];
}
function countRoomLabel(roomTypes,counts){
  const rooms=(counts['youshitsu']||0)+(counts['washitsu']||0);
  const sup={2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
  const k=counts['kitchen']||0;
  const wc=counts['toilet']||0;
  const bath=counts['bath']||0;
  // WC・B は個数にかかわらず常に表示（0個でも表示）
  const wcStr=`+${wc>1?wc:''}WC`;
  const bStr=`+${bath>1?bath:''}B`;
  const extra=wcStr+bStr;
  if(k===0){
    return (rooms>0?rooms:'')+'R'+extra;
  }
  const kLabel=`K${k>=2?(sup[k]||String(k)):''}`;
  const ldkLabel=rooms===0?kLabel:`${rooms}LD${kLabel}`;
  return ldkLabel+extra;
}
function showResult(){
  const nameEl=document.getElementById('res-player-name');
  if(nameEl){
    const pname=window._playerName||'';
    if(pname){nameEl.textContent=pname+' の間取り';nameEl.style.display='block';}
    else{nameEl.style.display='none';}
  }
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  document.getElementById('res-age').innerHTML=age+'<span class="result-spec-unit">年</span>';
  document.getElementById('res-walk').innerHTML=walk+'<span class="result-spec-unit">分</span>';
  document.getElementById('res-rent').innerHTML=rent+'<span class="result-spec-unit">万</span>';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  // 間取りラベル：+WC等を同行に小さくインライン表示
  const roomLabel=countRoomLabel(roomTypes,counts);
  const ldkMatch=roomLabel.match(/^([^+]+)(.*)/);
  const heroEl=document.getElementById('res-room-label');
  if(heroEl){
    const main=ldkMatch?ldkMatch[1]:roomLabel;
    const sub=ldkMatch?ldkMatch[2]:'';
    heroEl.innerHTML=main+(sub?`<span style="font-size:28px;color:var(--brown-dark);letter-spacing:.04em;vertical-align:middle;font-weight:700;">${sub}</span>`:'');
  }
  // 間取り図プレビュー
  const prevEl=document.getElementById('res-madori-preview');
  if(prevEl&&madoriSnapshot){
    prevEl.innerHTML='';
    const cv=document.createElement('canvas');
    const maxW=Math.min(420,window.innerWidth-24), maxH=320;
    const scale=Math.min(maxW/madoriSnapshot.width,maxH/madoriSnapshot.height);
    cv.width=madoriSnapshot.width*scale; cv.height=madoriSnapshot.height*scale;
    cv.style.cssText='display:block;border-radius:12px;border:1px solid rgba(90,74,58,.12);max-width:100%;margin:0 auto;';
    cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
    prevEl.appendChild(cv);
  }
  // 称号表示：今回条件を満たした全称号（NEWだけ少し目立つ）
  const newTitles=window._newTitles||[];
  const earnedTitles=(window._earnedTitles||[]).map(t=>t.title);
  const titlesWrap=document.getElementById('res-titles-wrap');
  const newRow=document.getElementById('res-titles-new-row');
  const ownedRow=document.getElementById('res-titles-owned-row');
  if(titlesWrap&&newRow&&ownedRow){
    newRow.innerHTML=''; ownedRow.innerHTML='';
    newRow.style.display='none'; ownedRow.style.display='none';
    if(earnedTitles.length>0){
      newRow.style.cssText='display:flex;flex-wrap:wrap;gap:7px;justify-content:center;';
      earnedTitles.forEach(t=>{
        const isNew=newTitles.includes(t);
        const chip=document.createElement('div');
        chip.style.cssText=isNew
          ?'display:inline-flex;align-items:center;gap:5px;background:var(--brown-dark);color:#f5f0e8;font-family:\'Noto Serif JP\',serif;font-size:13px;letter-spacing:.08em;padding:6px 14px;border-radius:4px;'
          :'display:inline-flex;align-items:center;font-family:\'Noto Serif JP\',serif;font-size:12px;letter-spacing:.06em;padding:5px 12px;border-radius:20px;background:rgba(90,74,58,.07);color:var(--brown-light);border:1px solid rgba(90,74,58,.15);';
        chip.innerHTML=isNew?`<span style="font-size:9px;background:rgba(255,255,255,.22);padding:1px 5px;border-radius:2px;letter-spacing:.06em;flex-shrink:0;">NEW</span>${t}`:t;
        newRow.appendChild(chip);
      });
    }
    titlesWrap.style.display=earnedTitles.length?'block':'none';
  }
  window._lastResult={
    name:window._playerName||'マドリスト',
    label:roomLabel,
    labelRaw:roomLabel, age, walk, rent,
    titles:(window._earnedTitles||[]).map(t=>t.title),
    date:new Date().toLocaleDateString('ja-JP'),
  };
}

  {name:'洋室8畳',w:3,h:3,color:0xF5E8C8,label:'洋室\n8畳',type:'youshitsu',  weight:24},
  {name:'和室8畳',w:3,h:3,color:0xC8D8A0,label:'和室\n8畳',type:'washitsu',  weight:19},
  {name:'廊下',   w:1,h:2,color:0xE8E0D4,label:'廊下',     type:'roka',      weight:17},
  {name:'キッチン',w:3,h:2,color:0xFFB870,label:'キッチン', type:'kitchen',   weight:17},

];
const PARTS_WEIGHT_TOTAL=PARTS_DEF.reduce((s,d)=>s+d.weight,0);

function svgToCanvas(dataUrl){
  return new Promise(resolve=>{
    const b64=dataUrl.split(',')[1];
    const bin=atob(b64), bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth||80; cv.height=img.naturalHeight||80;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url); resolve(cv);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

const CS=40,COLS=7,ROWS=8,UI_R=0;
const CANVAS_W=COLS*CS, CANVAS_H=ROWS*CS;
const GENKAN_COLOR=0xD4A870;

class PuzzleGame extends Phaser.Scene{
  constructor(){super('PuzzleGame');}
  sx(c){return c*CS;} sy(r){return r*CS;}

  create(){
    gameScene=this;
    // セッションIDで古いPromiseコールバックを無効化（玄関重複防止）
    this._sessionId=(this._sessionId||0)+1;
    const sessionId=this._sessionId;
    this._storageGfx=null;
    this._storageTexts=[];
    this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    this.boardImgs={};
    this.boardLabels={};
    this.partCount=0;
    this.undoStack=[];
    this.currentDef=null; this.rotation=0;
    this.curC=Math.floor(COLS/2); this.curR=0;
    this.holdDef=null; this.holdUsed=false;
    this.queue=[];
    for(let i=0;i<4;i++)this.queue.push(this.pickRandom());
    this.bgGfx=this.add.graphics().setDepth(0);
    this.gridGfx=this.add.graphics().setDepth(1);
    this.previewGfx=this.add.graphics().setDepth(4);
    this.previewImg=null;
    this.drawBg();
    // テクスチャをロードしてから玄関・ゲーム開始
    const entries=Object.entries(SVG_TEX);
    Promise.all(entries.map(([k,v])=>svgToCanvas(v).then(cv=>{
      if(cv&&!this.textures.exists(k))this.textures.addCanvas(k,cv);
    }))).then(()=>{
      // セッションが変わっていたら（restart済み）何もしない
      if(this._sessionId!==sessionId)return;
      this.placeGenkan();
      this.drawBoard();
      this.nextPiece();
      this.drawUI();
    });
    this.setupKeys();
  }

  setupKeys(){
    const K=Phaser.Input.Keyboard.KeyCodes;
    this.xKey    =this.input.keyboard.addKey(K.X);
    this.zKey    =this.input.keyboard.addKey(K.Z);
    this.ctrlKey =this.input.keyboard.addKey(K.CTRL);
    this.cKey    =this.input.keyboard.addKey(K.C);
    this.shiftKey=this.input.keyboard.addKey(K.SHIFT);
    this.leftKey =this.input.keyboard.addKey(K.LEFT);
    this.rightKey=this.input.keyboard.addKey(K.RIGHT);
    this.downKey =this.input.keyboard.addKey(K.DOWN);
    this.upKey   =this.input.keyboard.addKey(K.UP);
    this.spaceKey=this.input.keyboard.addKey(K.SPACE);
    this.enterKey=this.input.keyboard.addKey(K.ENTER);
    this.xKey.on('down',()=>this.rotatePiece(1));
    this.zKey.on('down',()=>{ if(this.ctrlKey.isDown)this.doUndo(); else this.rotatePiece(-1); });
    this.cKey.on('down',()=>this.doHold());
    this.shiftKey.on('down',()=>this.doHold());
    this.spaceKey.on('down',()=>this.placeAtCursor());
    this.enterKey.on('down',()=>this.placeAtCursor());
    this._moveRepeat={timer:null,delay:200,interval:80};
    const startRepeat=(dc,dr)=>{
      this.moveCursor(dc,dr);
      const rep=this._moveRepeat; clearTimeout(rep.timer);
      rep.timer=setTimeout(()=>{rep.timer=setInterval(()=>this.moveCursor(dc,dr),rep.interval);},rep.delay);
    };
    const stopRepeat=()=>{
      const rep=this._moveRepeat; clearTimeout(rep.timer); clearInterval(rep.timer); rep.timer=null;
    };
    this.leftKey.on('down',()=>startRepeat(-1,0)); this.rightKey.on('down',()=>startRepeat(1,0));
    this.downKey.on('down',()=>startRepeat(0,1));  this.upKey.on('down',()=>startRepeat(0,-1));
    this.leftKey.on('up',stopRepeat); this.rightKey.on('up',stopRepeat);
    this.downKey.on('up',stopRepeat); this.upKey.on('up',stopRepeat);
    // タッチ・クリック操作（グリッドのみ。回転/ホールドはHTMLボタン）
    this.input.on('pointerdown',(p)=>{
      const canvas=this.game.canvas;
      const scaleX=CANVAS_W/canvas.offsetWidth;
      const scaleY=CANVAS_H/canvas.offsetHeight;
      const bx=p.x*scaleX, by=p.y*scaleY;
      if(!this.currentDef)return;
      const shape=this.getShape(this.currentDef,this.rotation);
      let tc=Phaser.Math.Clamp(Math.floor(bx/CS)-Math.floor(shape[0].length/2),0,COLS-shape[0].length);
      let tr=Phaser.Math.Clamp(Math.floor(by/CS)-Math.floor(shape.length/2),0,ROWS-shape.length);
      const isSamePos=(tc===this.curC&&tr===this.curR);
      if(isSamePos){
        // 同じ場所タップ→即配置
        this.placeAtCursor();
      }else{
        // 違う場所タップ→カーソル移動
        this.curC=tc; this.curR=tr;
        this.updatePreview(this.curC,this.curR);
      }
    });
  }

  pickRandom(){
    let r=Math.random()*PARTS_WEIGHT_TOTAL;
    for(const d of PARTS_DEF){r-=d.weight;if(r<=0)return d;}
    return PARTS_DEF[PARTS_DEF.length-1];
  }
  getShape(def,rot){
    let s=[];
    for(let r=0;r<def.h;r++){s.push([]);for(let c=0;c<def.w;c++)s[r].push(1);}
    for(let i=0;i<(rot%4);i++){
      const nr=[],rows=s.length,cols=s[0].length;
      for(let c=0;c<cols;c++){nr.push([]);for(let r=rows-1;r>=0;r--)nr[c].push(s[r][c]);}
      s=nr;
    }
    return s;
  }

  nextPiece(){
    // checkNoPlace用に「holdなし時にholdすると来るピース」= shift前のqueue[0]を保存
    const queueNextBeforeShift=this.queue[0];
    this.currentDef=this.queue.shift(); this.queue.push(this.pickRandom());
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this.drawUI(); this.updatePreview(this.curC,this.curR);
    this.checkNoPlace(queueNextBeforeShift);
  }
  rotatePiece(dir=1){
    if(!this.currentDef)return;
    this.rotation=(this.rotation+dir+4)%4;
    this.updatePreview(this.curC,this.curR); this.drawUI();
  }
  doHold(){
    if(!this.currentDef)return;
    if(this.holdDef){[this.holdDef,this.currentDef]=[this.currentDef,this.holdDef];}
    else{this.holdDef=this.currentDef;this.currentDef=this.queue.shift();this.queue.push(this.pickRandom());}
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this.updatePreview(this.curC,this.curR); this.drawUI();
  }
  doUndo(){
    if(this.undoStack.length===0)return;
    const state=this.undoStack.pop();
    this.grid=state.grid;
    this.currentDef=state.currentDef; this.rotation=state.rotation;
    this.queue=state.queue.slice(); this.holdDef=state.holdDef;
    this.holdUsed=state.holdUsed; this.partCount=state.partCount;
    // 全ビジュアルを破棄して再構築
    this._destroyAllBoardVisuals();
    this.rebuildBoardVisuals();
    this.drawBoard(); this.drawUI();
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.updatePreview(this.curC,this.curR);
    document.getElementById('btn-complete-overlay').classList.remove('visible');
    // doUndo後はholdなし時にholdすると来るピース=queue[0]を渡す
    this.checkNoPlace(this.queue[0]);
  }

  // ★ ビジュアル全破棄（boardImgs + boardLabels を Map として管理）
  _destroyAllBoardVisuals(){
    Object.values(this.boardImgs).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardImgs={};
    Object.values(this.boardLabels).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardLabels={};
  }

  // ★ ビジュアル再構築（グリッドを走査、pid単位で1度だけ生成）
  rebuildBoardVisuals(){
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=this.grid[r][c];
        if(!cell||drawn.has(cell.pid))continue;
        drawn.add(cell.pid);
        this._createCellVisual(cell);
      }
    }
  }

  // ★ 1セル分のビジュアル生成（img + label を boardImgs/boardLabels[pid] に登録）
  _createCellVisual(cell){
    // 既に生成済みなら何もしない（重複防止）
    if(this.boardImgs.hasOwnProperty(cell.pid)) return;
    const px=this.sx(cell.mnC), py=this.sy(cell.mnR);
    const pw=(cell.mxC-cell.mnC+1)*CS, ph=(cell.mxR-cell.mnR+1)*CS;
    const pid=cell.pid;
    // 画像
    if(cell.fixed){
      // 玄関はGraphicsで直接描画（SVGの文字化け回避）
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(0xD4A870,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      g.lineStyle(3,0x986830,1); g.strokeRect(px+2,py+2,pw-4,ph-4);
      g.lineStyle(1.5,0x986830,1); g.lineBetween(px+2,py+ph/2,px+pw-2,py+ph/2);
      this.boardImgs[pid]=g;
    }else if(cell.type==='washitsu'){
      const g=this.add.graphics().setDepth(2);
      this.drawWashitsuOnGraphics(g,px,py,pw,ph);
      this.boardImgs[pid]=g;
    }else if(this.textures.exists(cell.type)){
      const rot=(cell.rotation||0)%4;
      const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
      const img=this.add.image(px+pw/2,py+ph/2,cell.type)
        .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setDepth(2);
      this.boardImgs[pid]=img;
    }else{
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(cell.color,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      this.boardImgs[pid]=g;
    }
    // ラベルテキスト追加（中央配置・サイズをパーツに合わせる）
    const labelText=cell.fixed?'玄関':(cell.label||'');
    const labelFs=cell.fixed?13:Math.min(11,Math.floor(pw*0.28),Math.floor(ph*0.32));
    const lbl=this.add.text(px+pw/2, py+ph/2, labelText,{
      fontSize:labelFs+'px',
      fill:cell.fixed?'#604010':'#3a3028',
      align:'center',fontFamily:'Meiryo,sans-serif',
      stroke:'#ffffffcc',strokeThickness:2,
      wordWrap:{width:pw-4}
    }).setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels[pid]=lbl;
  }

  placeGenkan(){
    const gx=Phaser.Math.Between(1,COLS-3);
    const pid='genkan';
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)
      this.grid[ROWS-2+dr][gx+dc]={color:GENKAN_COLOR,fixed:true,pid,
        mnR:ROWS-2,mxR:ROWS-1,mnC:gx,mxC:gx+1,label:'玄関',rotation:0};
    this._createCellVisual(this.grid[ROWS-2][gx]);
  }

  checkNoPlace(queueNextForHold=null){
    if(document.getElementById('btn-complete-overlay').classList.contains('visible'))return;

    const canPlaceAnywhere=(def)=>{
      if(!def)return false;
      for(let rot=0;rot<4;rot++){
        const shape=this.getShape(def,rot);
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.canPlace(shape,c,r))return true;
      }
      return false;
    };

    // current が置ける → 続行
    if(canPlaceAnywhere(this.currentDef))return;
    // holdDef が置ける → holdすれば続行
    if(canPlaceAnywhere(this.holdDef))return;
    // holdなし時にholdを押すと来るピース（nextPieceからはshift前のqueue[0]、
    // doUndoからはqueue[0]）が置ける → hold操作で引き出せる → 続行
    if(canPlaceAnywhere(queueNextForHold))return;
    // queue内のいずれかが置ける → holdを繰り返せばいつか引き出せる → 続行
    if(this.queue.some(d=>canPlaceAnywhere(d)))return;

    // 全て置けない → 終了
    this.fillEmptyAsStorage();
    document.getElementById('btn-complete-overlay').classList.add('visible');
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
  }
  canPlace(shape,c,r){
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||this.grid[nr][nc])return false;
      }
    return true;
  }
  placePiece(def,shape,c,r){
    this.undoStack.push({
      grid:this.grid.map(row=>row.map(cell=>cell?{...cell}:null)),
      currentDef:def,rotation:this.rotation,queue:this.queue.slice(),
      holdDef:this.holdDef,holdUsed:this.holdUsed,partCount:this.partCount
    });
    if(this.undoStack.length>1)this.undoStack.shift();
    const pid='p'+(++this.partCount);
    const color=def.color;
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++)
        if(shape[dr][dc])
          this.grid[r+dr][c+dc]={color,pid,type:def.type,rotation:this.rotation,
            mnR:r,mxR:r+shape.length-1,mnC:c,mxC:c+shape[0].length-1,label:def.label};
    this._createCellVisual(this.grid[r][c]);
    this.drawBoard();
    this.nextPiece();
  }

  drawBg(){
    const g=this.bgGfx; g.clear();
    g.fillStyle(0xf8f4ee,1); g.fillRect(0,0,COLS*CS,ROWS*CS);
    g.lineStyle(1,0xd8cfc4,1);
    for(let r=0;r<=ROWS;r++)g.lineBetween(0,this.sy(r),COLS*CS,this.sy(r));
    for(let c=0;c<=COLS;c++)g.lineBetween(this.sx(c),0,this.sx(c),ROWS*CS);
    g.lineStyle(3,0x8a7060,1); g.strokeRect(0,0,COLS*CS,ROWS*CS);
  }
  drawBoard(){
    const g=this.gridGfx; g.clear();
    const drawn=new Set();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=this.grid[r][c];
      if(!cell||drawn.has(cell.pid))continue;
      drawn.add(cell.pid);
      const px=this.sx(cell.mnC),py=this.sy(cell.mnR);
      const pw=(cell.mxC-cell.mnC+1)*CS,ph=(cell.mxR-cell.mnR+1)*CS;
      if(!this.boardImgs.hasOwnProperty(cell.pid)){g.fillStyle(cell.color,1);g.fillRect(px+1,py+1,pw-2,ph-2);}
      g.lineStyle(2,0x705840,1); g.strokeRect(px+1,py+1,pw-2,ph-2);
    }
  }

  drawUI(){
    // Phaser内のUIオブジェクトは不要なのでクリアのみ
    if(this._uiObjs){this._uiObjs.forEach(o=>o&&o.destroy()); this._uiObjs=[];}
    // HTML側の上部バーを更新
    this._updateTopBar();
  }

  _updateTopBar(){
    const badge=document.getElementById('part-count-badge');
    if(badge) badge.textContent=this.partCount+'個';
    const slots=[
      {def:this.queue[1], canvasId:'canvas-next2', nameId:'name-next2'},
      {def:this.queue[0], canvasId:'canvas-next1', nameId:'name-next1'},
      {def:this.holdDef,  canvasId:'canvas-hold',  nameId:'name-hold'},
    ];
    for(const {def,canvasId,nameId} of slots){
      const cv=document.getElementById(canvasId);
      const nm=document.getElementById(nameId);
      if(!cv)continue;
      const W=parseInt(cv.getAttribute('width')||'56');
      const H=parseInt(cv.getAttribute('height')||'56');
      cv.width=W; cv.height=H;
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,W,H);
      if(nm) nm.textContent=def?(def.name||def.label?.replace('\n','')):'なし';
      if(!def)continue;
      const shape=this.getShape(def,0);
      const sh=shape.length, sw=shape[0].length;
      const csz=Math.min(Math.floor((W-6)/sw), Math.floor((H-6)/sh));
      const ox=Math.floor((W-sw*csz)/2), oy=Math.floor((H-sh*csz)/2);

      if(def.type==='washitsu'){
        // 和室：畳パターンをcanvasで描く
        ctx.fillStyle='#eaf2da';
        ctx.fillRect(ox,oy,sw*csz,sh*csz);
        ctx.strokeStyle='#5a8040'; ctx.lineWidth=2;
        ctx.strokeRect(ox+1,oy+1,sw*csz-2,sh*csz-2);
        // 格子線
        ctx.strokeStyle='#7a9a55'; ctx.lineWidth=0.8;
        for(let r=1;r<sh;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*csz);ctx.lineTo(ox+sw*csz,oy+r*csz);ctx.stroke();}
        for(let c=1;c<sw;c++){ctx.beginPath();ctx.moveTo(ox+c*csz,oy);ctx.lineTo(ox+c*csz,oy+sh*csz);ctx.stroke();}
      } else if(this.textures.exists(def.type)){
        // SVGテクスチャが既にロード済み→ Phaser内部のcanvasから取り出してdrawImage
        const frame=this.textures.getFrame(def.type);
        if(frame&&frame.source&&frame.source.image){
          ctx.drawImage(frame.source.image, ox, oy, sw*csz, sh*csz);
        } else {
          // フォールバック：色ブロック
          ctx.fillStyle='#'+def.color.toString(16).padStart(6,'0');
          ctx.fillRect(ox+1,oy+1,sw*csz-2,sh*csz-2);
        }
      } else {
        // テクスチャなし：色ブロック＋グリッド
        const hex='#'+def.color.toString(16).padStart(6,'0');
        ctx.fillStyle=hex;
        ctx.fillRect(ox+1,oy+1,sw*csz-2,sh*csz-2);
        ctx.strokeStyle='rgba(90,74,58,.5)'; ctx.lineWidth=1;
        for(let r=1;r<sh;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*csz);ctx.lineTo(ox+sw*csz,oy+r*csz);ctx.stroke();}
        for(let c=1;c<sw;c++){ctx.beginPath();ctx.moveTo(ox+c*csz,oy);ctx.lineTo(ox+c*csz,oy+sh*csz);ctx.stroke();}
      }
      // 外枠
      ctx.strokeStyle='rgba(90,74,58,.5)'; ctx.lineWidth=1.5;
      ctx.strokeRect(ox+0.75,oy+0.75,sw*csz-1.5,sh*csz-1.5);
      // ラベル文字
      const labelStr=def.label?def.label.replace('\n',' '):def.name;
      ctx.fillStyle='rgba(58,42,26,0.75)';
      ctx.font=`bold ${Math.max(8,Math.min(10,csz*0.6))}px Meiryo,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(labelStr.split('\n')[0], ox+sw*csz/2, oy+sh*csz/2);
    }
  }

  moveCursor(dc,dr){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    this.curC=Phaser.Math.Clamp(this.curC+dc,0,COLS-shape[0].length);
    this.curR=Phaser.Math.Clamp(this.curR+dr,0,ROWS-shape.length);
    this.updatePreview(this.curC,this.curR);
  }
  placeAtCursor(){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    if(!this.canPlace(shape,this.curC,this.curR))return;
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.placePiece(this.currentDef,shape,this.curC,this.curR);
  }
  stopPreviewTween(){
    if(this._previewTween){this._previewTween.stop();this._previewTween=null;}
    this._clearPreviewLabels();
  }
  updatePreview(c,r){
    // 完成ボタン表示中はプレビューを出さない
    if(document.getElementById('btn-complete-overlay').classList.contains('visible'))return;
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this._clearPreviewLabels();
    this.previewGfx.clear();
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    const ok=this.canPlace(shape,c,r);
    const g=this.previewGfx;
    for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++){
      if(!shape[dr][dc])continue;
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      g.fillStyle(ok?0x88cc88:0xcc4444,ok?0.2:0.22);
      g.fillRect(this.sx(nc)+1,this.sy(nr)+1,CS-2,CS-2);
    }
    // ok/NGどちらでも画像プレビューを表示（赤くても何のパーツか分かるように）
    {
      const pw=shape[0].length*CS,ph=shape.length*CS;
      const px=this.sx(c),py=this.sy(r);
      let target=null;
      if(this.currentDef.type==='washitsu'){
        const g2=this.add.graphics().setDepth(4);
        this.drawWashitsuOnGraphics(g2,px,py,pw,ph);
        g2.setAlpha(ok?0.75:0.65);
        // NG時は赤いオーバーレイをgraphicsで追加
        if(!ok){
          g2.fillStyle(0xff4444,0.12);
          g2.fillRect(px,py,pw,ph);
        }
        target=g2;
      }else if(this.textures.exists(this.currentDef.type)){
        const rot=this.rotation%4,dw=rot%2===0?pw:ph,dh=rot%2===0?ph:pw;
        target=this.add.image(px+pw/2,py+ph/2,this.currentDef.type)
          .setDisplaySize(dw-2,dh-2).setAngle(rot*90)
          .setAlpha(ok?0.75:0.68).setDepth(4);
        if(!ok) target.setTint(0xffcccc);
      }
      if(target){
        this.previewImg=target;
        // ok/NG どちらでも点滅（NG時は赤みがかった範囲で点滅）
        const alphaFrom=ok?0.75:0.68;
        const alphaTo  =ok?0.35:0.25;
        this._previewTween=this.tweens.add({targets:target,alpha:{from:alphaFrom,to:alphaTo},duration:600,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      }
      // プレビュー中ラベルテキスト（全パーツ共通）
      {
        const pw2=shape[0].length*CS, ph2=shape.length*CS;
        const px2=this.sx(c), py2=this.sy(r);
        const lbl=this.add.text(px2+pw2/2, py2+ph2/2, this.currentDef.label||this.currentDef.name,{
          fontSize:'10px',fill:'#3a3028',align:'center',fontFamily:'Meiryo,sans-serif',
          stroke:'#ffffffcc',strokeThickness:2
        }).setOrigin(0.5,0.5).setDepth(6).setAlpha(ok?0.95:0.75);
        if(!this._previewLabels) this._previewLabels=[];
        this._previewLabels.push(lbl);
      }
    }
  }

  _clearPreviewLabels(){
    if(this._previewLabels){
      this._previewLabels.forEach(l=>{if(l&&l.destroy)l.destroy();});
      this._previewLabels=[];
    }
  }

  fillEmptyAsStorage(){
    if(this._storageGfx){this._storageGfx.destroy();}
    // 前回生成した収納テキストを全て破棄（重複防止）
    if(this._storageTexts){this._storageTexts.forEach(t=>{if(t&&t.destroy)t.destroy();});}
    this._storageTexts=[];
    this._storageGfx=this.add.graphics().setDepth(2);
    const g=this._storageGfx;
    const storageColor=0xC9A882;  // 暗めブラウンベージュ
    const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));

    for(let r0=0;r0<ROWS;r0++)for(let c0=0;c0<COLS;c0++){
      if(this.grid[r0][c0]||visited[r0][c0])continue;
      // BFSで連結した空きマスを収集
      const cells=[];
      const queue=[[r0,c0]];
      visited[r0][c0]=true;
      while(queue.length){
        const [r,c]=queue.shift();
        cells.push([r,c]);
        for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!this.grid[nr][nc]&&!visited[nr][nc]){
            visited[nr][nc]=true;
            queue.push([nr,nc]);
          }
        }
      }
      // 塊全体をベージュで塗る（境界線なし・隙間なし）
      for(const [r,c] of cells){
        const px=this.sx(c),py=this.sy(r);
        g.fillStyle(storageColor,0.9);
        g.fillRect(px,py,CS,CS);  // 隙間なし
      }
      // 塊の重心（塊に含まれる全マスの平均位置）に「収納」を表示
      const minR=Math.min(...cells.map(([r])=>r));
      const maxR=Math.max(...cells.map(([r])=>r));
      const minC=Math.min(...cells.map(([,c])=>c));
      const maxC=Math.max(...cells.map(([,c])=>c));
      // 重心計算
      const cx=cells.reduce((s,[,c])=>s+this.sx(c)+CS/2,0)/cells.length;
      const cy=cells.reduce((s,[r])=>s+this.sy(r)+CS/2,0)/cells.length;
      const blockW=(maxC-minC+1)*CS;
      const blockH=(maxR-minR+1)*CS;
      // 1マスのとき小さく、複数マスのとき少し大きく
      const fs=cells.length===1?8:Math.min(11, Math.floor(Math.sqrt(cells.length)*5));
      const t=this.add.text(cx, cy, '収納', {
        fontSize:fs+'px',fill:'#6a4e2e',align:'center',
        fontFamily:'Meiryo,sans-serif',stroke:'#ffffffdd',strokeThickness:2,
        wordWrap:{width:CS*Math.min(cells.length,3)-4}
      }).setOrigin(0.5,0.5).setDepth(3);
      this._storageTexts.push(t);
    }
  }

  drawWashitsuOnGraphics(g,px,py,pw,ph){
    g.fillStyle(0xeaf2da,1);g.fillRect(px,py,pw,ph);
    const cw2=pw/2,cw3=pw/3,ch=ph/4;
    this.drawTatami(g,px,py,cw2,ch,true);this.drawTatami(g,px+cw2,py,cw2,ch,true);
    this.drawTatami(g,px,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px+cw3,py+ch,cw3,ch,true);this.drawTatami(g,px+cw3,py+ch*2,cw3,ch,true);
    this.drawTatami(g,px+cw3*2,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px,py+ch*3,cw2,ch,true);this.drawTatami(g,px+cw2,py+ch*3,cw2,ch,true);
    g.lineStyle(3,0x5a8040,1);g.strokeRect(px+1,py+1,pw-2,ph-2);
  }
  drawTatami(g,x,y,w,h,horizontal){
    if(w<=2||h<=2)return;
    const p=2;
    g.fillStyle(0xe0eeca,1);g.fillRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(1,0x7a9a55,1);g.strokeRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(.5,0x8aab6a,.55);
    if(horizontal){for(let ly=y+p+4;ly<y+h-p;ly+=4)g.lineBetween(x+p+2,ly,x+w-p-2,ly);}
    else{for(let lx=x+p+4;lx<x+w-p;lx+=4)g.lineBetween(lx,y+p+2,lx,y+h-p-2);}
  }
}

function startPhaserGame(){
  // topBarとbottomBarの実際の高さを取得
  const topBarH=document.getElementById('game-top-bar')?.offsetHeight||80;
  const botBarH=document.getElementById('game-bottom-bar')?.offsetHeight||90;
  const availH=window.innerHeight-topBarH-botBarH-2;
  const availW=window.innerWidth;
  const scaleRatio=Math.min(availW/CANVAS_W, availH/CANVAS_H, 1);
  window._phaserGame=new Phaser.Game({
    type:Phaser.AUTO,
    width:CANVAS_W,height:CANVAS_H,
    backgroundColor:'#f0ece6',
    parent:'game-container',
    scene:PuzzleGame,
    scale:{mode:Phaser.Scale.NONE,zoom:scaleRatio}
  });
}

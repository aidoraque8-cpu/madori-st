<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>間取りすと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#f5f0e8;
  --warm:#e8ddd0;
  --brown:#5a4a3a;
  --brown-light:#8a7060;
  --brown-dark:#3a2a1a;
  --accent:#c8a060;
  --accent-light:#e8c880;
  --green:#6a8a50;
  --blue:#5080a8;
}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:env(safe-area-inset-top);}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 24px 24px;}
.screen.active{display:flex;}

/* ── ① スタート ── */
#screen-start{background:var(--cream);position:relative;overflow:hidden;justify-content:center;}
#screen-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,160,96,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 20%,rgba(106,138,80,.08) 0%,transparent 60%);pointer-events:none;}
.logo-wrap{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(90,74,58,.15));}
.logo-title{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);letter-spacing:.15em;line-height:1;}
.logo-sub{font-size:12px;color:var(--brown-light);letter-spacing:.3em;margin-top:8px;}
.btn-start{display:block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;letter-spacing:.2em;padding:22px 80px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(58,42,26,.25);animation:fadeUp .8s .2s ease both;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(58,42,26,.32);}
.btn-start:hover::after{background:rgba(255,255,255,.06);}
.btn-start:active{transform:translateY(0);}
.start-sub-btns{display:flex;gap:24px;margin-top:36px;animation:fadeUp .8s .4s ease both;}
.btn-sub{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);font-size:12px;letter-spacing:.15em;padding:10px 24px;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-sub:hover{border-color:var(--brown-light);color:var(--brown);background:rgba(90,74,58,.05);}

/* ── ② ゲーム画面 ── */
#screen-game{
  display:none;flex-direction:column;align-items:stretch;
  padding:0;position:relative;background:var(--cream);
  overflow:hidden;width:100%;height:100vh;
}
#screen-game.active{display:flex;}
#game-container{
  flex:1;display:flex;justify-content:center;align-items:center;
  overflow:hidden;min-height:0;position:relative;
}
#game-container canvas{display:block;}

/* ── 上部バー（2段） ── */
#game-top-bar{
  display:flex;flex-direction:column;flex-shrink:0;
  background:rgba(245,240,232,.98);
  position:relative;z-index:30;
}
/* 1段目：設置数 + ナビボタン */
#game-top-row1{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px 3px;gap:8px;
}
/* 設置数グリッド */
#part-count-grid{
  display:grid;grid-template-columns:repeat(4,auto);
  gap:1px 8px;font-size:10px;color:var(--brown-light);
  font-family:'Noto Sans JP',sans-serif;letter-spacing:.02em;flex:1;
}
.pc-item{display:flex;align-items:center;gap:3px;white-space:nowrap;}
.pc-name{color:var(--brown-light);font-size:9px;min-width:3em;}
.pc-count{color:var(--brown-dark);font-weight:700;font-size:11px;min-width:1.4em;text-align:right;}
/* ナビボタン */
#game-nav-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-nav{background:none;border:1px solid rgba(90,74,58,.2);color:var(--brown-light);
  font-size:9px;letter-spacing:.04em;padding:4px 8px;border-radius:6px;
  cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn-nav:active{background:rgba(90,74,58,.1);}

/* 2段目：次次/次 | 現在パーツ | 保留 */
#game-top-row2{
  display:flex;align-items:center;justify-content:center;
  padding:3px 8px 4px;gap:6px;
}
/* 次のパーツ縦並び（左） */
#next-col{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 7px;flex-shrink:0;
}
.next-row{display:flex;flex-direction:column;align-items:center;gap:1px;}
.next-sublabel{font-size:8px;color:var(--brown-light);letter-spacing:.06em;}
.next-sublabel.em{color:var(--brown);font-weight:700;}

/* 現在パーツ（中央・大きく・ドラッグ可） */
#current-piece-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:rgba(200,160,96,.08);border:2px solid var(--accent);border-radius:10px;
  padding:4px 6px;flex-shrink:0;cursor:grab;user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  position:relative;
}
#current-piece-wrap:active{cursor:grabbing;}
#current-piece-wrap .piece-label{font-size:9px;color:var(--accent);letter-spacing:.1em;font-weight:700;}
#canvas-current{display:block;}

/* ドラッグゴースト */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9000;
  opacity:0.8;display:none;transform:translate(-50%,-50%);
}

/* 保留（右） */
#hold-col{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(200,160,96,.06);border:1.5px solid var(--accent);border-radius:8px;
  padding:4px 7px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;
  min-width:58px;transition:background .15s,border-color .15s;
}
#hold-col.drag-over{background:rgba(200,160,96,.3);border-color:var(--brown-dark);}
#hold-col:active{background:rgba(200,160,96,.18);}
.hold-label{font-size:9px;color:var(--accent);letter-spacing:.1em;font-weight:700;}
#hold-hint{font-size:8px;color:var(--brown-light);margin-top:0;}

/* ── 下部ボタンバー ── */
#game-bottom-bar{
  display:flex;flex-shrink:0;
  background:rgba(245,240,232,.97);
  z-index:50;padding:14px 16px 22px;
  align-items:center;justify-content:center;gap:16px;
}
/* 戻すボタン */
.btn-undo{
  background:#fff;border:1.5px solid rgba(90,74,58,.22);color:var(--brown);
  font-size:12px;letter-spacing:.04em;padding:15px 20px 12px;border-radius:16px;
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;
  align-items:center;gap:5px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;user-select:none;
  box-shadow:0 1px 4px rgba(90,74,58,.08);
}
.btn-undo:active{background:rgba(90,74,58,.08);transform:scale(.93);}
.btn-undo .undo-icon{font-size:26px;line-height:1.1;}
.btn-undo .undo-label{font-size:10px;color:var(--brown-light);}
/* 回転ボタン */
#rotate-unit{
  display:flex;align-items:center;gap:0;
  background:var(--brown-dark);border-radius:22px;
  box-shadow:0 3px 10px rgba(58,42,26,.28);overflow:hidden;
}
.btn-rotate-new{
  background:transparent;border:none;color:#f5f0e8;
  padding:16px 26px 14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:background .15s;-webkit-tap-highlight-color:transparent;user-select:none;
}
.btn-rotate-new:active{background:rgba(255,255,255,.15);}
.btn-rotate-new .rot-icon{font-size:30px;line-height:1.1;}
.btn-rotate-new .rot-label{font-size:10px;color:rgba(245,240,232,.65);letter-spacing:.04em;}
#rotate-divider{width:1px;background:rgba(255,255,255,.15);align-self:stretch;margin:12px 0;}

/* 完成ボタン */
#btn-complete-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:auto;}
#btn-complete-overlay.visible{display:block;}
#btn-complete-overlay button{
  background:#3a2a1a;color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:.2em;
  padding:20px 56px;border:2px solid rgba(200,160,96,.7);border-radius:6px;
  cursor:pointer;animation:gentlePulse 2s ease-in-out infinite;
}
#btn-complete-overlay button:hover{background:#2a1a0a;animation:none;transform:scale(1.04);transition:transform .15s;}

/* ── ③ ルーレット ── */
#screen-roulette{background:rgba(245,240,232,0.82);}
.roulette-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--brown-dark);letter-spacing:.15em;margin-bottom:28px;text-align:center;}
/* スロットのラッパー：高さを固定してブレを防ぐ */
.roulette-item-wrap{width:340px;height:120px;margin-bottom:40px;position:relative;flex-shrink:0;}
.roulette-item{
  position:absolute;inset:0;
  background:#fff;border:1.5px solid rgba(90,74,58,.15);border-radius:10px;
  padding:20px 24px;cursor:pointer;
  transition:border-color .2s,outline-color .2s;
  overflow:visible;opacity:.45;pointer-events:none;
  outline:3px solid transparent;outline-offset:2px;
}
.roulette-item.active-slot{opacity:1;pointer-events:auto;border-color:var(--accent);outline-color:rgba(200,160,96,.4);}
.roulette-item.locked{opacity:1;pointer-events:none;border-color:rgba(90,74,58,.2);outline-color:transparent;animation:none;cursor:default;background:linear-gradient(135deg,#fffbf5,#fff8ec);}
.roulette-item.locked .reroll-slot-btn{pointer-events:auto;}
.roulette-item-label{font-size:14px;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:6px;font-weight:700;text-align:center;}
.roulette-item-value{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);transition:color .1s;line-height:1.1;text-align:center;display:block;}
.roulette-item-value.spinning{animation:spin .08s linear infinite;color:var(--brown-light);}
/* レア値：金色グロー */
.roulette-item.rare .roulette-item-value{
  background:linear-gradient(135deg,#c8860a,#f5c842,#e8a020,#f5c842);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShine 2s linear infinite;
  filter:drop-shadow(0 0 6px rgba(200,160,10,.5));
  font-size:44px;
}
@keyframes goldShine{0%{background-position:0% center}100%{background-position:200% center}}
.roulette-item.rare{border-color:#c8a020;background:linear-gradient(135deg,#fffbec,#fff8d6);}
.roulette-item.rare::before{content:'✦ PREMIUM';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:.2em;color:#c8860a;background:#fff8d6;padding:2px 10px;border-radius:20px;border:1px solid #e8c040;white-space:nowrap;}
/* tap-hint */
.roulette-item .tap-hint{display:block;font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;font-weight:500;letter-spacing:.05em;text-align:center;margin-top:4px;}
.roulette-item.active-slot .tap-hint{opacity:1;}
.roulette-item.locked .tap-hint{display:none;}
.roulette-item.locked::after{content:'✓ 確定';position:absolute;top:12px;right:14px;font-size:11px;color:var(--brown-light);letter-spacing:.1em;}
.roulette-item.rare.locked::after{color:#c8860a;}
/* 各スロット個別の再抽選ボタン */
.reroll-slot-btn{
  position:absolute;right:-16px;bottom:-20px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.08em;
  padding:10px 20px;border-radius:24px;border:none;cursor:pointer;
  white-space:nowrap;box-shadow:0 3px 10px rgba(58,42,26,.35);
  transition:opacity .2s,transform .2s;
  visibility:hidden;opacity:0;
  z-index:20;pointer-events:none;
  will-change:transform;
}
.reroll-slot-btn.visible{visibility:visible;opacity:1;pointer-events:auto;}
.reroll-slot-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(58,42,26,.45);}
.reroll-slot-btn.used{background:rgba(90,74,58,.25);color:var(--brown-light);cursor:not-allowed;box-shadow:none;}
.reroll-slot-btn.used:hover{transform:none;box-shadow:none;}
/* 再抽選POP */
.reroll-pop{
  position:absolute;left:10px;top:10px;
  font-size:10px;font-weight:700;letter-spacing:.06em;
  color:#fff;background:#2a9d8f;padding:3px 10px;border-radius:20px;
  border:none;white-space:nowrap;pointer-events:none;
  visibility:hidden;opacity:0;transition:opacity .2s;
  box-shadow:0 2px 6px rgba(42,157,143,.35);z-index:5;
}
.reroll-pop.visible{visibility:visible;opacity:1;}
@keyframes slotPulse{0%,100%{outline-color:rgba(200,160,96,.25);}50%{outline-color:rgba(200,160,96,.5);}}
@keyframes titleBtnPulse{0%,100%{box-shadow:0 0 0 0 rgba(58,42,26,0),0 4px 14px rgba(58,42,26,.22);}60%{box-shadow:0 0 0 6px rgba(58,42,26,.12),0 4px 14px rgba(58,42,26,.22);}}
.btn-roulette-next{margin-top:32px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;padding:16px 56px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;}
.btn-roulette-next.visible{opacity:1;pointer-events:auto;}
.btn-roulette-next:hover{transform:translateY(-2px);}

/* ── ④ 結果 ── */
#screen-result{background:rgba(245,240,232,0.82);padding-top:20px;}
.result-wrap{text-align:center;max-width:440px;width:100%;}
.result-title-hero{font-family:'Noto Serif JP',serif;font-size:22px;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:10px;animation:popIn .5s ease both;text-shadow:0 2px 20px rgba(200,160,96,.5);}
.result-ldk-hero{font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:var(--brown-dark);line-height:1;margin-bottom:20px;letter-spacing:.04em;}
.result-spec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.result-spec-card{background:#fff;border:1px solid rgba(90,74,58,.1);border-radius:10px;padding:12px 6px 10px;text-align:center;}
.result-spec-label{font-size:10px;letter-spacing:.15em;color:var(--brown-light);margin-bottom:6px;font-weight:500;}
.result-spec-value{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--brown-dark);line-height:1;}
.result-spec-unit{font-size:11px;color:var(--brown-light);margin-left:1px;}
#res-madori-preview{display:flex;justify-content:center;margin-bottom:16px;}
/* 称号行 */
.res-title-new-chip{display:inline-flex;align-items:center;gap:5px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.1em;padding:6px 14px;border-radius:4px;animation:popIn .4s ease both;}
.res-title-new-label{font-size:9px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:2px;letter-spacing:.06em;flex-shrink:0;}
.res-title-owned-chip{background:rgba(90,74,58,.07);color:var(--brown-light);font-size:11px;letter-spacing:.06em;padding:4px 10px;border-radius:20px;border:1px solid rgba(90,74,58,.12);}
/* ボタン */
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:4px;}
.btn-result{flex:1;max-width:130px;padding:13px 0;border-radius:8px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.1em;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;}
.btn-result.primary{background:var(--brown-dark);color:#f5f0e8;box-shadow:0 4px 14px rgba(58,42,26,.22);}
.btn-result.secondary{background:#fff;border:1px solid rgba(90,74,58,.22);color:var(--brown-light);}
.btn-result:hover{transform:translateY(-2px);}
.btn-result.primary:hover{box-shadow:0 6px 18px rgba(58,42,26,.3);}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--cream);border-radius:12px;padding:32px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--brown-dark);margin-bottom:20px;letter-spacing:.1em;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;margin-top:-4px;}
.modal-empty{font-size:13px;color:var(--brown-light);text-align:center;padding:24px 0;line-height:2;}

/* ── 間取り背景 ── */
.madori-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .6s ease;}
.madori-bg.visible{opacity:1;}
.madori-bg canvas{max-width:80vw;max-height:80vh;opacity:.18;filter:blur(1px) sepia(.2);border-radius:8px;}
#screen-roulette,#screen-result{position:relative;z-index:1;background:transparent!important;}

/* ── アニメーション ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
@keyframes gentlePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,160,96,0);}50%{opacity:1;box-shadow:0 0 20px 6px rgba(200,160,96,.35);}}
.pop-in{animation:popIn .4s ease both;}
/* 称号画面 */
.titles-heading{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:28px;}
.title-new-item{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:.12em;
  padding:14px 24px;border-radius:6px;width:100%;box-sizing:border-box;
  will-change:opacity,transform;
}
.title-new-badge-inline{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;}
.titles-owned-section{margin-top:20px;width:100%;}
.titles-owned-label-sm{font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:8px;opacity:.7;}
.titles-owned-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;opacity:.5;}
.title-owned-chip{background:rgba(90,74,58,.08);color:var(--brown-light);font-size:12px;letter-spacing:.08em;padding:6px 16px;border-radius:20px;border:1px solid rgba(90,74,58,.15);font-family:'Noto Serif JP',serif;will-change:opacity,transform;}
</style>
</head>
<body>

<!-- ① スタート -->
<div id="screen-start" class="screen active">
  <!-- 左上：名前＋称号コーナー -->
  <div id="start-profile" style="position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;text-align:left;animation:fadeDown .6s ease both;max-width:200px;">
    <div id="start-profile-title" style="font-size:11px;color:var(--accent);letter-spacing:.12em;font-family:'Noto Serif JP',serif;margin-bottom:3px;min-height:16px;"></div>
    <div id="start-profile-name" style="font-size:16px;font-weight:700;color:var(--brown-dark);font-family:'Noto Serif JP',serif;letter-spacing:.1em;cursor:pointer;" onclick="openNameEdit()" title="タップで名前を編集">
      <span id="start-name-text">名前未設定</span><span style="font-size:10px;color:var(--brown-light);margin-left:4px;">✎</span>
    </div>
  </div>
  <div class="logo-wrap">
    <span class="logo-icon">🏠</span>
    <div class="logo-title">間取りすと</div>
    <div class="logo-sub">MADORI-ST</div>
  </div>
  <button class="btn-start" onclick="gotoGame()">は じ め る</button>
  <div class="start-sub-btns">
    <button class="btn-sub" onclick="openModal('saves')">間取り保存一覧</button>
    <button class="btn-sub" onclick="openModal('titles')">称号一覧</button>
  </div>
</div>

<!-- 名前編集モーダル -->
<div class="modal-overlay" id="name-edit-overlay" onclick="closeNameEdit(event)">
  <div class="modal-box" style="max-height:auto;padding:28px 28px 24px;">
    <button class="modal-close" onclick="closeNameEdit()">✕</button>
    <div class="modal-title">マドリスト名を設定</div>

<script>
// ────────────────────────────────────────
// 画面管理
// ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar=document.getElementById('game-bottom-bar');
  const topBar=document.getElementById('game-top-bar');
  if(id==='screen-game'){
    bar.classList.add('active');
    if(topBar) topBar.classList.add('active');
  }else{
    bar.classList.remove('active');
    if(topBar) topBar.classList.remove('active');
  }
}
// .screen の共通display指定をgame以外に限定
document.querySelectorAll('.screen').forEach(s=>{
  if(s.id==='screen-game') return; // game画面は独自制御
});

let madoriSnapshot=null;
function captureMadoriSnapshot(){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas)return;
  const clone=document.createElement('canvas');
  clone.width=canvas.width; clone.height=canvas.height;
  clone.getContext('2d').drawImage(canvas,0,0);
  madoriSnapshot=clone;
}
function showMadoriBg(visible){
  const bg=document.getElementById('madori-bg');
  if(visible&&madoriSnapshot){
    bg.innerHTML='';
    const c=document.createElement('canvas');
    c.width=madoriSnapshot.width; c.height=madoriSnapshot.height;
    c.getContext('2d').drawImage(madoriSnapshot,0,0);
    bg.appendChild(c);
    requestAnimationFrame(()=>bg.classList.add('visible'));
  }else{
    bg.classList.remove('visible');
    setTimeout(()=>{bg.innerHTML='';},600);
  }
}

let gameStarted=false;
let gameScene=null;

// ────────────────────────────────────────
// プロフィール（名前・称号）
// ────────────────────────────────────────
function updateStartProfile(){
  const name=localStorage.getItem('madori-player-name')||'';
  const titleSel=localStorage.getItem('madori-selected-title')||'';
  const nameEl=document.getElementById('start-name-text');
  const titleEl=document.getElementById('start-profile-title');
  if(nameEl) nameEl.textContent=name||'名前未設定';
  if(titleEl) titleEl.textContent=titleSel;
  window._playerName=name;
}
function openNameEdit(){
  const ov=document.getElementById('name-edit-overlay');
  if(!ov)return;
  const inp=document.getElementById('player-name-input');
  if(inp) inp.value=localStorage.getItem('madori-player-name')||'';
  const titles=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const sel=localStorage.getItem('madori-selected-title')||'';
  const listEl=document.getElementById('name-edit-title-list');
  if(listEl){
    listEl.innerHTML='';
    listEl.dataset.selected=sel;
    const noneBtn=document.createElement('button');
    noneBtn.textContent='なし'; noneBtn.dataset.val='';
    noneBtn.style.cssText='padding:6px 14px;border-radius:20px;border:1.5px solid '+(sel===''?'var(--brown-dark)':'rgba(90,74,58,.25)')+';background:'+(sel===''?'var(--brown-dark)':'#fff')+';color:'+(sel===''?'#f5f0e8':'var(--brown-light)')+';font-size:12px;cursor:pointer;font-family:Noto Serif JP,serif;letter-spacing:.06em;transition:all .15s;';
    noneBtn.onclick=()=>selectTitleChip('');
    listEl.appendChild(noneBtn);
    titles.forEach(t=>{
      const btn=document.createElement('button');
      btn.textContent=t; btn.dataset.val=t;
      const active=sel===t;
      btn.style.cssText='padding:6px 14px;border-radius:20px;border:1.5px solid '+(active?'var(--brown-dark)':'rgba(90,74,58,.2)')+';background:'+(active?'var(--brown-dark)':'#fff')+';color:'+(active?'#f5f0e8':'var(--brown)')+';font-size:12px;cursor:pointer;font-family:Noto Serif JP,serif;letter-spacing:.06em;transition:all .15s;';
      btn.onclick=()=>selectTitleChip(t);
      listEl.appendChild(btn);
    });
  }
  ov.classList.add('active');
}
function selectTitleChip(val){
  const listEl=document.getElementById('name-edit-title-list');
  if(!listEl)return;
  listEl.dataset.selected=val;
  listEl.querySelectorAll('button').forEach(btn=>{
    const active=btn.dataset.val===val;
    btn.style.background=active?'var(--brown-dark)':'#fff';
    btn.style.color=active?'#f5f0e8':'var(--brown)';
    btn.style.borderColor=active?'var(--brown-dark)':'rgba(90,74,58,.2)';
  });
}
function saveNameEdit(){
  const inp=document.getElementById('player-name-input');
  const name=(inp?inp.value.trim():'');
  const listEl=document.getElementById('name-edit-title-list');
  const selTitle=listEl?(listEl.dataset.selected??''):'';
  localStorage.setItem('madori-player-name',name);
  localStorage.setItem('madori-selected-title',selTitle);
  updateStartProfile();
  closeNameEdit();
}
function closeNameEdit(e){
  const ov=document.getElementById('name-edit-overlay');
  if(!e||e.target===ov) ov.classList.remove('active');
}


function gotoStart(){
  showMadoriBg(false);
  updateStartProfile();
  showScreen('screen-start');
}

// ────────────────────────────────────────
// 再抽選（各スロット1日1回）
// ────────────────────────────────────────
// レア判定
const RARE_COND=[
  v=>v<=5,    // 築年数5以下
  v=>v<=5,    // 駅徒歩5以下
  v=>v<=9,    // 家賃1桁（9以下）
];
function isRare(idx,val){return RARE_COND[idx](val);}

// 再抽選確定プール（築浅5以下・駅近5以下）
const REROLL_POOLS={
  0:[0,1,2,3,4,5],   // 築浅確定
  1:[1,2,3,4,5],     // 駅近確定
  2:null,            // 家賃はPOP保留なので通常プール
};
// 再抽選済みフラグ（per slot）
const rerollDone=[false,false,false];

// 開発中：再抽選制限なし（将来：広告視聴で1日1回）
function isRerollUsed(idx){return false;}
function markRerollUsed(idx){/* 開発中は何もしない */}

function updateRerollBtnSlot(idx){
  const btn=document.getElementById('reroll-btn-'+idx);
  if(!btn)return;
  if(isRerollUsed(idx)){
    btn.classList.add('used');
    btn.textContent='使用済み';
  }else{
    btn.classList.remove('used');
    btn.textContent='🎲 再抽選';
  }
}

function doRerollSlot(idx){
  if(isRerollUsed(idx))return;
  rerollDone[idx]=true;  // 再抽選済みフラグ
  const item=document.getElementById('rou-'+idx);
  const valEl=document.getElementById('rou-val-'+idx);
  const rb=document.getElementById('reroll-btn-'+idx);
  if(rb) rb.classList.remove('visible');
  const pop=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop) pop.classList.remove('visible');
  document.getElementById('btn-rou-next').classList.remove('visible');
  item.classList.remove('locked','rare','active-slot');
  item.classList.add('active-slot');
  valEl.classList.add('spinning');
  rouletteValues[idx]=null;
  rouletteLocked[idx]=false;
  lockedCount=[0,1,2].filter(i=>i!==idx&&rouletteLocked[i]).length;
  if(rouletteIntervals[idx])clearInterval(rouletteIntervals[idx]);
  const pool=REROLL_POOLS[idx]||ROULETTE_POOLS[rouletteKeys[idx]];
  rouletteIntervals[idx]=setInterval(()=>{
    valEl.textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
  },80);
  item.onclick=()=>lockRerollSlot(idx);
  updateRerollBtnSlot(idx);
}

// 再抽選後の確定用（専用プールから値を取る）
function lockRerollSlot(idx){
  if(rouletteLocked[idx])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=REROLL_POOLS[idx]||ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  if(isRare(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 再抽選後は自スロットのPOPを消す
  const pop2=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop2) pop2.classList.remove('visible');
  // 次のスロットをアクティブに（まだ確定していないスロットがある場合）
  if(idx+1<3 && !rouletteLocked[idx+1]) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  lockedCount=[0,1,2].filter(i=>rouletteLocked[i]).length;
  if(lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 再抽選完了後はどのスロットもPOPは表示しない
    }
  }
}

// ────────────────────────────────────────
// 間取り保存（最大20件・ロック最大15件）
// ────────────────────────────────────────
function saveMadori(){
  const data=window._lastResult;
  if(!data){alert('まだ結果がありません');return;}
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  let imgData='';
  if(madoriSnapshot){
    const cv=document.createElement('canvas');
    const sc=Math.min(120/madoriSnapshot.width,90/madoriSnapshot.height);
    cv.width=Math.floor(madoriSnapshot.width*sc);
    cv.height=Math.floor(madoriSnapshot.height*sc);
    cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
    imgData=cv.toDataURL('image/png');
  }
  list.unshift({...data,id:Date.now(),img:imgData,locked:false});
  // ロックされていない古いものを削除して20件に収める
  while(list.length>20){
    // 末尾からロックなしを探して削除
    let removed=false;
    for(let i=list.length-1;i>=0;i--){
      if(!list[i].locked){list.splice(i,1);removed=true;break;}
    }
    if(!removed)break; // 全部ロック済みなら諦める
  }
  localStorage.setItem('madori-saves',JSON.stringify(list));
  const toast=document.getElementById('save-toast');
  if(toast){toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2000);}
}
function gotoGame(){
  window._playerName=localStorage.getItem('madori-player-name')||'';
  showMadoriBg(false);
  showScreen('screen-game');
  document.getElementById('btn-complete-overlay').classList.remove('visible');
  // 既存のPhaserインスタンスを破棄して新規作成（再起動でツモが変わる問題を防ぐ）
  const existing=document.querySelector('#game-container canvas');
  if(existing){
    // Phaserゲームを完全に破棄
    if(window._phaserGame){window._phaserGame.destroy(true);window._phaserGame=null;}
    gameScene=null; gameStarted=false;
  }
  if(!gameStarted){
    gameStarted=true;
    setTimeout(()=>startPhaserGame(),50);
  }
}
function onCompleteBtn(){
  if(!gameScene)return;
  // プレビュー（赤いパーツ表示）を消す
  gameScene.stopPreviewTween();
  if(gameScene.previewImg){gameScene.previewImg.destroy();gameScene.previewImg=null;}
  gameScene.previewGfx.clear();
  // 収納を描画してスナップショット
  gameScene.fillEmptyAsStorage();
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      captureMadoriSnapshot();
      showMadoriBg(true);
      showScreen('screen-roulette');
      startRoulette();
    });
  });
}
function gotoTitles(){
  showMadoriBg(false);
  showScreen('screen-titles');
  showTitlesReveal();
}
function gotoResult(){
  showMadoriBg(false);
  showScreen('screen-result');
  showResult();
}

// 称号を1つずつ表示するアニメーション
function showTitlesReveal(){
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  const earned=generateTitles(age,walk,rent,roomTypes);
  const saved=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const newTitles=[], ownedTitles=[];
  earned.forEach(t=>{
    if(!saved.includes(t.title)){newTitles.push(t.title);saved.unshift(t.title);}
    else ownedTitles.push(t.title);
  });
  localStorage.setItem('madori-titles',JSON.stringify(saved));
  window._earnedTitles=earned;
  window._newTitles=newTitles;

  const listEl=document.getElementById('title-reveal-list');
  listEl.innerHTML='';
  const ownedSection=document.getElementById('titles-owned-section');
  const ownedChips=document.getElementById('titles-owned-chips');
  if(ownedSection) ownedSection.style.display='none';
  const btn=document.getElementById('title-next-btn');
  btn.style.opacity='0'; btn.style.pointerEvents='none';

  // 全称号を順番に優しく出現（NEW → 既所持の順）
  const allItems=[
    ...newTitles.map(t=>({title:t,isNew:true})),
    ...ownedTitles.map(t=>({title:t,isNew:false}))
  ];

  const INTERVAL=220; // 1件ごとの間隔ms
  const DURATION=320; // フェード時間ms

  allItems.forEach(({title,isNew},i)=>{
    const delay=200+i*INTERVAL;
    setTimeout(()=>{
      const el=document.createElement('div');
      if(isNew){
        el.className='title-new-item';
        el.innerHTML=`<span class="title-new-badge-inline">NEW！</span>${title}`;
      } else {
        el.className='title-owned-chip';
        el.style.display='block';
        el.style.marginBottom='8px';
        el.textContent=title;
      }
      el.style.opacity='0';
      el.style.transform='translateY(12px)';
      el.style.transition=`opacity ${DURATION}ms ease, transform ${DURATION}ms ease`;
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1';
        el.style.transform='translateY(0)';
      }));
    }, delay);
  });

  // 称号ゼロ
  if(earned.length===0){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='title-new-item';
      el.style.cssText='opacity:0;transform:translateY(12px);transition:opacity .38s ease,transform .38s ease;background:rgba(90,74,58,.1);color:var(--brown-light);';
      el.textContent='な し';
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1'; el.style.transform='translateY(0)';
      }));
    }, 200);
  }

  const totalDelay=200+Math.min(allItems.length,1)*INTERVAL+DURATION;
  setTimeout(()=>{
    btn.style.opacity='1'; btn.style.pointerEvents='auto';
    btn.style.animation='titleBtnPulse 2s ease-in-out infinite';
  }, totalDelay);
}

function renderSavesList(){
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  title.textContent='間取り保存一覧';
  const list=JSON.parse(localStorage.getItem('madori-saves')||'[]');
  if(list.length===0){
    body.innerHTML='<div class="modal-empty">保存された間取りはありません。<br>ゲームプレイ後に「💾 保存」ボタンで保存できます。</div>';
    return;
  }
  const lockedCount=list.filter(s=>s.locked).length;
  body.innerHTML=`<div style="font-size:11px;color:var(--brown-light);margin-bottom:12px;letter-spacing:.04em;">全${list.length}件 / 最大20件保存　🔒ロック：${lockedCount}/15件（ロック解除しないと自動削除されません）</div>`;
  list.forEach((s)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(90,74,58,.1);';
    // サムネイル
    const thumb=document.createElement(s.img?'img':'div');
    thumb.style.cssText='width:72px;height:54px;object-fit:contain;border-radius:6px;border:1px solid rgba(90,74,58,.12);flex-shrink:0;background:#f5f0e8;';
    if(s.img) thumb.src=s.img;
    // 情報
    const info=document.createElement('div');
    info.style.cssText='flex:1;min-width:0;';
    info.innerHTML=`
      <div style="font-family:'Noto Serif JP',serif;font-size:16px;color:var(--brown-dark);font-weight:700;margin-bottom:3px;">${s.labelRaw||s.label||'--'}</div>
      <div style="font-size:11px;color:var(--brown-light);letter-spacing:.04em;">築${s.age??'--'}年　駅${s.walk??'--'}分　${s.rent??'--'}万円</div>
      <div style="font-size:10px;color:var(--brown-light);margin-top:2px;opacity:.7;">${s.date||''}</div>
      ${s.titles&&s.titles.length?`<div style="font-size:10px;color:var(--brown-light);margin-top:3px;opacity:.8;">${s.titles.join('・')}</div>`:''}
    `;
    // ロックボタン
    const lockBtn=document.createElement('button');
    lockBtn.textContent=s.locked?'🔒':'🔓';
    lockBtn.title=s.locked?'ロック中（タップで解除）':'ロックする';
    lockBtn.style.cssText='flex-shrink:0;background:none;border:1px solid rgba(90,74,58,.2);border-radius:8px;font-size:16px;cursor:pointer;padding:4px 7px;line-height:1;transition:all .15s;';
    lockBtn.onclick=()=>{
      const cur=JSON.parse(localStorage.getItem('madori-saves')||'[]');
      const idx=cur.findIndex(x=>x.id===s.id);
      if(idx===-1)return;
      if(!cur[idx].locked){
        // ロックしようとしている→上限チェック
        const lc=cur.filter(x=>x.locked).length;
        if(lc>=15){alert('ロックは最大15件までです。');return;}
        cur[idx].locked=true;
      }else{
        cur[idx].locked=false;
      }
      localStorage.setItem('madori-saves',JSON.stringify(cur));
      renderSavesList();
    };
    // 削除ボタン
    const delBtn=document.createElement('button');
    delBtn.textContent='✕';
    delBtn.style.cssText='flex-shrink:0;background:none;border:none;color:rgba(90,74,58,.35);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;transition:color .15s;';
    delBtn.onmouseover=()=>delBtn.style.color='#c0392b';
    delBtn.onmouseout=()=>delBtn.style.color='rgba(90,74,58,.35)';
    delBtn.onclick=()=>{
      if(s.locked){
        alert('ロック中の間取りは削除できません。先にロックを解除してください。');
        return;
      }
      if(!confirm(`「${s.labelRaw||s.label||'この間取り'}」を削除してもよいですか？`))return;
      const cur=JSON.parse(localStorage.getItem('madori-saves')||'[]');
      const next=cur.filter(x=>x.id!==s.id);
      localStorage.setItem('madori-saves',JSON.stringify(next));
      renderSavesList();
    };
    row.appendChild(thumb);
    row.appendChild(info);
    row.appendChild(lockBtn);
    row.appendChild(delBtn);
    body.appendChild(row);
  });
}

// ルーレット
// ────────────────────────────────────────
const ROULETTE_POOLS={
  age:[0,1,2,3,4,5,10,15,20,25,30,35,40,45,50],
  walk:[1,2,3,4,5,7,10,12,15,20,30,40,50],
  rent:[4,5,6,7,8,9,10,12,15,18,20,25,30,35,40,50,75,100]
};
const rouletteKeys=['age','walk','rent'];
const rouletteLocked=[false,false,false];
const rouletteValues=[null,null,null];
const rouletteUnits=['年','分','万円'];
let rouletteIntervals=[null,null,null];
let lockedCount=0;
function startRoulette(){
  lockedCount=0;
  rerollDone[0]=rerollDone[1]=rerollDone[2]=false;
  for(let i=0;i<3;i++){
    rouletteLocked[i]=false; rouletteValues[i]=null;
    document.getElementById('rou-'+i).classList.remove('locked','active-slot','rare');
    document.getElementById('rou-val-'+i).classList.add('spinning');
    const rb=document.getElementById('reroll-btn-'+i);
    if(rb) rb.classList.remove('visible');
    // POPをCSSクラスでリセット（style.displayは使わない）
    const pop=document.querySelector('#rou-'+i+' .reroll-pop');
    if(pop){pop.classList.remove('visible');pop.style.display='';}
    // スロットのonclickをlockRouletteに戻す（クロージャに注意してIIFE使用）
    ;(function(n){ document.getElementById('rou-'+n).onclick=function(){lockRoulette(n);}; })(i);
  }
  document.getElementById('rou-0').classList.add('active-slot');
  document.getElementById('btn-rou-next').classList.remove('visible');
  for(let i=0;i<3;i++){
    if(rouletteIntervals[i])clearInterval(rouletteIntervals[i]);
    (idx=>{
      rouletteIntervals[idx]=setInterval(()=>{
        const pool=ROULETTE_POOLS[rouletteKeys[idx]];
        document.getElementById('rou-val-'+idx).textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
      },80);
    })(i);
  }
}
function lockRoulette(idx){
  if(rouletteLocked[idx])return;
  for(let i=0;i<idx;i++)if(!rouletteLocked[i])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  // レア演出
  if(isRare(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 次のスロットをアクティブに
  if(idx+1<3) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  if(++lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 初回確定後POP表示：再抽選で改善できる値のときだけ表示
      // idx=0(築年数) val>5、idx=1(駅徒歩) val>5 のときPOP表示（idx=2は対象外）
      if(i<2 && !rerollDone[i]){
        const pop=document.querySelector('#rou-'+i+' .reroll-pop');
        if(pop && rouletteValues[i]!==null && rouletteValues[i]>5){
          pop.classList.add('visible');
        }
      }
    }
  }
}

function generateTitles(age,walk,rent,roomTypes){
  // 複数称号を返す（条件に合うものを全部）
  const has=t=>roomTypes.has(t);
  const earned=[];
  if(age<=5&&walk<=5&&rent<=8) earned.push({title:'掘り出し物件の達人',comment:'新しくて駅近で安い！夢の物件を作り上げました。'});
  if(age>=40) earned.push({title:'レトロ愛好家',comment:'年季の入った物件に味わいを感じる間取りすとです。'});
  if(walk<=3) earned.push({title:'駅前派',comment:'徒歩3分以内！毎日の通勤が楽になりそうです。'});
  if(walk>=30) earned.push({title:'静寂の探求者',comment:'駅から離れた場所での静かな暮らし。'});
  if(rent>=50) earned.push({title:'高級志向',comment:'上質な暮らしを追求した間取りです。'});
  if(rent<=6&&walk<=10) earned.push({title:'コスパ王',comment:'リーズナブルな家賃で駅近を確保。'});
  if(has('washitsu')&&has('youshitsu')) earned.push({title:'和洋折衷の使い手',comment:'和室と洋室を組み合わせたセンス溢れる間取り。'});
  if(has('wic')) earned.push({title:'収納マニア',comment:'WICを完備！整理整頓が行き届いた暮らし。'});
  if(has('balcony')) earned.push({title:'採光重視派',comment:'バルコニーで光と風を取り込む間取りです。'});
  if(!has('bath')&&!has('toilet')) earned.push({title:'謎の間取りすと',comment:'お風呂もトイレもない…独自の美学の間取りすとです。'});
  if(earned.length===0) earned.push({title:'間取りすと見習い',comment:'はじめての一歩！経験を積んで素敵な間取りを目指そう。'});
  return earned;
}
function generateTitle(age,walk,rent,roomTypes){
  return generateTitles(age,walk,rent,roomTypes)[0];
}
function countRoomLabel(roomTypes,counts){
  const rooms=(counts['youshitsu']||0)+(counts['washitsu']||0);
  const sup={2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
  const k=counts['kitchen']||0;
  const wc=counts['toilet']||0;
  const bath=counts['bath']||0;
  // WC・B は個数を常にプレフィックスで表示（0WC, 1WC, 2WC …）
  const wcStr=`+${wc}WC`;
  const bStr=`+${bath}B`;
  const extra=wcStr+bStr;
  if(k===0){
    return (rooms>0?rooms:'')+'R'+extra;
  }
  const kLabel=`K${k>=2?(sup[k]||String(k)):''}`;
  const ldkLabel=rooms===0?kLabel:`${rooms}LD${kLabel}`;
  return ldkLabel+extra;
}
function showResult(){
  const nameEl=document.getElementById('res-player-name');
  if(nameEl){
    const pname=window._playerName||'';
    if(pname){nameEl.textContent=pname+' の間取り';nameEl.style.display='block';}
    else{nameEl.style.display='none';}
  }
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  document.getElementById('res-age').innerHTML=age+'<span class="result-spec-unit">年</span>';
  document.getElementById('res-walk').innerHTML=walk+'<span class="result-spec-unit">分</span>';
  document.getElementById('res-rent').innerHTML=rent+'<span class="result-spec-unit">万</span>';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  // 間取りラベル：+WC等を同行に小さくインライン表示
  const roomLabel=countRoomLabel(roomTypes,counts);
  const ldkMatch=roomLabel.match(/^([^+]+)(.*)/);
  const heroEl=document.getElementById('res-room-label');
  if(heroEl){
    const main=ldkMatch?ldkMatch[1]:roomLabel;
    const sub=ldkMatch?ldkMatch[2]:'';
    heroEl.innerHTML=main+(sub?`<span style="font-size:28px;color:var(--brown-dark);letter-spacing:.04em;vertical-align:middle;font-weight:700;">${sub}</span>`:'');
  }
  // 間取り図プレビュー
  const prevEl=document.getElementById('res-madori-preview');
  if(prevEl&&madoriSnapshot){
    prevEl.innerHTML='';
    const cv=document.createElement('canvas');
    const maxW=Math.min(420,window.innerWidth-24), maxH=320;
    const scale=Math.min(maxW/madoriSnapshot.width,maxH/madoriSnapshot.height);
    cv.width=madoriSnapshot.width*scale; cv.height=madoriSnapshot.height*scale;
    cv.style.cssText='display:block;border-radius:12px;border:1px solid rgba(90,74,58,.12);max-width:100%;margin:0 auto;';
    cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
    prevEl.appendChild(cv);
  }
  // 称号表示：今回条件を満たした全称号（NEWだけ少し目立つ）
  const newTitles=window._newTitles||[];
  const earnedTitles=(window._earnedTitles||[]).map(t=>t.title);
  const titlesWrap=document.getElementById('res-titles-wrap');
  const newRow=document.getElementById('res-titles-new-row');
  const ownedRow=document.getElementById('res-titles-owned-row');
  if(titlesWrap&&newRow&&ownedRow){
    newRow.innerHTML=''; ownedRow.innerHTML='';
    newRow.style.display='none'; ownedRow.style.display='none';
    if(earnedTitles.length>0){
      newRow.style.cssText='display:flex;flex-wrap:wrap;gap:7px;justify-content:center;';
      earnedTitles.forEach(t=>{
        const isNew=newTitles.includes(t);
        const chip=document.createElement('div');
        chip.style.cssText=isNew
          ?'display:inline-flex;align-items:center;gap:5px;background:var(--brown-dark);color:#f5f0e8;font-family:\'Noto Serif JP\',serif;font-size:13px;letter-spacing:.08em;padding:6px 14px;border-radius:4px;'
          :'display:inline-flex;align-items:center;font-family:\'Noto Serif JP\',serif;font-size:12px;letter-spacing:.06em;padding:5px 12px;border-radius:20px;background:rgba(90,74,58,.07);color:var(--brown-light);border:1px solid rgba(90,74,58,.15);';
        chip.innerHTML=isNew?`<span style="font-size:9px;background:rgba(255,255,255,.22);padding:1px 5px;border-radius:2px;letter-spacing:.06em;flex-shrink:0;">NEW</span>${t}`:t;
        newRow.appendChild(chip);
      });
    }
    titlesWrap.style.display=earnedTitles.length?'block':'none';
  }
  window._lastResult={
    name:window._playerName||'マドリスト',
    label:roomLabel,
    labelRaw:roomLabel, age, walk, rent,
    titles:(window._earnedTitles||[]).map(t=>t.title),
    date:new Date().toLocaleDateString('ja-JP'),
  };
}

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>間取りすと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#f5f0e8;
  --warm:#e8ddd0;
  --brown:#5a4a3a;
  --brown-light:#8a7060;
  --brown-dark:#3a2a1a;
  --accent:#c8a060;
  --accent-light:#e8c880;
  --green:#6a8a50;
  --blue:#5080a8;
}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:env(safe-area-inset-top);}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 24px 24px;}
.screen.active{display:flex;}

/* ── ① スタート ── */
#screen-start{background:var(--cream);position:relative;overflow:hidden;justify-content:center;}
#screen-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,160,96,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 20%,rgba(106,138,80,.08) 0%,transparent 60%);pointer-events:none;}
.logo-wrap{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(90,74,58,.15));}
.logo-title{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);letter-spacing:.15em;line-height:1;}
.logo-sub{font-size:12px;color:var(--brown-light);letter-spacing:.3em;margin-top:8px;}
.btn-start{display:block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;letter-spacing:.2em;padding:22px 80px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(58,42,26,.25);animation:fadeUp .8s .2s ease both;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(58,42,26,.32);}
.btn-start:hover::after{background:rgba(255,255,255,.06);}
.btn-start:active{transform:translateY(0);}
.start-sub-btns{display:flex;gap:24px;margin-top:36px;animation:fadeUp .8s .4s ease both;}
.btn-sub{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);font-size:12px;letter-spacing:.15em;padding:10px 24px;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-sub:hover{border-color:var(--brown-light);color:var(--brown);background:rgba(90,74,58,.05);}

/* ── ② ゲーム画面 ── */
#screen-game{
  display:none;flex-direction:column;align-items:stretch;
  padding:0;position:fixed;top:0;left:0;right:0;bottom:0;
  height:100dvh;max-height:100dvh;
  background:var(--cream);overflow:hidden;
}
#screen-game.active{display:flex;}
#game-container{
  flex:1;display:flex;justify-content:center;align-items:center;
  overflow:hidden;min-height:0;position:relative;
  background:#f5f0e8;
}
#game-container canvas{display:block;background:#f5f0e8;}

/* ── 上部バー（2段） ── */
#game-top-bar{
  display:flex;flex-direction:column;flex-shrink:0;
  background:rgba(245,240,232,.98);
  position:relative;z-index:30;
  width:100%;max-width:100vw;overflow-x:hidden;
  min-height:215px;
}
@media(min-width:600px){#game-top-bar{min-height:195px;}}
/* 1段目：設置数 + ナビボタン */
#game-top-row1{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px 3px;gap:8px;
}
/* 設置数グリッド */
#part-count-grid{
  display:grid;grid-template-columns:repeat(4,auto);
  gap:1px 8px;font-size:10px;color:var(--brown-light);
  font-family:'Noto Sans JP',sans-serif;letter-spacing:.02em;flex:1;
}
.pc-item{display:flex;align-items:center;gap:3px;white-space:nowrap;}
.pc-name{color:var(--brown-light);font-size:9px;min-width:3em;}
.pc-count{color:var(--brown-dark);font-weight:700;font-size:11px;min-width:1.4em;text-align:right;}
/* ナビボタン */
#game-nav-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-nav{background:none;border:1px solid rgba(90,74,58,.2);color:var(--brown-light);
  font-size:9px;letter-spacing:.04em;padding:4px 8px;border-radius:6px;
  cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn-nav:active{background:rgba(90,74,58,.1);}

/* 2段目：次次/次 | 現在パーツ | 保留 */
#game-top-row2{
  display:flex;align-items:flex-end;justify-content:center;
  padding:3px 8px 4px;gap:6px;
  max-width:100%;
  flex-wrap:nowrap;
  overflow:hidden;
}
#game-top-row2 canvas{flex-shrink:0;}
#next-col,#current-piece-wrap,#hold-col{min-width:0;flex-shrink:0;}
/* 次のパーツ縦並び（左） */
#next-col{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:4px 7px;
}
.next-row{display:flex;flex-direction:column;align-items:center;gap:1px;}
.next-sublabel{font-size:8px;color:var(--brown-light);letter-spacing:.06em;}
.next-sublabel.em{color:var(--brown);font-weight:700;}
/* 操作ヒント共通デザイン（3つ統一） */
.ui-hint{
  font-size:11px;color:var(--brown-light);
  letter-spacing:.04em;white-space:nowrap;text-align:center;
  border:1px solid rgba(90,74,58,.18);border-radius:6px;
  padding:3px 10px;background:rgba(255,255,255,.5);
}
/* PC専用：右クリック回転ヒント（スマホでは非表示） */
#pc-rotate-hint{ display:none; }
@media(min-width:600px){#pc-rotate-hint{display:block;}}

/* 現在パーツ（中央・大きく・ドラッグ可） */
#current-piece-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:rgba(200,160,96,.08);border:2px solid var(--accent);border-radius:10px;
  padding:4px 6px;cursor:grab;user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  position:relative;
}
#current-piece-wrap:active{cursor:grabbing;}
#current-piece-wrap .piece-label{font-size:9px;color:var(--accent);letter-spacing:.1em;font-weight:700;}
#canvas-current{display:block;}
/* スロットcanvasの表示サイズをCSSで固定（JSは解像度のみ変更→レイアウト不動） */
#canvas-current,#canvas-hold{width:98px;height:98px;}
#canvas-next1,#canvas-next2{width:56px;height:56px;}
@media(max-width:599px){
  #canvas-current,#canvas-hold{width:122px;height:122px;}
  #canvas-next1,#canvas-next2{width:59px;height:59px;}
}
@media(max-width:419px){
  #canvas-current,#canvas-hold{width:110px;height:110px;}
  #canvas-next1,#canvas-next2{width:59px;height:59px;}
}

/* ドラッグゴースト */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9000;
  opacity:0.8;display:none;transform:translate(-50%,-50%);
}

/* 保留（右） */
#hold-col{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(200,160,96,.06);border:1.5px solid var(--accent);border-radius:8px;
  padding:4px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  min-width:48px;transition:background .15s,border-color .15s;
}
#hold-col.drag-over{background:rgba(200,160,96,.3);border-color:var(--brown-dark);}
#hold-col:active{background:rgba(200,160,96,.18);}
.hold-label{font-size:9px;color:var(--accent);letter-spacing:.1em;font-weight:700;}

/* ── 下部ボタンバー ── */
#game-bottom-bar{
  display:flex;flex-shrink:0;
  background:rgba(245,240,232,.97);
  z-index:50;
  padding:14px 16px max(40px, calc(env(safe-area-inset-bottom) + 24px));
  align-items:center;justify-content:center;gap:16px;
}
/* 戻すボタン */
.btn-undo{
  background:#fff;border:1.5px solid rgba(90,74,58,.22);color:var(--brown);
  font-size:12px;letter-spacing:.04em;padding:15px 20px 12px;border-radius:16px;
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;
  align-items:center;gap:5px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;user-select:none;
  box-shadow:0 1px 4px rgba(90,74,58,.08);
}
.btn-undo:active{background:rgba(90,74,58,.08);transform:scale(.93);}
.btn-undo .undo-icon{font-size:26px;line-height:1.1;}
.btn-undo .undo-label{font-size:10px;color:var(--brown-light);}
/* 回転ボタン */
#rotate-unit{
  display:flex;align-items:center;gap:0;
  background:var(--brown-dark);border-radius:22px;
  box-shadow:0 3px 10px rgba(58,42,26,.28);overflow:hidden;
}
.btn-rotate-new{
  background:transparent;border:none;color:#f5f0e8;
  padding:16px 26px 14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:background .15s;-webkit-tap-highlight-color:transparent;user-select:none;
}
.btn-rotate-new:active{background:rgba(255,255,255,.15);}
.btn-rotate-new .rot-icon{font-size:30px;line-height:1.1;}
.btn-rotate-new .rot-label{font-size:10px;color:rgba(245,240,232,.65);letter-spacing:.04em;}
#rotate-divider{width:1px;background:rgba(255,255,255,.15);align-self:stretch;margin:12px 0;}

/* 完成ボタン */
#btn-complete-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:auto;}
#btn-complete-overlay.visible{display:block;}
#btn-complete-overlay button{
  background:#3a2a1a;color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:.2em;
  padding:20px 56px;border:2px solid rgba(200,160,96,.7);border-radius:6px;
  cursor:pointer;animation:gentlePulse 2s ease-in-out infinite;
}
#btn-complete-overlay button:hover{background:#2a1a0a;animation:none;transform:scale(1.04);transition:transform .15s;}

/* ── ③ ルーレット ── */
#screen-roulette{background:rgba(245,240,232,0.82);}
.roulette-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--brown-dark);letter-spacing:.15em;margin-bottom:28px;text-align:center;}
/* スロットのラッパー：高さを固定してブレを防ぐ */
.roulette-item-wrap{width:340px;height:120px;margin-bottom:40px;position:relative;flex-shrink:0;}
.roulette-item{
  position:absolute;inset:0;
  background:#fff;border:1.5px solid rgba(90,74,58,.15);border-radius:10px;
  cursor:pointer;
  transition:border-color .2s,outline-color .2s;
  overflow:visible;opacity:.45;pointer-events:none;
  outline:3px solid transparent;outline-offset:2px;
}
.roulette-item.active-slot{opacity:1;pointer-events:auto;border-color:var(--accent);outline-color:rgba(200,160,96,.4);}
.roulette-item.locked{opacity:1;pointer-events:none;border-color:rgba(90,74,58,.2);outline-color:transparent;animation:none;cursor:default;background:linear-gradient(135deg,#fffbf5,#fff8ec);}
.roulette-item.locked .reroll-slot-btn{pointer-events:auto;}
/* ラベルは枠中央のやや上、値は枠中央に絶対配置（状態でズレない） */
.roulette-item-label{position:absolute;left:0;right:0;top:50%;transform:translateY(-34px);font-family:'Noto Serif JP',serif;font-size:21px;letter-spacing:.1em;color:var(--brown-dark);font-weight:600;text-align:center;}
.roulette-item-value{position:absolute;left:0;right:0;top:50%;transform:translateY(4px);font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);transition:color .1s;line-height:1.1;text-align:center;display:block;}
.roulette-item-value.spinning{animation:spin .08s linear infinite;color:var(--brown-light);}
/* レア値：金色グロー */
.roulette-item.rare .roulette-item-value{
  background:linear-gradient(135deg,#c8860a,#f5c842,#e8a020,#f5c842);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShine 2s linear infinite;
  filter:drop-shadow(0 0 6px rgba(200,160,10,.5));
  font-size:44px;
}
@keyframes goldShine{0%{background-position:0% center}100%{background-position:200% center}}
.roulette-item.rare{border-color:#c8a020;background:linear-gradient(135deg,#fffbec,#fff8d6);}
.roulette-item.rare::before{content:'✦ PREMIUM';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:.2em;color:#c8860a;background:#fff8d6;padding:2px 10px;border-radius:20px;border:1px solid #e8c040;white-space:nowrap;}
/* tap-hint */
.roulette-item .tap-hint{position:absolute;bottom:7px;left:0;right:0;font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;font-weight:500;letter-spacing:.05em;text-align:center;}
.roulette-item.active-slot .tap-hint{opacity:1;}
.roulette-item.locked .tap-hint{display:none;}
.roulette-item.locked::after{content:'✓ 確定';position:absolute;top:12px;right:14px;font-size:11px;color:var(--brown-light);letter-spacing:.1em;}
.roulette-item.rare.locked::after{color:#c8860a;}
/* ── 最高レア（虹色・超おめでたい）演出 ── */
.roulette-item.super-rare .roulette-item-value{
  background:linear-gradient(90deg,#ff3b3b,#ff9d00,#ffe600,#3bd16f,#3b8bff,#9b3bff,#ff3bd1,#ff3b3b);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbowFlow 2.2s linear infinite;
  filter:drop-shadow(0 0 8px rgba(255,180,40,.6));
  font-size:46px;
}
@keyframes rainbowFlow{0%{background-position:0% center}100%{background-position:300% center}}
.roulette-item.super-rare{
  border-color:#ffcf3b;
  background:linear-gradient(135deg,#fff8e8,#fff0fa,#eef6ff,#fffbe8);
  background-size:300% 300%;
  animation:superGlow 3s ease infinite, superBorder 2.2s linear infinite;
  box-shadow:0 0 24px 4px rgba(255,200,60,.4);
}
@keyframes superGlow{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes superBorder{0%{box-shadow:0 0 24px 4px rgba(255,90,90,.35);}25%{box-shadow:0 0 24px 4px rgba(255,200,40,.4);}50%{box-shadow:0 0 24px 4px rgba(80,200,120,.4);}75%{box-shadow:0 0 24px 4px rgba(90,140,255,.4);}100%{box-shadow:0 0 24px 4px rgba(180,90,255,.35);}}
.roulette-item.super-rare::before{
  content:'✦ SUPER RARE ✦';
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  font-size:10px;font-weight:700;letter-spacing:.18em;color:#fff;
  background:linear-gradient(90deg,#ff5a5a,#ffb43b,#5ac878,#5a8cff,#b45aff);
  background-size:200% auto;animation:rainbowFlow 2.2s linear infinite;
  padding:3px 12px;border-radius:20px;white-space:nowrap;
  box-shadow:0 2px 8px rgba(255,150,40,.4);
}
.roulette-item.super-rare.locked::after{color:#e0820a;}
/* 紙吹雪 */
.confetti-piece{position:fixed;width:10px;height:10px;z-index:600;pointer-events:none;will-change:transform,opacity;border-radius:2px;}
@keyframes confettiFall{0%{transform:translateY(0) rotateZ(0deg);opacity:1;}100%{transform:translateY(110vh) rotateZ(720deg);opacity:0;}}
/* ── 逆レア（ニッチ・珍しさ）演出：紫×シルバーのコレクター感 ── */
.roulette-item.niche .roulette-item-value{
  background:linear-gradient(135deg,#7a5fa8,#b9a3d9,#8c6fb5,#b9a3d9);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShine 2.4s linear infinite;
  filter:drop-shadow(0 0 6px rgba(122,95,168,.45));
  font-size:44px;
}
.roulette-item.niche{border-color:#9a7fc0;background:linear-gradient(135deg,#f7f3fc,#efe7f8);}
.roulette-item.niche::before{content:'❖ RARE';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:.2em;color:#7a5fa8;background:#efe7f8;padding:2px 10px;border-radius:20px;border:1px solid #b9a3d9;white-space:nowrap;}
.roulette-item.niche.locked::after{content:'✓ 確定';color:#7a5fa8;}
/* 各スロット個別の再抽選ボタン */
.reroll-slot-btn{
  position:absolute;right:-16px;bottom:-20px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.08em;
  padding:10px 20px;border-radius:24px;border:none;cursor:pointer;
  white-space:nowrap;box-shadow:0 3px 10px rgba(58,42,26,.35);
  transition:opacity .2s,transform .2s;
  visibility:hidden;opacity:0;
  z-index:20;pointer-events:none;
  will-change:transform;
}
.reroll-slot-btn.visible{visibility:visible;opacity:1;pointer-events:auto;}
.reroll-slot-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(58,42,26,.45);}
.reroll-slot-btn.used{background:rgba(90,74,58,.25);color:var(--brown-light);cursor:not-allowed;box-shadow:none;}
.reroll-slot-btn.used:hover{transform:none;box-shadow:none;}
/* 再抽選POP */
.reroll-pop{
  position:absolute;left:10px;top:10px;
  font-size:10px;font-weight:700;letter-spacing:.06em;
  color:#fff;background:#2a9d8f;padding:3px 10px;border-radius:20px;
  border:none;white-space:nowrap;pointer-events:none;
  visibility:hidden;opacity:0;transition:opacity .2s;
  box-shadow:0 2px 6px rgba(42,157,143,.35);z-index:5;
}
.reroll-pop.visible{visibility:visible;opacity:1;}
@keyframes slotPulse{0%,100%{outline-color:rgba(200,160,96,.25);}50%{outline-color:rgba(200,160,96,.5);}}
@keyframes titleBtnPulse{0%,100%{box-shadow:0 0 0 0 rgba(58,42,26,0),0 4px 14px rgba(58,42,26,.22);}60%{box-shadow:0 0 0 6px rgba(58,42,26,.12),0 4px 14px rgba(58,42,26,.22);}}
.btn-roulette-next{margin-top:32px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;padding:16px 56px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;}
.btn-roulette-next.visible{opacity:1;pointer-events:auto;}
.btn-roulette-next:hover{transform:translateY(-2px);}

/* ── ④ 結果 ── */
#screen-result{background:rgba(245,240,232,0.82);padding-top:20px;}
.result-wrap{text-align:center;max-width:420px;width:100%;}
.result-title-hero{font-family:'Noto Serif JP',serif;font-size:22px;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:10px;animation:popIn .5s ease both;text-shadow:0 2px 20px rgba(200,160,96,.5);}
/* 広告カード本体 */
.res-card{
  background:#f5f0e8;border:3px solid #8a7060;border-radius:12px;
  padding:0 16px 14px;margin-bottom:14px;overflow:hidden;
  animation:popIn .5s ease both;
}
.res-card-band{
  background:#5a4a3a;color:#f5f0e8;margin:0 -16px 12px;padding:9px 0;
  font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:.18em;font-weight:700;
}
.res-equipped{
  display:inline-block;background:#c8a060;color:#fff;
  font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.06em;
  padding:5px 16px;border-radius:18px;margin-bottom:8px;
}
.res-prop-name{
  font-family:'Noto Serif JP',serif;font-size:23px;font-weight:700;
  color:#3a2a1a;letter-spacing:.04em;margin-bottom:8px;
}
.res-hashtags{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px;
}
.res-hashtag{
  font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;
  color:#6a8a50;background:rgba(106,138,80,.1);
  padding:3px 10px;border-radius:14px;letter-spacing:.02em;
}
.res-hashtag.new{background:#6a8a50;color:#fff;}
.result-ldk-hero{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);line-height:1;margin-bottom:12px;letter-spacing:.04em;}
.result-spec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.result-spec-card{background:#fff;border:1px solid rgba(90,74,58,.1);border-radius:10px;padding:10px 6px 8px;text-align:center;}
.result-spec-label{font-size:10px;letter-spacing:.15em;color:var(--brown-light);margin-bottom:5px;font-weight:500;}
.result-spec-value{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:var(--brown-dark);line-height:1;}
.result-spec-unit{font-size:11px;color:var(--brown-light);margin-left:1px;}
#res-madori-preview{display:flex;justify-content:center;margin-bottom:14px;}
.res-card-footer{margin-top:12px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#b0a090;letter-spacing:.1em;}
/* 称号行 */
.res-title-new-chip{display:inline-flex;align-items:center;gap:5px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.1em;padding:6px 14px;border-radius:4px;animation:popIn .4s ease both;}
.res-title-new-label{font-size:9px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:2px;letter-spacing:.06em;flex-shrink:0;}
.res-title-owned-chip{background:rgba(90,74,58,.07);color:var(--brown-light);font-size:11px;letter-spacing:.06em;padding:4px 10px;border-radius:20px;border:1px solid rgba(90,74,58,.12);}
/* ボタン（2x2グリッド） */
.result-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.btn-result{padding:13px 0;border-radius:8px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.08em;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;}
.btn-result.primary{background:var(--brown-dark);color:#f5f0e8;box-shadow:0 4px 14px rgba(58,42,26,.22);}
.btn-result.secondary{background:#fff;border:1px solid rgba(90,74,58,.22);color:var(--brown-light);}
.btn-result.fav{background:#fff;border:1px solid #c8a060;color:#b8860b;}
.btn-result.fav.active{background:#f4d06a;color:#6a4a10;border-color:#d4a020;}
.btn-result:hover{transform:translateY(-2px);}
.btn-result.primary:hover{box-shadow:0 6px 18px rgba(58,42,26,.3);}

/* ── ゲーム風トースト ── */
#game-toast{
  position:fixed;left:50%;bottom:48px;transform:translateX(-50%) translateY(20px);
  background:rgba(58,42,26,.94);color:#f5f0e8;
  font-family:'Noto Sans JP',sans-serif;font-size:14px;letter-spacing:.04em;
  padding:13px 24px;border-radius:30px;z-index:400;
  box-shadow:0 6px 24px rgba(58,42,26,.35);
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;
}
#game-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── ゲーム風確認ダイアログ ── */
#game-confirm-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(58,42,26,.55);align-items:center;justify-content:center;padding:24px;
}
#game-confirm-overlay.active{display:flex;}
#game-confirm-box{
  background:var(--cream);border:2px solid #c8a060;border-radius:16px;
  max-width:340px;width:100%;padding:26px 22px 20px;text-align:center;
  box-shadow:0 12px 40px rgba(58,42,26,.4);animation:popIn .3s ease both;
}
#game-confirm-msg{
  font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.7;
  color:var(--brown-dark);letter-spacing:.03em;margin-bottom:20px;white-space:pre-line;
}
#game-confirm-btns{display:flex;gap:10px;}
.gc-btn{flex:1;padding:12px 0;border-radius:10px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.08em;cursor:pointer;border:none;transition:transform .15s;}
.gc-btn:hover{transform:translateY(-2px);}
.gc-cancel{background:#fff;border:1px solid rgba(90,74,58,.25);color:var(--brown-light);}
.gc-ok{background:var(--brown-dark);color:#f5f0e8;}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--cream);border-radius:12px;padding:24px 20px 28px;width:92%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--brown-dark);margin-bottom:20px;letter-spacing:.1em;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;margin-top:-4px;}
.modal-empty{font-size:13px;color:var(--brown-light);text-align:center;padding:24px 0;line-height:2;}

/* ── 称号一覧グリッド ── */
.title-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:148px;
  gap:10px;
  padding:4px 0;
  align-content:start;
}
@media(max-width:520px){
  .title-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:140px;gap:12px;}
  .title-grid-badge{font-size:34px;}
  .title-grid-name{font-size:17px;line-height:1.25;}
  .title-grid-card.locked .title-grid-name{font-size:16px;}
  .title-grid-cond{font-size:12px;line-height:1.35;}
  .title-grid-card{padding:10px 8px;min-height:0;}
}
/* スマホ（縦長・狭い画面）：上部パーツゾーンと下部ボタンを縮めて盤を広く */
@media(max-width:600px){
  #game-top-row2{padding:2px 6px 3px;gap:4px;}
  #current-piece-wrap{padding:2px 4px;}
  #hold-col,#next-col{padding:2px 5px;}
  #current-piece-wrap .piece-label,.hold-label{font-size:8px;}
  .ui-hint,.next-sublabel{font-size:8px;}
  .ui-hint{padding:2px 6px;}
  .btn-undo{padding:14px 20px 11px;}
  .btn-undo .undo-icon{font-size:28px;}
  .btn-undo .undo-label{font-size:11px;}
  .btn-rotate-new{padding:15px 26px 12px;}
  .btn-rotate-new .rot-icon{font-size:30px;}
  .btn-rotate-new .rot-label{font-size:11px;}
  #game-bottom-bar{padding:10px 12px max(48px,calc(env(safe-area-inset-bottom) + 32px));gap:12px;}
}
.title-grid-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  padding:12px 10px;border-radius:10px;text-align:center;
  background:#fff;border:1.5px solid rgba(90,74,58,.1);
  transition:border-color .2s;
  height:100%;overflow:hidden;
}
.title-grid-card.owned{
  border-color:var(--accent);
  background:linear-gradient(160deg,#fffdf7,#fdf5e4);
}
.title-grid-card.locked{
  background:#f8f5f0;
  border-color:rgba(90,74,58,.08);
}
.title-grid-badge{
  font-size:32px;line-height:1;
  transition:filter .2s;
}
.title-grid-card.locked .title-grid-badge{
  filter:grayscale(1) brightness(1.1);
  opacity:0.45;
}
.title-grid-name{
  font-family:'Noto Serif JP',serif;
  font-size:13px;font-weight:700;
  color:var(--brown-dark);
  letter-spacing:.04em;line-height:1.35;
  word-break:break-all;
}
.title-grid-card.locked .title-grid-name{
  color:var(--brown-light);
  letter-spacing:.06em;
  font-size:11px;
}
.title-grid-cond{
  font-size:11px;color:var(--brown-light);
  line-height:1.45;letter-spacing:.02em;
}
.title-grid-new-badge{
  font-size:8px;font-weight:700;letter-spacing:.06em;
  background:var(--accent);color:#fff;
  padding:1px 5px;border-radius:3px;margin-top:1px;
}

/* ── 間取り背景 ── */
.madori-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .6s ease;}
.madori-bg.visible{opacity:1;}
.madori-bg canvas{max-width:80vw;max-height:80vh;opacity:.18;filter:blur(1px) sepia(.2);border-radius:8px;}
#screen-roulette,#screen-result{position:relative;z-index:1;background:transparent!important;}

/* ── アニメーション ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
@keyframes gentlePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,160,96,0);}50%{opacity:1;box-shadow:0 0 20px 6px rgba(200,160,96,.35);}}
.pop-in{animation:popIn .4s ease both;}
/* 称号画面 */
.titles-heading{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;letter-spacing:.2em;color:var(--brown-dark);margin-bottom:28px;}
.title-new-item{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--brown-dark);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:.12em;
  padding:14px 24px;border-radius:6px;width:100%;box-sizing:border-box;
  will-change:opacity,transform;
}
.title-new-badge-inline{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;}
.titles-owned-section{margin-top:20px;width:100%;}
.titles-owned-label-sm{font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:8px;opacity:.7;}
.titles-owned-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;opacity:.5;}
.title-owned-chip{background:rgba(90,74,58,.08);color:var(--brown-light);font-size:12px;letter-spacing:.08em;padding:6px 16px;border-radius:20px;border:1px solid rgba(90,74,58,.15);font-family:'Noto Serif JP',serif;will-change:opacity,transform;}
</style>
</head>
<body>

<!-- ① スタート -->
<div id="screen-start" class="screen active">
  <!-- 左上：名前＋称号コーナー -->
  <div id="start-profile" style="position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;text-align:left;animation:fadeDown .6s ease both;max-width:200px;">
    <div id="start-profile-title" style="font-size:11px;color:var(--accent);letter-spacing:.12em;font-family:'Noto Serif JP',serif;margin-bottom:3px;min-height:16px;"></div>
    <div id="start-profile-name" style="font-size:16px;font-weight:700;color:var(--brown-dark);font-family:'Noto Serif JP',serif;letter-spacing:.1em;cursor:pointer;" onclick="openNameEdit()" title="タップで名前を編集">
      <span id="start-name-text">名前未設定</span><span style="font-size:10px;color:var(--brown-light);margin-left:4px;">✎</span>
    </div>
  </div>
  <div class="logo-wrap">
    <span class="logo-icon">🏠</span>
    <div class="logo-title">間取りすと</div>
    <div class="logo-sub">MADORI-ST</div>
  </div>
  <button class="btn-start" onclick="gotoGame()">は じ め る</button>
  <div class="start-sub-btns">
    <button class="btn-sub" onclick="openModal('saves')">間取り保存一覧</button>
    <button class="btn-sub" onclick="openModal('titles')">称号一覧</button>
  </div>
</div>

<!-- 名前編集モーダル -->
<div class="modal-overlay" id="name-edit-overlay" onclick="closeNameEdit(event)">
  <div class="modal-box" style="max-height:auto;padding:28px 28px 24px;">
    <button class="modal-close" onclick="closeNameEdit()">✕</button>
    <div class="modal-title">マドリスト名を設定</div>
    <input id="player-name-input" type="text" maxlength="12" placeholder="名前を入力（最大12文字）"
      style="width:100%;background:#fff;border:1px solid rgba(90,74,58,.25);border-radius:4px;padding:10px 14px;font-size:15px;color:var(--brown-dark);font-family:'Noto Serif JP',serif;letter-spacing:.1em;outline:none;margin-bottom:16px;"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(90,74,58,.25)'">
    <div style="font-size:11px;color:var(--brown-light);margin-bottom:16px;">称号を選んで名前の上に表示できます</div>
    <div id="name-edit-title-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;"></div>
    <button onclick="saveNameEdit()" style="width:100%;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.15em;padding:13px 0;border:none;border-radius:4px;cursor:pointer;">決　定</button>
  </div>
</div>

<!-- ② ゲーム -->
<div id="screen-game" class="screen">

  <!-- 上部バー -->
  <div id="game-top-bar">
    <!-- 1段目：設置数 + ナビ -->
    <div id="game-top-row1">
      <div id="part-count-grid">
        <!-- JS で動的生成 -->
      </div>
      <div id="game-nav-btns">
        <button class="btn-nav" onclick="gotoStart()">スタートへ</button>
        <button class="btn-nav" onclick="gotoGame()">リトライ</button>
      </div>
    </div>
    <!-- 2段目：次次/次 | 現在★ | 保留 -->
    <div id="game-top-row2">
      <!-- 次のパーツ横並び（次の次→次） -->
      <div id="next-col">
        <div style="display:flex;flex-direction:row;align-items:center;gap:6px;">
          <div class="next-row">
            <div class="next-sublabel">次の次</div>
            <canvas id="canvas-next2" width="56" height="56"></canvas>
          </div>
          <div class="next-row">
            <div class="next-sublabel em">次</div>
            <canvas id="canvas-next1" width="56" height="56"></canvas>
          </div>
        </div>
        <div id="pc-rotate-hint" class="ui-hint">右クリックで回転</div>
      </div>
      <!-- 現在パーツ（ドラッグ可） -->
      <div id="current-piece-wrap" title="ドラッグして土地に置く">
        <div class="piece-label">今のパーツ</div>
        <canvas id="canvas-current" width="98" height="98"></canvas>
        <div id="current-piece-hint" class="ui-hint">ドラッグ or 土地タップ</div>
      </div>
      <!-- 保留 -->
      <div id="hold-col" onclick="if(gameScene)gameScene.doHold()">
        <div class="hold-label">保留</div>
        <canvas id="canvas-hold" width="98" height="98"></canvas>
        <div id="hold-hint" class="ui-hint">タップで交換</div>
      </div>
    </div>
  </div>

  <div id="game-container"></div>
  <div id="btn-complete-overlay">
    <button onclick="onCompleteBtn()">完　成</button>
  </div>

  <!-- 下部ボタンバー -->
  <div id="game-bottom-bar">
    <!-- 左：戻す -->
    <button class="btn-undo" onclick="if(gameScene)gameScene.doUndo()">
      <span class="undo-icon">↩</span>
      <span class="undo-label">戻す</span>
    </button>
    <!-- 中央：回転ユニット -->
    <div id="rotate-unit">
      <button class="btn-rotate-new" onmousedown="event.preventDefault();if(gameScene)gameScene.rotatePiece(-1)" ontouchstart="event.preventDefault();if(gameScene)gameScene.rotatePiece(-1)" title="左回転（Z）">
        <span class="rot-icon">↺</span>
        <span class="rot-label">左回転</span>
      </button>
      <div id="rotate-divider"></div>
      <button class="btn-rotate-new" onmousedown="event.preventDefault();if(gameScene)gameScene.rotatePiece(1)" ontouchstart="event.preventDefault();if(gameScene)gameScene.rotatePiece(1)" title="右回転（X / 右クリック）">
        <span class="rot-icon">↻</span>
        <span class="rot-label">右回転</span>
      </button>
    </div>
    <!-- 右：戻す -->
    <button class="btn-undo" onclick="if(gameScene)gameScene.doUndo()">
      <span class="undo-icon">↩</span>
      <span class="undo-label">戻す</span>
    </button>
  </div>
</div>

<!-- ドラッグゴースト -->
<canvas id="drag-ghost" width="120" height="120"></canvas>

<!-- 間取り背景 -->
<div class="madori-bg" id="madori-bg"></div>

<!-- ③ ルーレット -->
<div id="screen-roulette" class="screen">
  <div class="roulette-title">物件情報を引いてみよう</div>
  <div class="roulette-item-wrap">
    <div class="roulette-item" id="rou-0" onclick="lockRoulette(0)">
      <div class="roulette-item-label">築年数</div>
      <div class="roulette-item-value" id="rou-val-0">---</div>
      <span class="tap-hint">タップで確定</span>
      <button class="reroll-slot-btn" id="reroll-btn-0" onclick="event.stopPropagation();doRerollSlot(0)">🎲 再抽選</button>
      <div class="reroll-pop">再抽選で築浅確定！</div>
    </div>
  </div>
  <div class="roulette-item-wrap">
    <div class="roulette-item" id="rou-1" onclick="lockRoulette(1)">
      <div class="roulette-item-label">駅徒歩</div>
      <div class="roulette-item-value" id="rou-val-1">---</div>
      <span class="tap-hint">タップで確定</span>
      <button class="reroll-slot-btn" id="reroll-btn-1" onclick="event.stopPropagation();doRerollSlot(1)">🎲 再抽選</button>
      <div class="reroll-pop">再抽選で駅近確定！</div>
    </div>
  </div>
  <div class="roulette-item-wrap">
    <div class="roulette-item" id="rou-2" onclick="lockRoulette(2)">
      <div class="roulette-item-label">家賃</div>
      <div class="roulette-item-value" id="rou-val-2">---</div>
      <span class="tap-hint">タップで確定</span>
      <button class="reroll-slot-btn" id="reroll-btn-2" onclick="event.stopPropagation();doRerollSlot(2)">🎲 再抽選</button>
      <div class="reroll-pop">再抽選で高級確定！</div>
    </div>
  </div>
  <button class="btn-roulette-next" id="btn-rou-next" onclick="gotoTitles()">物 件 完 成 →</button>
  <div style="font-size:10px;color:var(--brown-light);margin-top:8px;letter-spacing:.06em;text-align:center;">
    ※ 再抽選は広告視聴で無料（実装予定）
  </div>
</div>

<!-- ④ 称号発表画面（物件完成の手前） -->
<div id="screen-titles" class="screen">
  <div style="text-align:center;max-width:420px;width:100%;">
    <div class="titles-heading">獲 得 称 号</div>
    <div id="title-reveal-list" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;"></div>
    <div class="titles-owned-section" id="titles-owned-section" style="display:none;">
      <div class="titles-owned-label-sm">所 持 称 号</div>
      <div class="titles-owned-chips" id="titles-owned-chips"></div>
    </div>
    <button id="title-next-btn" onclick="gotoResult()" style="
      margin-top:36px;background:var(--brown-dark);color:#f5f0e8;
      font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;
      padding:16px 48px;border:none;border-radius:4px;cursor:pointer;
      opacity:0;transition:opacity .4s;pointer-events:none;
    ">物 件 完 成 →</button>
  </div>
</div>

<!-- ⑤ 結果画面（賃貸広告風） -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div id="res-card" class="res-card">
      <div class="res-card-band">賃 貸 物 件 情 報</div>
      <!-- 装備称号 -->
      <div id="res-equipped-title" class="res-equipped" style="display:none;"></div>
      <!-- 物件名 -->
      <div id="res-prop-name" class="res-prop-name">間取りすと：とくめい</div>
      <!-- ハッシュタグ（物件説明一言タグ風） -->
      <div id="res-hashtags" class="res-hashtags" style="display:none;"></div>
      <!-- 間取りラベル -->
      <div class="result-ldk-hero" id="res-room-label">---</div>
      <!-- 間取り図プレビュー（小さめ） -->
      <div id="res-madori-preview"></div>
      <!-- スペックカード3列 -->
      <div class="result-spec-grid pop-in">
        <div class="result-spec-card">
          <div class="result-spec-label">築 年 数</div>
          <div class="result-spec-value" id="res-age">--<span class="result-spec-unit">年</span></div>
        </div>
        <div class="result-spec-card">
          <div class="result-spec-label">駅 徒 歩</div>
          <div class="result-spec-value" id="res-walk">--<span class="result-spec-unit">分</span></div>
        </div>
        <div class="result-spec-card">
          <div class="result-spec-label">家 賃</div>
          <div class="result-spec-value" id="res-rent">--<span class="result-spec-unit">万</span></div>
        </div>
      </div>
      <div class="res-card-footer">MADORI-ST　間取りすと</div>
    </div>

    <!-- ボタン（2段） -->
    <div class="result-btn-grid">
      <button class="btn-result fav" id="res-fav-btn" onclick="toggleResultFav()">☆ お気に入り</button>
      <button class="btn-result primary" onclick="saveAndShare()">📤 保存＆シェア</button>
      <button class="btn-result secondary" onclick="gotoStart()">タイトルへ</button>
      <button class="btn-result secondary" onclick="gotoGame()">もう一度</button>
    </div>
    <div id="save-toast" style="display:none;margin-top:10px;font-size:12px;color:var(--green);letter-spacing:.1em;text-align:center;">✓ 保存しました</div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ゲーム風トースト -->
<div id="game-toast"></div>

<!-- ゲーム風確認ダイアログ -->
<div id="game-confirm-overlay">
  <div id="game-confirm-box">
    <div id="game-confirm-msg"></div>
    <div id="game-confirm-btns">
      <button id="game-confirm-cancel" class="gc-btn gc-cancel">やめる</button>
      <button id="game-confirm-ok" class="gc-btn gc-ok">OK</button>
    </div>

<script>
// ────────────────────────────────────────
// ゲーム風 トースト / 確認ダイアログ
// ────────────────────────────────────────
let _gameToastTimer=null;
function showGameToast(msg){
  const el=document.getElementById('game-toast');
  if(!el)return;
  el.textContent=msg;
  el.classList.add('show');
  if(_gameToastTimer)clearTimeout(_gameToastTimer);
  _gameToastTimer=setTimeout(()=>{el.classList.remove('show');},2400);
}
// 紙吹雪演出（最高レア時）：扇状に上へ打ち上げて落下
function fireConfetti(idx){
  const colors=['#ff5a5a','#ffb43b','#ffe600','#5ac878','#5a8cff','#9b5aff','#ff5ad1'];
  const slot=document.getElementById('rou-'+(idx!=null?idx:0));
  let originX=window.innerWidth/2, originY=window.innerHeight/2;
  if(slot){ const r=slot.getBoundingClientRect(); originX=r.left+r.width/2; originY=r.top+r.height/2; }
  const N=90;
  const G=0.45;          // 重力（px/frame^2）
  const pieces=[];
  for(let i=0;i<N;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.background=colors[i%colors.length];
    const sz=6+Math.random()*8;
    p.style.width=sz+'px'; p.style.height=sz+'px';
    if(Math.random()<0.5)p.style.borderRadius='50%';
    p.style.left='0px'; p.style.top='0px';
    document.body.appendChild(p);
    // 扇状：上向き中心(-90°)に±55°ばらつき、初速を強めに
    const angle=(-90 + (Math.random()-0.5)*110) * Math.PI/180;
    const speed=11 + Math.random()*9;
    pieces.push({
      el:p,
      x:originX+(Math.random()-0.5)*30,
      y:originY+(Math.random()-0.5)*20,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,   // 負＝上向き
      rot:Math.random()*360,
      vr:(Math.random()-0.5)*24,
      life:0,
      maxLife:90+Math.random()*40
    });
  }
  function step(){
    let alive=false;
    for(const pc of pieces){
      if(pc.life>pc.maxLife){ if(pc.el.parentNode){pc.el.parentNode.removeChild(pc.el);} continue; }
      alive=true;
      pc.life++;
      pc.vy+=G;
      pc.x+=pc.vx;
      pc.y+=pc.vy;
      pc.vx*=0.99;
      pc.rot+=pc.vr;
      const op=pc.life>pc.maxLife*0.7 ? Math.max(0,1-(pc.life-pc.maxLife*0.7)/(pc.maxLife*0.3)) : 1;
      pc.el.style.transform=`translate(${pc.x}px,${pc.y}px) rotateZ(${pc.rot}deg)`;
      pc.el.style.opacity=op;
    }
    if(alive)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
// Promise<boolean> を返す確認ダイアログ（OKでtrue）
function showGameConfirm(msg,okLabel,cancelLabel){
  return new Promise((resolve)=>{
    const ov=document.getElementById('game-confirm-overlay');
    const msgEl=document.getElementById('game-confirm-msg');
    const okBtn=document.getElementById('game-confirm-ok');
    const cancelBtn=document.getElementById('game-confirm-cancel');
    if(!ov||!msgEl||!okBtn||!cancelBtn){resolve(window.confirm(msg));return;}
    msgEl.textContent=msg;
    okBtn.textContent=okLabel||'OK';
    cancelBtn.textContent=cancelLabel||'やめる';
    ov.classList.add('active');
    const cleanup=(val)=>{
      ov.classList.remove('active');
      okBtn.onclick=null; cancelBtn.onclick=null;
      resolve(val);
    };
    okBtn.onclick=()=>cleanup(true);
    cancelBtn.onclick=()=>cleanup(false);
  });
}
// お知らせだけのダイアログ（OKのみ）
function showGameAlert(msg){
  return new Promise((resolve)=>{
    const ov=document.getElementById('game-confirm-overlay');
    const msgEl=document.getElementById('game-confirm-msg');
    const okBtn=document.getElementById('game-confirm-ok');
    const cancelBtn=document.getElementById('game-confirm-cancel');
    if(!ov||!msgEl||!okBtn||!cancelBtn){window.alert(msg);resolve();return;}
    msgEl.textContent=msg;
    okBtn.textContent='OK';
    cancelBtn.style.display='none';
    ov.classList.add('active');
    okBtn.onclick=()=>{
      ov.classList.remove('active');
      cancelBtn.style.display=''; okBtn.onclick=null;
      resolve();
    };
  });
}

// 画面管理
// ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar=document.getElementById('game-bottom-bar');
  const topBar=document.getElementById('game-top-bar');
  if(id==='screen-game'){
    bar.classList.add('active');
    if(topBar) topBar.classList.add('active');
  }else{
    bar.classList.remove('active');
    if(topBar) topBar.classList.remove('active');
  }
}
// .screen の共通display指定をgame以外に限定
document.querySelectorAll('.screen').forEach(s=>{
  if(s.id==='screen-game') return; // game画面は独自制御
});

let madoriSnapshot=null;
function captureMadoriSnapshot(){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas)return;
  const clone=document.createElement('canvas');
  clone.width=canvas.width; clone.height=canvas.height;
  clone.getContext('2d').drawImage(canvas,0,0);
  madoriSnapshot=clone;
}
function showMadoriBg(visible){
  const bg=document.getElementById('madori-bg');
  if(visible&&madoriSnapshot){
    bg.innerHTML='';
    const c=document.createElement('canvas');
    c.width=madoriSnapshot.width; c.height=madoriSnapshot.height;
    c.getContext('2d').drawImage(madoriSnapshot,0,0);
    bg.appendChild(c);
    requestAnimationFrame(()=>bg.classList.add('visible'));
  }else{
    bg.classList.remove('visible');
    setTimeout(()=>{bg.innerHTML='';},600);
  }
}

let gameStarted=false;
let gameScene=null;

function updateStartProfile(){
  const name=localStorage.getItem('madori-player-name')||'';
  const titleSel=localStorage.getItem('madori-selected-title')||'';
  const nameEl=document.getElementById('start-name-text');

  if(titleEl) titleEl.textContent=titleSel;

function openNameEdit(){
  const ov=document.getElementById('name-edit-overlay');
  if(!ov)return;
  const inp=document.getElementById('player-name-input');
  if(inp) inp.value=localStorage.getItem('madori-player-name')||'';
  const titles=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const sel=localStorage.getItem('madori-selected-title')||'';
  const listEl=document.getElementById('name-edit-title-list');
  if(listEl){
    listEl.innerHTML='';
    listEl.dataset.selected=sel;
    const noneBtn=document.createElement('button');
    noneBtn.textContent='なし'; noneBtn.dataset.val='';
    noneBtn.style.cssText='padding:6px 14px;border-radius:20px;border:1.5px solid '+(sel===''?'var(--brown-dark)':'rgba(90,74,58,.25)')+';background:'+(sel===''?'var(--brown-dark)':'#fff')+';color:'+(sel===''?'#f5f0e8':'var(--brown-light)')+';font-size:12px;cursor:pointer;font-family:Noto Serif JP,serif;letter-spacing:.06em;transition:all .15s;';
    noneBtn.onclick=()=>selectTitleChip('');
    listEl.appendChild(noneBtn);
    titles.forEach(t=>{
      const btn=document.createElement('button');
      btn.textContent=t; btn.dataset.val=t;
      const active=sel===t;
      btn.style.cssText='padding:6px 14px;border-radius:20px;border:1.5px solid '+(active?'var(--brown-dark)':'rgba(90,74,58,.2)')+';background:'+(active?'var(--brown-dark)':'#fff')+';color:'+(active?'#f5f0e8':'var(--brown)')+';font-size:12px;cursor:pointer;font-family:Noto Serif JP,serif;letter-spacing:.06em;transition:all .15s;';
      btn.onclick=()=>selectTitleChip(t);

    });

function selectTitleChip(val){
  const listEl=document.getElementById('name-edit-title-list');
  if(!listEl)return;
  listEl.dataset.selected=val;
  listEl.querySelectorAll('button').forEach(btn=>{
    const active=btn.dataset.val===val;
    btn.style.background=active?'var(--brown-dark)':'#fff';
    btn.style.color=active?'#f5f0e8':'var(--brown)';
    btn.style.borderColor=active?'var(--brown-dark)':'rgba(90,74,58,.2)';
  });
}
function saveNameEdit(){
  const inp=document.getElementById('player-name-input');
  const name=(inp?inp.value.trim():'');
  const listEl=document.getElementById('name-edit-title-list');
  const selTitle=listEl?(listEl.dataset.selected??''):'';
  localStorage.setItem('madori-player-name',name);
  localStorage.setItem('madori-selected-title',selTitle);
  updateStartProfile();
  closeNameEdit();
}
function closeNameEdit(e){
  const ov=document.getElementById('name-edit-overlay');
  if(!e||e.target===ov) ov.classList.remove('active');
}

// ────────────────────────────────────────
// 再抽選（各スロット1日1回）
// ════════════════════════════════════════
// 物件情報ガチャ：ブロック重み付き抽選
// ════════════════════════════════════════
// 各ブロック: {lo,hi,step,weight}（lo以上hi以下・step刻み）
// A.築年数  ①0-5(レア) ②6-29(最頻) ③30-50(5刻み,50が逆レア)
// B.駅徒歩  ①0-5(レア) ②6-15(最頻1) ③16-29(最頻2) ④30-50(10刻み,50が逆レア)
// C.家賃    ①5-9(5が逆レア) ②10-20(最頻) ③21-39 ④40-75(5刻み) ⑤80-100(レア,10刻み)
const GACHA_BLOCKS=[
  // A.築年数
  [
    {lo:0,  hi:5,  step:1, weight:6},   // ①レア
    {lo:6,  hi:29, step:1, weight:60},  // ②最頻
    {lo:30, hi:50, step:5, weight:18},  // ③（50が逆レア）
  ],
  // B.駅徒歩
  [
    {lo:0,  hi:5,  step:1, weight:6},   // ①レア
    {lo:6,  hi:15, step:1, weight:42},  // ②最頻1
    {lo:16, hi:29, step:1, weight:32},  // ③最頻2
    {lo:30, hi:50, step:10,weight:12},  // ④（50が逆レア）
  ],
  // C.家賃  ①5-9(5が逆レア) ②10-20(最頻) ③21-39 ④40-65(5刻み) ⑤70-100(レア,10刻み)
  // 確率の多い順：②①③④⑤
  [
    {lo:5,  hi:9,  step:1, weight:26},  // ①（5が逆レア）2番目に多い
    {lo:10, hi:20, step:1, weight:46},  // ②最頻（最多）
    {lo:21, hi:39, step:1, weight:16},  // ③3番目
    {lo:40, hi:65, step:5, weight:8},   // ④4番目
    {lo:70, hi:100,step:10,weight:4},   // ⑤レア（最少）
  ],
];
// レア値（プレミアム）：A①0-5, B①0-5, C⑤70-100
function isRareGacha(idx,val){
  if(idx===0) return val<=5;
  if(idx===1) return val<=5;
  if(idx===2) return val>=70;
  return false;
}
// 逆レア値（ニッチ）：A 50, B 50, C 5
function isInverseRare(idx,val){
  if(idx===0) return val>=50;
  if(idx===1) return val>=50;
  if(idx===2) return val<=5;
  return false;
}
// 最高レア値（虹色・超おめでたい演出）：築年数0, 駅徒歩0, 家賃100
function isSuperRare(idx,val){
  if(idx===0) return val===0;
  if(idx===1) return val===0;
  if(idx===2) return val>=100;
  return false;
}
// ブロック内の取りうる値リスト
function blockValues(b){
  const arr=[];
  for(let v=b.lo; v<=b.hi; v+=b.step) arr.push(v);
  return arr;
}
// 項目idxの全候補値（スピン表示用）
function gachaAllValues(idx){
  const out=[];
  GACHA_BLOCKS[idx].forEach(b=>{ blockValues(b).forEach(v=>out.push(v)); });
  return out;
}
// 重み付き抽選で1つの値を返す
function drawGachaValue(idx){
  const blocks=GACHA_BLOCKS[idx];
  const total=blocks.reduce((s,b)=>s+b.weight,0);
  let r=Math.random()*total;
  let chosen=blocks[blocks.length-1];
  for(const b of blocks){ if(r<b.weight){chosen=b;break;} r-=b.weight; }
  const vals=blockValues(chosen);
  return vals[Math.floor(Math.random()*vals.length)];
}

// ────────────────────────────────────────
// レア判定
const RARE_COND=[
  v=>v<=5,    // 築年数5以下
  v=>v<=5,    // 駅徒歩5以下
  v=>v>=70,   // 家賃70以上（高級＝レア）
];
function isRare(idx,val){return isRareGacha(idx,val);}

// 再抽選確定プール（築浅5以下・駅近5以下）
const REROLL_POOLS={
  0:[0,1,2,3,4,5],        // 築浅確定（レア）
  1:[0,1,2,3,4,5],          // 駅近確定（レア）
  2:[70,80,90,100],       // 高級確定（家賃レア70以上）
};
// 再抽選済みフラグ（per slot）
const rerollDone=[false,false,false];

// 開発中：再抽選制限なし（将来：広告視聴で1日1回）
function isRerollUsed(idx){return false;}
function markRerollUsed(idx){/* 開発中は何もしない */}

function updateRerollBtnSlot(idx){
  const btn=document.getElementById('reroll-btn-'+idx);
  if(!btn)return;
  if(isRerollUsed(idx)){
    btn.classList.add('used');
    btn.textContent='使用済み';
  }else{
    btn.classList.remove('used');
    btn.textContent='🎲 再抽選';
  }
}

function doRerollSlot(idx){
  if(isRerollUsed(idx))return;
  rerollDone[idx]=true;  // 再抽選済みフラグ
  const item=document.getElementById('rou-'+idx);
  const valEl=document.getElementById('rou-val-'+idx);
  const rb=document.getElementById('reroll-btn-'+idx);
  if(rb) rb.classList.remove('visible');
  const pop=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop) pop.classList.remove('visible');
  document.getElementById('btn-rou-next').classList.remove('visible');
  item.classList.remove('locked','rare','niche','super-rare','active-slot');
  item.classList.add('active-slot');
  valEl.classList.add('spinning');
  rouletteValues[idx]=null;
  rouletteLocked[idx]=false;
  lockedCount=[0,1,2].filter(i=>i!==idx&&rouletteLocked[i]).length;
  if(rouletteIntervals[idx])clearInterval(rouletteIntervals[idx]);
  const all=gachaAllValues(idx);
  rouletteIntervals[idx]=setInterval(()=>{
    valEl.textContent=all[Math.floor(Math.random()*all.length)]+rouletteUnits[idx];
  },80);
  item.onclick=()=>lockRerollSlot(idx);
  updateRerollBtnSlot(idx);
}

// 再抽選後の確定用
function lockRerollSlot(idx){
  if(rouletteLocked[idx])return;
  clearInterval(rouletteIntervals[idx]);
  // レア確定プールがあればそれ（築浅・駅近確定）、なければ通常の重み付き抽選
  let val;
  if(REROLL_POOLS[idx]){
    const pool=REROLL_POOLS[idx];
    val=pool[Math.floor(Math.random()*pool.length)];
  } else {
    val=drawGachaValue(idx);
  }
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.remove('rare','niche','super-rare');
  document.getElementById('rou-'+idx).classList.add('locked');
  if(isSuperRare(idx,val)){
    document.getElementById('rou-'+idx).classList.add('rare','super-rare');
    fireConfetti(idx);
  }
  else if(isRareGacha(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  else if(isInverseRare(idx,val)) document.getElementById('rou-'+idx).classList.add('niche');
  // 再抽選後は自スロットのPOPを消す
  const pop2=document.querySelector('#rou-'+idx+' .reroll-pop');
  if(pop2) pop2.classList.remove('visible');
  // 次のスロットをアクティブに（まだ確定していないスロットがある場合）
  if(idx+1<3 && !rouletteLocked[idx+1]) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  lockedCount=[0,1,2].filter(i=>rouletteLocked[i]).length;
  if(lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 再抽選完了後はどのスロットもPOPは表示しない
    }
  }
}

function gotoGame(){
  window._playerName=localStorage.getItem('madori-player-name')||'';
  showMadoriBg(false);
  showScreen('screen-game');
  document.getElementById('btn-complete-overlay').classList.remove('visible');
  // 既存のPhaserインスタンスを破棄して新規作成（再起動でツモが変わる問題を防ぐ）
  const existing=document.querySelector('#game-container canvas');
  if(existing){
    // Phaserゲームを完全に破棄
    if(window._phaserGame){window._phaserGame.destroy(true);window._phaserGame=null;}
    gameScene=null; gameStarted=false;
  }
  if(!gameStarted){
    gameStarted=true;
    setTimeout(()=>startPhaserGame(),50);
  }
}

// 称号を1つずつ表示するアニメーション
function showTitlesReveal(){
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    const seenPids=new Set();
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed&&!seenPids.has(cell.pid)){
        seenPids.add(cell.pid);
        roomTypes.add(cell.type);
        counts[cell.type]=(counts[cell.type]||0)+1;
      }
    }));
  }
  const earned=generateTitles(age,walk,rent,roomTypes);
  const saved=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  const newTitles=[], ownedTitles=[];
  earned.forEach(t=>{
    if(!saved.includes(t.title)){newTitles.push(t.title);saved.unshift(t.title);}
    else ownedTitles.push(t.title);
  });
  localStorage.setItem('madori-titles',JSON.stringify(saved));
  window._earnedTitles=earned;
  window._newTitles=newTitles;

  const listEl=document.getElementById('title-reveal-list');
  listEl.innerHTML='';
  const ownedSection=document.getElementById('titles-owned-section');
  const ownedChips=document.getElementById('titles-owned-chips');
  if(ownedSection) ownedSection.style.display='none';
  const btn=document.getElementById('title-next-btn');
  btn.style.opacity='0'; btn.style.pointerEvents='none';

  // 全称号を順番に優しく出現（NEW → 既所持の順）
  const allItems=[
    ...newTitles.map(t=>({title:t,isNew:true})),
    ...ownedTitles.map(t=>({title:t,isNew:false}))
  ];

  const INTERVAL=220; // 1件ごとの間隔ms
  const DURATION=320; // フェード時間ms

  allItems.forEach(({title,isNew},i)=>{
    const delay=200+i*INTERVAL;
    setTimeout(()=>{
      const el=document.createElement('div');
      if(isNew){
        el.className='title-new-item';
        el.innerHTML=`<span class="title-new-badge-inline">NEW！</span>${title}`;
      } else {
        el.className='title-owned-chip';
        el.style.display='block';
        el.style.marginBottom='8px';
        el.textContent=title;
      }
      el.style.opacity='0';
      el.style.transform='translateY(12px)';
      el.style.transition=`opacity ${DURATION}ms ease, transform ${DURATION}ms ease`;
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1';
        el.style.transform='translateY(0)';
      }));
    }, delay);
  });

  // 称号ゼロ
  if(earned.length===0){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='title-new-item';
      el.style.cssText='opacity:0;transform:translateY(12px);transition:opacity .38s ease,transform .38s ease;background:rgba(90,74,58,.1);color:var(--brown-light);';
      el.textContent='な し';
      listEl.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.opacity='1'; el.style.transform='translateY(0)';
      }));
    }, 200);
  }

  const totalDelay=200+Math.min(allItems.length,1)*INTERVAL+DURATION;
  setTimeout(()=>{
    btn.style.opacity='1'; btn.style.pointerEvents='auto';
    btn.style.animation='titleBtnPulse 2s ease-in-out infinite';
  }, totalDelay);
}

const rouletteLocked=[false,false,false];
const rouletteValues=[null,null,null];
const rouletteUnits=['年','分','万円'];
let rouletteIntervals=[null,null,null];
let lockedCount=0;
function startRoulette(){
  lockedCount=0;
  rerollDone[0]=rerollDone[1]=rerollDone[2]=false;
  for(let i=0;i<3;i++){
    rouletteLocked[i]=false; rouletteValues[i]=null;
    document.getElementById('rou-'+i).classList.remove('locked','active-slot','rare','niche','super-rare');
    document.getElementById('rou-val-'+i).classList.add('spinning');
    const rb=document.getElementById('reroll-btn-'+i);
    if(rb) rb.classList.remove('visible');
    // POPをCSSクラスでリセット（style.displayは使わない）
    const pop=document.querySelector('#rou-'+i+' .reroll-pop');
    if(pop){pop.classList.remove('visible');pop.style.display='';}
    // スロットのonclickをlockRouletteに戻す（クロージャに注意してIIFE使用）
    ;(function(n){ document.getElementById('rou-'+n).onclick=function(){lockRoulette(n);}; })(i);
  }
  document.getElementById('rou-0').classList.add('active-slot');
  document.getElementById('btn-rou-next').classList.remove('visible');
  for(let i=0;i<3;i++){
    if(rouletteIntervals[i])clearInterval(rouletteIntervals[i]);
    (idx=>{
      const all=gachaAllValues(idx);
      rouletteIntervals[idx]=setInterval(()=>{
        document.getElementById('rou-val-'+idx).textContent=all[Math.floor(Math.random()*all.length)]+rouletteUnits[idx];
      },80);
    })(i);
  }
}
function lockRoulette(idx){
  if(rouletteLocked[idx])return;
  for(let i=0;i<idx;i++)if(!rouletteLocked[i])return;
  clearInterval(rouletteIntervals[idx]);
  const val=drawGachaValue(idx);
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.remove('active-slot');
  document.getElementById('rou-'+idx).classList.add('locked');
  // 最高レア演出（虹色・超おめでたい）
  if(isSuperRare(idx,val)){
    document.getElementById('rou-'+idx).classList.add('rare','super-rare');
    fireConfetti(idx);
  }
  // レア演出（プレミアム）
  else if(isRareGacha(idx,val)) document.getElementById('rou-'+idx).classList.add('rare');
  // 逆レア演出（ニッチ・珍しさ）
  else if(isInverseRare(idx,val)) document.getElementById('rou-'+idx).classList.add('niche');
  // 次のスロットをアクティブに
  if(idx+1<3) document.getElementById('rou-'+(idx+1)).classList.add('active-slot');
  if(++lockedCount===3){
    document.getElementById('btn-rou-next').classList.add('visible');
    for(let i=0;i<3;i++){
      const rb=document.getElementById('reroll-btn-'+i);
      if(rb){rb.classList.add('visible');updateRerollBtnSlot(i);}
      // 初回確定後POP表示：再抽選でレア確定を狙えるときだけ表示
      // レア値・逆レア値のときは表示しない（全3項目：築年数・駅徒歩・家賃）
      if(!rerollDone[i]){
        const pop=document.querySelector('#rou-'+i+' .reroll-pop');
        const v=rouletteValues[i];
        const showPop = v!==null && !isRareGacha(i,v) && !isInverseRare(i,v);
        if(pop && showPop){
          pop.classList.add('visible');
        } else if(pop){
          pop.classList.remove('visible');
        }
      }
    }
  }
}

function generateTitles(age,walk,rent,roomTypes){
  // 複数称号を返す（条件に合うものを全部）
  const has=t=>roomTypes.has(t);
  const earned=[];
  if(age<=5&&walk<=5&&rent<=8) earned.push({title:'掘り出し物件の達人',comment:'新しくて駅近で安い！夢の物件を作り上げました。'});
  if(age>=40) earned.push({title:'レトロ愛好家',comment:'年季の入った物件に味わいを感じる間取りすとです。'});
  if(walk<=3) earned.push({title:'駅前派',comment:'徒歩3分以内！毎日の通勤が楽になりそうです。'});
  if(walk>=30) earned.push({title:'静寂の探求者',comment:'駅から離れた場所での静かな暮らし。'});
  if(rent>=50) earned.push({title:'高級志向',comment:'上質な暮らしを追求した間取りです。'});
  if(rent<=6&&walk<=10) earned.push({title:'コスパ王',comment:'リーズナブルな家賃で駅近を確保。'});
  if(has('washitsu')&&has('youshitsu')) earned.push({title:'和洋折衷の使い手',comment:'和室と洋室を組み合わせたセンス溢れる間取り。'});
  if(has('balcony')) earned.push({title:'採光重視派',comment:'バルコニーで光と風を取り込む間取りです。'});
  if(has('genkan'))  earned.push({title:'玄関マニア',comment:'玄関を設けた、おもてなしの心あふれる間取り。'});
  if(!has('bath')&&!has('toilet')) earned.push({title:'謎の間取りすと',comment:'お風呂もトイレもない…独自の美学の間取りすとです。'});
  if(earned.length===0) earned.push({title:'間取りすと見習い',comment:'はじめての一歩！経験を積んで素敵な間取りを目指そう。'});
  return earned;
}
function generateTitle(age,walk,rent,roomTypes){
  return generateTitles(age,walk,rent,roomTypes)[0];
}
function countRoomLabel(roomTypes,counts){
  const rooms=(counts['youshitsu']||0)+(counts['washitsu']||0);
  const sup={2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
  const k=counts['kitchen']||0;
  const wc=counts['toilet']||0;
  const bath=counts['bath']||0;
  // WC・B は個数を常にプレフィックスで表示（0WC, 1WC, 2WC …）
  const wcStr=`+${wc}WC`;
  const bStr=`+${bath}B`;
  const extra=wcStr+bStr;
  if(k===0){
    return (rooms>0?rooms:'')+'R'+extra;
  }
  const kLabel=`K${k>=2?(sup[k]||String(k)):''}`;
  const ldkLabel=rooms===0?kLabel:`${rooms}LD${kLabel}`;
  return ldkLabel+extra;
}
function showResult(){

  };

const HISTORY_KEY='madori-history';
const HISTORY_MAX=30;
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); }
  catch(e){ return []; }
}
function saveHistory(list){
  try{ localStorage.setItem(HISTORY_KEY,JSON.stringify(list)); }catch(e){}
}
// 現在の完成物件を履歴へ自動保存。古い非お気に入りから削除して最大30件。
function autoSaveToHistory(){
  const r=window._lastResult||{};
  let img='';
  if(madoriSnapshot){
    try{
      const cv=document.createElement('canvas');
      const sc=Math.min(260/madoriSnapshot.width,220/madoriSnapshot.height);
      cv.width=Math.round(madoriSnapshot.width*sc);
      cv.height=Math.round(madoriSnapshot.height*sc);
      cv.getContext('2d').drawImage(madoriSnapshot,0,0,cv.width,cv.height);
      img=cv.toDataURL('image/png');
    }catch(e){}
  }
  const entry={
    id:'m'+Date.now(),
    propName:r.propName||'間取りすと：とくめい',
    label:r.label||'', age:r.age, walk:r.walk, rent:r.rent,
    titles:r.titles||[], equipped:r.equipped||'',
    date:r.date||new Date().toLocaleDateString('ja-JP'),
    img, fav:false,
  };
  window._currentHistoryId=entry.id;
  let list=loadHistory();
  list.unshift(entry); // 最新を先頭に
  // 非お気に入りの古いものから削るが、総数はお気に入り＋最新30件まで
  const favs=list.filter(e=>e.fav);
  const nonfavs=list.filter(e=>!e.fav);
  const keepNonfav=nonfavs.slice(0, Math.max(0, HISTORY_MAX-0)); // 非お気に入りは最大30件
  // 結合：お気に入りは全部残す＋非お気に入りは新しい順に30件
  // ただし重複を避けるためidで再構成（元の順序＝新しい順を維持）
  const keepIds=new Set([...favs.map(e=>e.id), ...keepNonfav.map(e=>e.id)]);
  list=list.filter(e=>keepIds.has(e.id));
  saveHistory(list);
}
function refreshFavButton(){
  const btn=document.getElementById('res-fav-btn');
  if(!btn)return;
  const list=loadHistory();
  const cur=list.find(e=>e.id===window._currentHistoryId);
  const isFav=cur&&cur.fav;
  btn.classList.toggle('active',!!isFav);
  btn.textContent=isFav?'★ お気に入り':'☆ お気に入り';
}
function toggleResultFav(){
  const list=loadHistory();
  const cur=list.find(e=>e.id===window._currentHistoryId);
  if(!cur)return;
  cur.fav=!cur.fav;
  saveHistory(list);
  refreshFavButton();
  showGameToast(cur.fav?'お気に入りに登録しました★':'お気に入りを解除しました');
}

// 保存＆シェア：完成画面のカード部分を画像化
// ════════════════════════════════════════
async function saveAndShare(){
  if(document.fonts&&document.fonts.ready){ try{await document.fonts.ready;}catch(e){} }
  const cv=await buildPropertyCard();
  window._cardCanvas=cv;
  const r=window._lastResult||{};
  const tags=(r.titles||[]).map(titleToHashtag);
  // シェア文面：固定文＋間取り＋固定タグ＋称号タグ
  const titleTags=tags.join(' ');
  const text='間取りすとで自分だけの間取り物件を作ったよ！ '+(r.label||'')+'  #間取りすと #madori_st #間取りゲーム'+(titleTags?' '+titleTags:'');
  const nm=(window._playerName||'madori').replace(/[\s　\/\\]/g,'_');
  const isMobile=('ontouchstart' in window) && Math.min(window.innerWidth,window.innerHeight)<820;

  // ダウンロード処理
  const doDownload=()=>{
    cv.toBlob((blob)=>{
      if(!blob){ showGameToast('画像の作成に失敗しました'); return; }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download='物件_'+nm+'.png'; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
    },'image/png');
  };

  if(!isMobile){
    // PC：シェア文面をコピー（通知1つだけ）。画像は別途ダウンロードもしておく
    doDownload();
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{ await navigator.clipboard.writeText(text); }catch(e){}
    }
    showGameToast('シェア文面をコピーしました📋');
    return;
  }
  // モバイル：共有シート（画像＋文面）。失敗時はダウンロード＋文面コピー
  cv.toBlob(async(blob)=>{
    if(!blob){ doDownload(); return; }
    const file=new File([blob],'madori.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      try{ await navigator.share({files:[file], text}); return; }
      catch(e){ if(e&&e.name==='AbortError')return; }
    }
    // 共有不可：ダウンロード＋文面コピー
    doDownload();
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{ await navigator.clipboard.writeText(text); }catch(e){}
    }
    showGameToast('画像を保存＆文面をコピーしました📋');
  },'image/png');
}

// ════════════════════════════════════════
// 物件広告カード（縦長チラシ風）— 画像書き出し＆SNS共有
// ════════════════════════════════════════
// 称号→ハッシュタグ変換（スペースや記号を除去）
function titleToHashtag(t){
  return '#'+String(t).replace(/[\s　・！!？?]/g,'');
}
// カードを1枚のcanvasに描画して返す（Promise<canvas>）
function buildPropertyCard(){
  return new Promise((resolve)=>{
    const r=window._lastResult||{};
    const equipped=localStorage.getItem('madori-selected-title')||'';
    const rawName=(window._playerName||localStorage.getItem('madori-player-name')||'').trim();
    const propName='間取りすと：'+(rawName||'とくめい');
    const earned=(window._earnedTitles||[]).map(t=>t.title);
    const tags=earned.map(titleToHashtag);

    const dpr=Math.min(window.devicePixelRatio||1,2);
    const W=720;
    const PADX=40; // 左右の内側余白
    // 間取り画像サイズ（小さめ・確実に収まる）
    let madoriW=0, madoriH=0;
    if(madoriSnapshot){
      const maxMW=W-PADX*2-40, maxMH=420;
      const sc=Math.min(maxMW/madoriSnapshot.width, maxMH/madoriSnapshot.height);
      madoriW=Math.round(madoriSnapshot.width*sc);
      madoriH=Math.round(madoriSnapshot.height*sc);
    }

    // ── 高さを順に積み上げて算出（崩れ防止） ──
    // 一時contextでタグ行数を測る
    const tmp=document.createElement('canvas').getContext('2d');
    tmp.font="500 22px 'Noto Sans JP',sans-serif";
    const tagMaxW=W-PADX*2;
    let tagLines=[];
    if(tags.length){
      let line='';
      tags.forEach(tag=>{
        const test=line?line+'　'+tag:tag;
        if(tmp.measureText(test).width>tagMaxW && line){ tagLines.push(line); line=tag; }
        else line=test;
      });
      if(line)tagLines.push(line);
    }

    const BAND_H=72;
    let y=BAND_H+34;            // 帯の下から開始
    const yBand=y;
    if(equipped) y+=54;        // 装備称号
    const yEquip=yBand;
    const yName=y; y+=52;      // 物件名
    const yTags=y; if(tagLines.length) y+=tagLines.length*34+10; // ハッシュタグ
    const yLabel=y; y+=58;     // 間取りラベル
    const yMadori=y; if(madoriH>0) y+=madoriH+24+30; // 間取り画像（白枠込み）
    const SPEC_H=120;
    const ySpec=y; y+=SPEC_H+34; // スペック3列
    const yFooter=y+10; y+=46;   // フッター
    const H=y+20;

    const cv=document.createElement('canvas');
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    const ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);
    ctx.textAlign='center'; ctx.textBaseline='middle';

    // 背景＋外枠
    ctx.fillStyle='#f5f0e8'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#8a7060'; ctx.lineWidth=6;
    ctx.strokeRect(12,12,W-24,H-24);
    // 帯
    ctx.fillStyle='#5a4a3a'; ctx.fillRect(12,12,W-24,BAND_H);
    ctx.fillStyle='#f5f0e8';
    ctx.font="bold 30px 'Noto Serif JP',serif";
    ctx.fillText('賃 貸 物 件 情 報', W/2, 12+BAND_H/2);

    // 装備称号
    if(equipped){
      ctx.font="bold 22px 'Noto Serif JP',serif";
      const tw=ctx.measureText(equipped).width;
      const bw=tw+44, bx=(W-bw)/2;
      ctx.fillStyle='#c8a060';
      _roundRect(ctx,bx,yEquip,bw,40,20); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.fillText(equipped, W/2, yEquip+20);
    }
    // 物件名
    ctx.fillStyle='#3a2a1a';
    ctx.font="bold 36px 'Noto Serif JP',serif";
    ctx.fillText(propName, W/2, yName+18);
    // ハッシュタグ（物件名の下＝説明タグ風）
    if(tagLines.length){
      ctx.fillStyle='#6a8a50';
      ctx.font="500 22px 'Noto Sans JP',sans-serif";
      tagLines.forEach((ln,i)=>{ ctx.fillText(ln, W/2, yTags+16+i*34); });
    }
    // 間取りラベル
    ctx.fillStyle='#8a7060';
    ctx.font="bold 30px 'Noto Serif JP',serif";
    ctx.fillText(r.label||'', W/2, yLabel+22);

    // 間取り画像
    if(madoriSnapshot && madoriW>0){
      const mx=(W-madoriW)/2, my=yMadori;
      ctx.fillStyle='#fff';
      _roundRect(ctx,mx-10,my-10,madoriW+20,madoriH+20,12); ctx.fill();
      ctx.strokeStyle='rgba(90,74,58,.15)'; ctx.lineWidth=1;
      _roundRect(ctx,mx-10,my-10,madoriW+20,madoriH+20,12); ctx.stroke();
      ctx.drawImage(madoriSnapshot, mx, my, madoriW, madoriH);
    }

    // スペック3列（数字と単位を横に並べて重なり防止）
    const specs=[
      {label:'築年数', val:String(r.age??'--'), unit:'年'},
      {label:'駅徒歩', val:String(r.walk??'--'), unit:'分'},
      {label:'家賃',   val:String(r.rent??'--'), unit:'万円'},
    ];
    const gap=16, cardW=(W-PADX*2-gap*2)/3, sx0=PADX;
    specs.forEach((s,i)=>{
      const cx=sx0+i*(cardW+gap);
      ctx.fillStyle='#fff';
      _roundRect(ctx,cx,ySpec,cardW,SPEC_H,12); ctx.fill();
      ctx.strokeStyle='rgba(90,74,58,.1)'; ctx.lineWidth=1;
      _roundRect(ctx,cx,ySpec,cardW,SPEC_H,12); ctx.stroke();
      // ラベル
      ctx.fillStyle='#8a7060';
      ctx.font="500 17px 'Noto Sans JP',sans-serif";
      ctx.fillText(s.label, cx+cardW/2, ySpec+28);
      // 数字＋単位（横並び・中央寄せ）
      ctx.fillStyle='#3a2a1a';
      const numFont="bold 42px 'Noto Serif JP',serif";
      const unitFont="500 16px 'Noto Sans JP',sans-serif";
      ctx.font=numFont; const nw=ctx.measureText(s.val).width;
      ctx.font=unitFont; const uw=ctx.measureText(s.unit).width;
      const totalW=nw+4+uw;
      const startX=cx+cardW/2-totalW/2;
      ctx.textAlign='left';
      ctx.fillStyle='#3a2a1a'; ctx.font=numFont;
      ctx.fillText(s.val, startX, ySpec+78);
      ctx.fillStyle='#8a7060'; ctx.font=unitFont;
      ctx.fillText(s.unit, startX+nw+4, ySpec+88);
      ctx.textAlign='center';
    });

    // フッター
    ctx.fillStyle='#b0a090';
    ctx.font="400 15px 'Noto Sans JP',sans-serif";
    ctx.fillText('MADORI-ST　間取りすと', W/2, yFooter);

    resolve(cv);
  });
}
function _roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function svgToCanvas(dataUrl){
  const dpr=window.devicePixelRatio||1;
  return new Promise(resolve=>{
    // PNG/JPEGはBlobを経由せず直接img.srcにdataURLを渡す
    const mimeMatch=dataUrl.match(/^data:([^;]+);/);
    const mime=mimeMatch?mimeMatch[1]:'image/svg+xml';
    const loadImg=(src)=>{
      const img=new Image();
      img.onload=()=>{
        const cv=document.createElement('canvas');
        const w=img.naturalWidth||80, h=img.naturalHeight||80;
        // DPR倍のサイズでcanvasを作成→Retina対応
        cv.width=w*dpr; cv.height=h*dpr;
        const ctx=cv.getContext('2d');
        ctx.scale(dpr,dpr);
        ctx.drawImage(img,0,0,w,h);
        if(src!==dataUrl)URL.revokeObjectURL(src);
        resolve(cv);
      };
      img.onerror=()=>{if(src!==dataUrl)URL.revokeObjectURL(src);resolve(null);};
      img.src=src;
    };
    if(mime==='image/svg+xml'){
      // SVGはBlobURLに変換（文字化け防止）
      const b64=dataUrl.split(',')[1];
      const bin=atob(b64), bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      const blob=new Blob([bytes],{type:'image/svg+xml'});
      loadImg(URL.createObjectURL(blob));
    } else {
      // PNG/JPEGはdataURLを直接使う
      // ただしJPEG（透過なし）の場合は四隅の色をフラッドフィルで透過処理
      const isJpeg = mime==='image/jpeg';
      if(isJpeg){
        // いったん画像を読み込み、背景を透過に変換してから返す
        const img2=new Image();
        img2.onload=()=>{
          const w=img2.naturalWidth||80, h=img2.naturalHeight||80;
          // 一時canvasで描画してピクセル操作
          const tmp=document.createElement('canvas');
          tmp.width=w; tmp.height=h;
          const ctx2=tmp.getContext('2d');
          ctx2.drawImage(img2,0,0,w,h);
          const id=ctx2.getImageData(0,0,w,h);
          const d=id.data;
          // 四隅の色を取得して背景色推定
          const getC=(x,y)=>[d[(y*w+x)*4],d[(y*w+x)*4+1],d[(y*w+x)*4+2]];
          const corners=[getC(0,0),getC(w-1,0),getC(0,h-1),getC(w-1,h-1)];
          const bg=corners.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],[0,0,0]).map(v=>v/4);
          // フラッドフィルで外周から連続する背景色を透過に
          const visited=new Uint8Array(w*h);
          const queue=[];
          const isBlackBg=bg[0]<30&&bg[1]<30&&bg[2]<30;
          const isNearBg=(r,g,b)=>{
            if(isBlackBg) return r<40&&g<40&&b<40;
            const dr=r-bg[0],dg=g-bg[1],db=b-bg[2];
            return Math.sqrt(dr*dr+dg*dg+db*db)<30;
          };
          // 外周をキューに追加
          for(let x=0;x<w;x++){queue.push(x,0);queue.push(x,h-1);}
          for(let y=1;y<h-1;y++){queue.push(0,y);queue.push(w-1,y);}
          let qi=0;
          while(qi<queue.length){
            const x=queue[qi++],y=queue[qi++];
            if(x<0||x>=w||y<0||y>=h||visited[y*w+x])continue;
            const i=(y*w+x)*4;
            if(!isNearBg(d[i],d[i+1],d[i+2]))continue;
            visited[y*w+x]=1;
            d[i+3]=0; // 透過
            queue.push(x+1,y,x-1,y,x,y+1,x,y-1);
          }
          ctx2.putImageData(id,0,0);
          // DPR対応canvasに転写
          const cv=document.createElement('canvas');
          cv.width=w*dpr; cv.height=h*dpr;
          const ctx=cv.getContext('2d');
          ctx.scale(dpr,dpr);
          ctx.drawImage(tmp,0,0,w,h);
          resolve(cv);
        };
        img2.onerror=()=>resolve(null);
        img2.src=dataUrl;
      } else {
        loadImg(dataUrl);
      }
    }
  });
}

// null = 配置不可マス、0 = 通常マス
// COLS=8, ROWS=10 のグリッド内で形を定義（外側はnull扱い）
// ヘルパー：行文字列（'.'=配置不可, '#'=配置可）からマップを生成
function makeLand(rows){
  // rowsはROWS要素の文字列配列、各COLS文字（'#'=置ける, '.'=置けない）
  const map=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  for(let r=0;r<ROWS;r++){
    const line=rows[r]||'';
    for(let c=0;c<COLS;c++){
      map[r][c]=(line[c]==='#')?0:null;
    }
  }
  return map;
}

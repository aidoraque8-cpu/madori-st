function svgToCanvas(dataUrl){
  return new Promise(resolve=>{
    const b64=dataUrl.split(',')[1];
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth||80;cv.height=img.naturalHeight||80;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url);resolve(cv);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

// ─────────────────────────────────────
// 定数
// ─────────────────────────────────────
const CS=40, COLS=9, ROWS=10;
const UI_L=160, UI_R=160; // 左右UIパネル幅
const GX=UI_L, GY=0;
const CANVAS_W=UI_L+COLS*CS+UI_R, CANVAS_H=ROWS*CS+50;
const GENKAN_COLOR=0xD4A870;

// ─────────────────────────────────────
// Phaser シーン
// ─────────────────────────────────────
class PuzzleGame extends Phaser.Scene{
  constructor(){super('PuzzleGame');}

  sx(c){return GX+c*CS;}
  sy(r){return GY+r*CS;}

  create(){
    this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    this.boardImgs={};
    this.boardLabels=[];
    this.partCount=0;
    this.undoStack=[];   // アンドゥ用スタック

    // 現在手パーツ
    this.currentDef=null;
    this.rotation=0;
    this.hoverC=-1;this.hoverR=-1;

    // ホールド
    this.holdDef=null;
    this.holdUsed=false;

    // 次のパーツキュー（3個先まで表示）
    this.queue=[];
    for(let i=0;i<4;i++)this.queue.push(this.pickRandom());

    this.bgGfx=this.add.graphics().setDepth(0);
    this.gridGfx=this.add.graphics().setDepth(1);
    this.previewGfx=this.add.graphics().setDepth(4);
    this.previewImg=null;

    this.drawBg();
    this.placeGenkan();

    const entries=Object.entries(SVG_TEX);
    Promise.all(entries.map(([k,v])=>svgToCanvas(v).then(cv=>{
      if(cv&&!this.textures.exists(k))this.textures.addCanvas(k,cv);
    }))).then(()=>{
      this.drawBoard();
      this.nextPiece();
      this.drawUI();
    });

    // キー入力
    this.upKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
    this.zKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
    this.hKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.H);
    this.uKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.U);
    this.upKey.on('down',()=>this.rotatePiece());
    this.zKey.on('down',()=>this.rotatePiece());
    this.hKey.on('down',()=>this.doHold());
    this.uKey.on('down',()=>this.doUndo());

    // マウス操作
    this.input.on('pointermove',p=>this.onPointerMove(p));
    this.input.on('pointerdown',p=>this.onPointerDown(p));

    // 完成ボタン
    this.finishBtn=this.add.text(
      UI_L+COLS*CS+UI_R/2, CANVAS_H-30,
      '完 成',
      {fontSize:'14px',fill:'#fff',backgroundColor:'#8a6840',padding:{x:14,y:6},fontFamily:'Meiryo'}
    ).setOrigin(0.5,0.5).setDepth(10).setInteractive({useHandCursor:true});
    this.finishBtn.on('pointerdown',()=>this.showResult());
  }

  pickRandom(){
    return PARTS_DEF[Math.floor(Math.random()*PARTS_DEF.length)];
  }

  getShape(def,rot){
    let s=[];
    for(let r=0;r<def.h;r++){s.push([]);for(let c=0;c<def.w;c++)s[r].push(1);}
    for(let i=0;i<(rot%4);i++){
      const nr=[],rows=s.length,cols=s[0].length;
      for(let c=0;c<cols;c++){nr.push([]);for(let r=rows-1;r>=0;r--)nr[c].push(s[r][c]);}
      s=nr;
    }
    return s;
  }

  nextPiece(){
    this.currentDef=this.queue.shift();
    this.queue.push(this.pickRandom());
    this.rotation=0;
    this.holdUsed=false;
    this.drawUI();
  }

  rotatePiece(){
    if(!this.currentDef)return;
    this.rotation=(this.rotation+1)%4;
    this.updatePreview(this.hoverC,this.hoverR);
    this.drawUI();
  }

  doHold(){
    if(!this.currentDef||this.holdUsed)return;
    if(this.holdDef){
      const tmp=this.holdDef;
      this.holdDef=this.currentDef;
      this.currentDef=tmp;
    }else{
      this.holdDef=this.currentDef;
      this.currentDef=this.queue.shift();
      this.queue.push(this.pickRandom());
    }
    this.rotation=0;
    this.holdUsed=true;
    this.updatePreview(this.hoverC,this.hoverR);
    this.drawUI();
  }

  doUndo(){
    if(this.undoStack.length===0)return;
    const state=this.undoStack.pop();
    // グリッドを復元
    this.grid=state.grid;
    this.currentDef=state.currentDef;
    this.rotation=state.rotation;
    this.queue=state.queue.slice();
    this.holdDef=state.holdDef;
    this.holdUsed=state.holdUsed;
    this.partCount=state.partCount;
    // 画像・ラベルを全破棄してリドロー
    Object.values(this.boardImgs).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardImgs={};
    this.boardLabels.forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardLabels=[];
    this.drawBoard();
    this.drawUI();
  }

  canPlace(shape,c,r){
    for(let dr=0;dr<shape.length;dr++){
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return false;
        if(this.grid[nr][nc])return false;
      }
    }
    return true;
  }

  placePiece(def,shape,c,r){
    // アンドゥ用にスナップショット保存
    this.undoStack.push({
      grid:this.grid.map(row=>row.map(cell=>cell?{...cell}:null)),
      currentDef:def,rotation:this.rotation,
      queue:this.queue.slice(),holdDef:this.holdDef,
      holdUsed:this.holdUsed,partCount:this.partCount
    });
    if(this.undoStack.length>30)this.undoStack.shift();

    const pid='p'+(++this.partCount);
    const color=def.color;
    // グリッドに書き込み
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++)
        if(shape[dr][dc])
          this.grid[r+dr][c+dc]={color,pid,type:def.type,rotation:this.rotation,
            mnR:r,mxR:r+shape.length-1,mnC:c,mxC:c+shape[0].length-1,label:def.label};

    // 画像配置
    const px=this.sx(c),py=this.sy(r);
    const pw=shape[0].length*CS,ph=shape.length*CS;
    if(def.type==='washitsu'){
      const g=this.add.graphics().setDepth(2);
      this.drawWashitsuOnGraphics(g,px,py,pw,ph);
      this.boardImgs[pid]=g;
    }else if(this.textures.exists(def.type)){
      const rot=this.rotation%4;
      const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
      const img=this.add.image(px+pw/2,py+ph/2,def.type)
        .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setDepth(2);
      this.boardImgs[pid]=img;
    }else{
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(color,1);g.fillRect(px+1,py+1,pw-2,ph-2);
      this.boardImgs[pid]=g;
    }
    // ラベル
    const lbl=this.add.text(px+pw/2,py+ph/2,def.label,
      {fontSize:'11px',fill:'#3a3028',align:'center',fontFamily:'Meiryo',
       stroke:'#ffffffaa',strokeThickness:2})
      .setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels.push(lbl);

    this.drawBoard();
    this.nextPiece();
  }

  // ─── 描画 ───────────────────────────

  drawBg(){
    const g=this.bgGfx;g.clear();
    // グリッド背景
    g.fillStyle(0xf8f4ee,1);
    g.fillRect(this.sx(0),this.sy(0),COLS*CS,ROWS*CS);
    // グリッド線
    g.lineStyle(1,0xd8cfc4,1);
    for(let r=0;r<=ROWS;r++)g.lineBetween(this.sx(0),this.sy(r),this.sx(COLS),this.sy(r));
    for(let c=0;c<=COLS;c++)g.lineBetween(this.sx(c),this.sy(0),this.sx(c),this.sy(ROWS));
    // 外枠
    g.lineStyle(3,0x8a7060,1);
    g.strokeRect(this.sx(0),this.sy(0),COLS*CS,ROWS*CS);
    // 左右UIパネル背景
    g.fillStyle(0xeae4dc,1);
    g.fillRect(0,0,UI_L,CANVAS_H);
    g.fillRect(UI_L+COLS*CS,0,UI_R,CANVAS_H);
  }

  drawBoard(){
    const g=this.gridGfx;g.clear();
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=this.grid[r][c];
        if(!cell)continue;
        if(drawn.has(cell.pid))continue;
        drawn.add(cell.pid);
        const px=this.sx(cell.mnC),py=this.sy(cell.mnR);
        const pw=(cell.mxC-cell.mnC+1)*CS,ph=(cell.mxR-cell.mnR+1)*CS;
        if(!this.boardImgs.hasOwnProperty(cell.pid)){
          g.fillStyle(cell.color,1);g.fillRect(px+1,py+1,pw-2,ph-2);
        }
        g.lineStyle(2,0x705840,1);g.strokeRect(px+1,py+1,pw-2,ph-2);
      }
    }
  }

  placeGenkan(){
    const gx=Phaser.Math.Between(1,COLS-3);
    const pid='genkan';
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)
      this.grid[ROWS-2+dr][gx+dc]={color:GENKAN_COLOR,fixed:true,pid,
        mnR:ROWS-2,mxR:ROWS-1,mnC:gx,mxC:gx+1,label:'玄関',rotation:0};
    if(this.textures.exists('genkan')){
      const px=this.sx(gx),py=this.sy(ROWS-2);
      this.boardImgs[pid]=this.add.image(px+CS,py+CS,'genkan')
        .setDisplaySize(CS*2-2,CS*2-2).setDepth(2);
    }
    const lbl=this.add.text(this.sx(gx)+CS,this.sy(ROWS-2)+CS,'玄関',
      {fontSize:'12px',fill:'#5a3010',fontFamily:'Meiryo',stroke:'#ffffffaa',strokeThickness:2})
      .setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels.push(lbl);
  }

  drawUI(){
    // 既存UIオブジェクト削除
    if(this._uiObjs){this._uiObjs.forEach(o=>o&&o.destroy());}
    this._uiObjs=[];
    const add=(o)=>{this._uiObjs.push(o);return o;};
    const LCX=UI_L/2;

    // ─── 左パネル ───────────────────────
    // 現在パーツ
    add(this.add.text(LCX,10,'現在のパーツ',
      {fontSize:'11px',fill:'#7a6858',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));

    if(this.currentDef){
      const shape=this.getShape(this.currentDef,this.rotation);
      const sh=shape.length,sw=shape[0].length;
      const cellSz=Math.min(Math.floor((UI_L-20)/sw),Math.floor(60/sh));
      const ox=LCX-(sw*cellSz/2), oy=28;
      const g=this.add.graphics().setDepth(10);
      add(g);
      if(this.currentDef.type==='washitsu'){
        this.drawWashitsuOnGraphics(g,ox,oy,sw*cellSz,sh*cellSz);
      }else if(this.textures.exists(this.currentDef.type)){
        const rot=this.rotation%4;
        const dw=rot%2===0?sw*cellSz:sh*cellSz;
        const dh=rot%2===0?sh*cellSz:sw*cellSz;
        const img=this.add.image(ox+sw*cellSz/2,oy+sh*cellSz/2,this.currentDef.type)
          .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setDepth(10);
        add(img);
      }else{
        g.fillStyle(this.currentDef.color,1);
        g.fillRect(ox,oy,sw*cellSz,sh*cellSz);
      }
      g.lineStyle(2,0x706050,1);g.strokeRect(ox,oy,sw*cellSz,sh*cellSz);
      add(this.add.text(LCX,oy+sh*cellSz+4,this.currentDef.name,
        {fontSize:'10px',fill:'#5a4e42',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    }

    // ホールド
    const holdY=120;
    add(this.add.text(LCX,holdY,'ホールド [H]',
      {fontSize:'11px',fill:'#7a6858',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    if(this.holdDef){
      const shape=this.getShape(this.holdDef,0);
      const sh=shape.length,sw=shape[0].length;
      const cellSz=Math.min(Math.floor((UI_L-20)/sw),Math.floor(50/sh));
      const ox=LCX-(sw*cellSz/2), oy=holdY+16;
      const g=this.add.graphics().setDepth(10);
      add(g);
      if(this.holdDef.type==='washitsu'){
        this.drawWashitsuOnGraphics(g,ox,oy,sw*cellSz,sh*cellSz);
      }else if(this.textures.exists(this.holdDef.type)){
        const img=this.add.image(ox+sw*cellSz/2,oy+sh*cellSz/2,this.holdDef.type)
          .setDisplaySize(sw*cellSz-2,sh*cellSz-2).setDepth(10);
        add(img);
        if(this.holdUsed)img.setAlpha(0.4);
      }else{
        g.fillStyle(this.holdDef.color,this.holdUsed?0.4:1);
        g.fillRect(ox,oy,sw*cellSz,sh*cellSz);
      }
      g.lineStyle(2,this.holdUsed?0xb0a090:0x706050,this.holdUsed?0.5:1);
      g.strokeRect(ox,oy,sw*cellSz,sh*cellSz);
    }else{
      const g=this.add.graphics().setDepth(10);add(g);
      g.lineStyle(1,0xb0a090,0.5);
      g.strokeRect(LCX-30,holdY+16,60,50);
      add(this.add.text(LCX,holdY+42,'なし',
        {fontSize:'10px',fill:'#b0a090',fontFamily:'Meiryo'}).setOrigin(0.5,0.5).setDepth(10));
    }

    // パーツ数
    add(this.add.text(LCX,220,'パーツ数',
      {fontSize:'11px',fill:'#7a6858',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    add(this.add.text(LCX,236,String(this.partCount),
      {fontSize:'22px',fill:'#5a4e42',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));

    // アンドゥ表示
    add(this.add.text(LCX,275,'アンドゥ [U]',
      {fontSize:'10px',fill:this.undoStack.length>0?'#8a6840':'#b0a090',fontFamily:'Meiryo'})
      .setOrigin(0.5,0).setDepth(10));

    // ─── 右パネル（次のパーツキュー）───
    const RX=UI_L+COLS*CS, RCX=RX+UI_R/2;
    add(this.add.text(RCX,10,'次のパーツ',
      {fontSize:'11px',fill:'#7a6858',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));

    let qy=28;
    for(let i=0;i<Math.min(3,this.queue.length);i++){
      const def=this.queue[i];
      const shape=this.getShape(def,0);
      const sh=shape.length,sw=shape[0].length;
      const cellSz=Math.min(Math.floor((UI_R-20)/sw),Math.floor(60/sh));
      const ox=RCX-(sw*cellSz/2), oy=qy;
      const g=this.add.graphics().setDepth(10);add(g);
      const alpha=1-i*0.15;
      if(def.type==='washitsu'){
        this.drawWashitsuOnGraphics(g,ox,oy,sw*cellSz,sh*cellSz);
        g.setAlpha(alpha);
      }else if(this.textures.exists(def.type)){
        const img=this.add.image(ox+sw*cellSz/2,oy+sh*cellSz/2,def.type)
          .setDisplaySize(sw*cellSz-2,sh*cellSz-2).setAlpha(alpha).setDepth(10);
        add(img);
      }else{
        g.fillStyle(def.color,alpha);g.fillRect(ox,oy,sw*cellSz,sh*cellSz);
      }
      g.lineStyle(1,0x908070,alpha);g.strokeRect(ox,oy,sw*cellSz,sh*cellSz);
      add(this.add.text(RCX,oy+sh*cellSz+2,def.name,
        {fontSize:'9px',fill:'#7a6858',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
      qy+=sh*cellSz+18;
    }
  }

  onPointerMove(p){
    if(!this.currentDef)return;
    const c=Math.floor((p.x-this.sx(0))/CS);
    const r=Math.floor((p.y-this.sy(0))/CS);
    if(c===this.hoverC&&r===this.hoverR)return;
    this.hoverC=c;this.hoverR=r;
    this.updatePreview(c,r);
  }

  updatePreview(c,r){
    // 古いpreviewImg破棄
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    const ok=this.canPlace(shape,c,r);
    const g=this.previewGfx;
    for(let dr=0;dr<shape.length;dr++){
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
        const px=this.sx(nc),py=this.sy(nr);
        g.fillStyle(ok?0x88cc88:0xcc4444,0.35);
        g.fillRect(px+1,py+1,CS-2,CS-2);
      }
    }
    if(ok){
      const pw=shape[0].length*CS,ph=shape.length*CS;
      const px=this.sx(c),py=this.sy(r);
      if(this.currentDef.type==='washitsu'){
        const g2=this.add.graphics().setDepth(4).setAlpha(0.7);
        this.drawWashitsuOnGraphics(g2,px,py,pw,ph);
        this.previewImg=g2;
      }else if(this.textures.exists(this.currentDef.type)){
        const rot=this.rotation%4;
        const dw=rot%2===0?pw:ph,dh=rot%2===0?ph:pw;
        this.previewImg=this.add.image(px+pw/2,py+ph/2,this.currentDef.type)
          .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setAlpha(0.6).setDepth(4);
      }
    }
  }

  onPointerDown(p){
    if(!this.currentDef)return;
    const c=Math.floor((p.x-this.sx(0))/CS);
    const r=Math.floor((p.y-this.sy(0))/CS);
    const shape=this.getShape(this.currentDef,this.rotation);
    if(!this.canPlace(shape,c,r))return;
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.placePiece(this.currentDef,shape,c,r);
  }

  // ─── 和室Graphics描画 ────────────────
  drawWashitsuOnGraphics(g,px,py,pw,ph){
    g.fillStyle(0xeaf2da,1);g.fillRect(px,py,pw,ph);
    const cw2=pw/2,cw3=pw/3,ch=ph/4;
    this.drawTatami(g,px,      py,       cw2,  ch,   true);
    this.drawTatami(g,px+cw2,  py,       cw2,  ch,   true);
    this.drawTatami(g,px,      py+ch,    cw3,  ch*2, false);
    this.drawTatami(g,px+cw3,  py+ch,    cw3,  ch,   true);
    this.drawTatami(g,px+cw3,  py+ch*2,  cw3,  ch,   true);
    this.drawTatami(g,px+cw3*2,py+ch,    cw3,  ch*2, false);
    this.drawTatami(g,px,      py+ch*3,  cw2,  ch,   true);
    this.drawTatami(g,px+cw2,  py+ch*3,  cw2,  ch,   true);
    g.lineStyle(3,0x5a8040,1);g.strokeRect(px+1,py+1,pw-2,ph-2);
  }

  drawTatami(g,x,y,w,h,horizontal){
    if(w<=2||h<=2)return;
    const p=2;
    g.fillStyle(0xe0eeca,1);g.fillRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(1,0x7a9a55,1);g.strokeRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(0.5,0x8aab6a,0.55);
    if(horizontal){for(let ly=y+p+4;ly<y+h-p;ly+=4)g.lineBetween(x+p+2,ly,x+w-p-2,ly);}
    else{for(let lx=x+p+4;lx<x+w-p;lx+=4)g.lineBetween(lx,y+p+2,lx,y+h-p-2);}
  }

  // ─── 完成時評価 ──────────────────────
  showResult(){
    // 配置されているパーツ種別を集計
    const types=new Set();
    const counts={};
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=this.grid[r][c];
      if(cell&&!cell.fixed){types.add(cell.type);counts[cell.type]=(counts[cell.type]||0)+1;}
    }
    const filled=Object.values(counts).reduce((a,b)=>a+b,0);
    const total=COLS*ROWS-4; // 玄関4マス分除く

    // 評価ロジック
    let score=0;
    let comments=[];

    const has=(t)=>types.has(t);
    if(has('bath'))score+=15;
    if(has('toilet'))score+=15;
    if(has('kitchen'))score+=15;
    if(has('youshitsu')||has('washitsu'))score+=10;
    if(has('balcony'))score+=5;
    if(has('storage')||has('wic'))score+=5;
    if(has('roka'))score+=5;
    const fillRate=filled/total;
    score+=Math.round(fillRate*30);

    // コメント生成
    if(!has('bath')&&!has('toilet'))comments.push('⚠ お風呂とトイレがありません');
    else if(!has('bath'))comments.push('⚠ お風呂がありません');
    else if(!has('toilet'))comments.push('⚠ トイレがありません');
    if(!has('kitchen'))comments.push('⚠ キッチンがありません');
    if(has('youshitsu')&&has('washitsu'))comments.push('✓ 洋室と和室を両方配置！');
    if(has('balcony'))comments.push('✓ バルコニーあり、採光◎');
    if(has('wic'))comments.push('✓ WICで収納たっぷり');
    if(fillRate>0.8)comments.push('✓ 土地をうまく活用できました！');
    else if(fillRate<0.4)comments.push('△ まだまだスペースに余裕あり');

    // スコアに応じた総評
    let overall='';
    if(score>=80)overall='🏠 完璧な間取り！住みやすさ満点です。';
    else if(score>=60)overall='🏡 快適に暮らせそうな間取りです。';
    else if(score>=40)overall='🏚 もう少し整えると暮らしやすくなりそう。';
    else overall='🔨 まだ発展途上！部屋を増やしてみましょう。';

    // オーバーレイ表示
    const ox=UI_L,oy=ROWS*CS/2-120;
    const bg=this.add.graphics().setDepth(20);
    bg.fillStyle(0x2a2018,0.88);
    bg.fillRoundedRect(ox+20,oy,COLS*CS-40,240,12);

    const cx=ox+COLS*CS/2;
    const texts=[];
    texts.push(this.add.text(cx,oy+20,'── 間取り評価 ──',
      {fontSize:'16px',fill:'#f0e0c0',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(21));
    texts.push(this.add.text(cx,oy+48,`スコア: ${score} / 100`,
      {fontSize:'22px',fill:'#ffe08a',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(21));
    texts.push(this.add.text(cx,oy+80,overall,
      {fontSize:'13px',fill:'#f0e0c0',fontFamily:'Meiryo',wordWrap:{width:COLS*CS-80}})
      .setOrigin(0.5,0).setDepth(21));

    let ty=oy+106;
    for(const c of comments){
      texts.push(this.add.text(cx,ty,c,
        {fontSize:'11px',fill:'#d8c8a8',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(21));
      ty+=18;
    }

    // もう一度・続けるボタン
    const retryBtn=this.add.text(cx-50,oy+200,'もう一度',
      {fontSize:'13px',fill:'#fff',backgroundColor:'#7a5030',
       padding:{x:10,y:5},fontFamily:'Meiryo'})
      .setOrigin(0.5,0.5).setDepth(21).setInteractive({useHandCursor:true});
    const contBtn=this.add.text(cx+50,oy+200,'続ける',
      {fontSize:'13px',fill:'#fff',backgroundColor:'#507a30',
       padding:{x:10,y:5},fontFamily:'Meiryo'})
      .setOrigin(0.5,0.5).setDepth(21).setInteractive({useHandCursor:true});

    const closeAll=()=>{
      bg.destroy();texts.forEach(t=>t.destroy());
      retryBtn.destroy();contBtn.destroy();
    };
    retryBtn.on('pointerdown',()=>{closeAll();this.scene.restart();});
    contBtn.on('pointerdown',()=>closeAll());
  }
}

// ─────────────────────────────────────
// Phaser起動
// ─────────────────────────────────────
new Phaser.Game({
  type:Phaser.AUTO,
  width:CANVAS_W,
  height:CANVAS_H,
  backgroundColor:'#f0ece6',
  parent:'game-container',
  scene:PuzzleGame,
});
</script>

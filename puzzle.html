<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>間取りすと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#f5f0e8;
  --warm:#e8ddd0;
  --brown:#5a4a3a;
  --brown-light:#8a7060;
  --brown-dark:#3a2a1a;
  --accent:#c8a060;
  --accent-light:#e8c880;
  --green:#6a8a50;
  --blue:#5080a8;
}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── 共通 ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}

/* ── ① スタート ── */
#screen-start{background:var(--cream);position:relative;overflow:hidden;}
#screen-start::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(200,160,96,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 20%,rgba(106,138,80,.08) 0%,transparent 60%);pointer-events:none;}
.logo-wrap{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(90,74,58,.15));}
.logo-title{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:var(--brown-dark);letter-spacing:.15em;line-height:1;}
.logo-sub{font-size:12px;color:var(--brown-light);letter-spacing:.3em;margin-top:8px;}
.btn-start{display:block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;letter-spacing:.2em;padding:22px 80px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(58,42,26,.25);animation:fadeUp .8s .2s ease both;position:relative;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(58,42,26,.32);}
.btn-start:hover::after{background:rgba(255,255,255,.06);}
.btn-start:active{transform:translateY(0);}
.start-sub-btns{display:flex;gap:24px;margin-top:36px;animation:fadeUp .8s .4s ease both;}
.btn-sub{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);font-size:12px;letter-spacing:.15em;padding:10px 24px;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-sub:hover{border-color:var(--brown-light);color:var(--brown);background:rgba(90,74,58,.05);}

/* ── ② ゲーム画面 ── */
#screen-game{justify-content:center;align-items:center;padding:0;position:relative;background:var(--cream);}
#game-container{display:flex;justify-content:center;align-items:center;}
#game-container canvas{display:block;}

/* ゲーム下部バー */
#game-bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  display:none;
  background:rgba(245,240,232,.96);
  border-top:1px solid rgba(90,74,58,.12);
  backdrop-filter:blur(8px);
  z-index:50;
  padding:10px 24px;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
#game-bottom-bar.active{display:flex;}
.hint-text{font-size:10px;color:var(--brown-light);letter-spacing:.08em;line-height:1.7;flex:1;}
.game-btns{display:flex;gap:10px;flex-shrink:0;}
.btn-game{
  background:none;
  border:1px solid rgba(90,74,58,.25);
  color:var(--brown-light);
  font-family:'Noto Serif JP',serif;
  font-size:11px;
  letter-spacing:.12em;
  padding:8px 18px;
  border-radius:3px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.btn-game:hover{border-color:var(--brown);color:var(--brown);background:rgba(90,74,58,.05);}

/* 完成ボタン */
#btn-complete-overlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;pointer-events:auto;}
#btn-complete-overlay.visible{display:block;}
#btn-complete-overlay button{
  background:rgba(58,42,26,.92);color:#f5f0e8;
  font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:.2em;
  padding:20px 56px;border:2px solid rgba(200,160,96,.6);border-radius:6px;
  cursor:pointer;animation:gentlePulse 2s ease-in-out infinite;backdrop-filter:blur(4px);
}
#btn-complete-overlay button:hover{background:rgba(58,42,26,1);animation:none;transform:scale(1.04);transition:transform .15s;}

/* ── ③ ルーレット ── */
#screen-roulette{background:var(--cream);}
.roulette-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--brown-dark);letter-spacing:.15em;margin-bottom:32px;text-align:center;}
.roulette-item{width:340px;background:#fff;border:1px solid rgba(90,74,58,.15);border-radius:8px;padding:20px 28px;margin-bottom:16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.roulette-item.locked{cursor:default;border-color:var(--accent);background:linear-gradient(135deg,#fffbf5,#fff8ec);}
.roulette-item-label{font-size:11px;letter-spacing:.2em;color:var(--brown-light);margin-bottom:6px;}
.roulette-item-value{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:var(--brown-dark);transition:all .1s;}
.roulette-item-value.spinning{animation:spin .08s linear infinite;color:var(--brown-light);}
.roulette-item .tap-hint{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--brown-light);opacity:.6;}
.roulette-item.locked .tap-hint{display:none;}
.roulette-item.locked::after{content:'✓ 確定';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--accent);letter-spacing:.1em;}
.roulette-item:not(.locked):hover{border-color:var(--brown-light);transform:translateX(4px);}
.btn-roulette-next{margin-top:24px;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:.2em;padding:16px 56px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;}
.btn-roulette-next.visible{opacity:1;pointer-events:auto;}
.btn-roulette-next:hover{transform:translateY(-2px);}

/* ── ④ 結果 ── */
#screen-result{background:var(--cream);}
.result-wrap{text-align:center;max-width:400px;width:100%;}
.result-title{font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.3em;color:var(--brown-light);margin-bottom:24px;}
.result-property-card{background:#fff;border:1px solid rgba(90,74,58,.12);border-radius:12px;padding:28px 32px;margin-bottom:28px;box-shadow:0 4px 20px rgba(90,74,58,.08);}
.result-property-name{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--brown-light);letter-spacing:.2em;margin-bottom:4px;}
.result-stats{display:flex;justify-content:center;gap:24px;margin-top:16px;}
.result-stat{text-align:center;}
.result-stat-label{font-size:10px;color:var(--brown-light);letter-spacing:.15em;margin-bottom:4px;}
.result-stat-value{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--brown-dark);}
.result-stat-unit{font-size:11px;color:var(--brown-light);margin-left:2px;}
.result-divider{border:none;border-top:1px solid rgba(90,74,58,.1);margin:24px 0;}
.result-title-section{margin-bottom:28px;}
.result-title-label{font-size:11px;letter-spacing:.25em;color:var(--brown-light);margin-bottom:12px;}
.result-title-badge{display:inline-block;background:var(--brown-dark);color:#f5f0e8;font-family:'Noto Serif JP',serif;font-size:18px;letter-spacing:.15em;padding:10px 32px;border-radius:4px;}
.result-title-badge.new::before{content:'NEW！ ';font-size:11px;color:var(--accent-light);vertical-align:middle;}
.result-comment{font-size:13px;color:var(--brown);line-height:1.8;margin-bottom:24px;min-height:44px;}
.result-btns{display:flex;gap:16px;justify-content:center;margin-top:8px;}
.btn-result{flex:1;max-width:160px;padding:14px 0;border-radius:4px;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.15em;cursor:pointer;transition:all .2s;border:none;}
.btn-result.primary{background:var(--brown-dark);color:#f5f0e8;}
.btn-result.secondary{background:none;border:1px solid rgba(90,74,58,.3);color:var(--brown-light);}
.btn-result:hover{transform:translateY(-2px);}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--cream);border-radius:12px;padding:32px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--brown-dark);margin-bottom:20px;letter-spacing:.1em;}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;margin-top:-4px;}
.modal-empty{font-size:13px;color:var(--brown-light);text-align:center;padding:24px 0;line-height:2;}

/* ── 間取り背景 ── */
.madori-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .6s ease;}
.madori-bg.visible{opacity:1;}
.madori-bg canvas{max-width:80vw;max-height:80vh;opacity:.10;filter:blur(1px) sepia(.3);border-radius:8px;}
#screen-roulette,#screen-result{position:relative;z-index:1;}

/* ── アニメーション ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
@keyframes gentlePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,160,96,0);}50%{opacity:.75;box-shadow:0 0 20px 6px rgba(200,160,96,.25);}}
.pop-in{animation:popIn .4s ease both;}
</style>
</head>
<body>

<!-- ① スタート -->
<div id="screen-start" class="screen active">
  <div class="logo-wrap">
    <span class="logo-icon">🏠</span>
    <div class="logo-title">間取りすと</div>
    <div class="logo-sub">MADORI-ST</div>
  </div>
  <button class="btn-start" onclick="gotoGame()">は じ め る</button>
  <div class="start-sub-btns">
    <button class="btn-sub" onclick="openModal('saves')">間取り保存一覧</button>
    <button class="btn-sub" onclick="openModal('titles')">称号一覧</button>
  </div>
</div>

<!-- ② ゲーム -->
<div id="screen-game" class="screen">
  <div id="game-container"></div>
  <div id="btn-complete-overlay">
    <button onclick="onCompleteBtn()">完　成</button>
  </div>
</div>

<!-- ゲーム下部バー -->
<div id="game-bottom-bar" style="display:none;">
  <div class="hint-text">
    矢印キー 移動（長押し加速）　／　Space・Enter 配置　／　X 右回転　／　Z 左回転　／　Ctrl+Z 戻す　／　C・Shift ホールド
  </div>
  <div class="game-btns">
    <button class="btn-game" onclick="gotoGame()">リ ト ラ イ</button>
    <button class="btn-game" onclick="gotoStart()">ス タ ー ト へ</button>
  </div>
</div>

<!-- 間取り背景 -->
<div class="madori-bg" id="madori-bg"></div>

<!-- ③ ルーレット -->
<div id="screen-roulette" class="screen">
  <div class="roulette-title">物件情報を引いてみよう</div>
  <div class="roulette-item" id="rou-0" onclick="lockRoulette(0)">
    <div class="roulette-item-label">築 年 数</div>
    <div class="roulette-item-value" id="rou-val-0">---</div>
    <span class="tap-hint">タップで確定</span>
  </div>
  <div class="roulette-item" id="rou-1" onclick="lockRoulette(1)">
    <div class="roulette-item-label">駅 徒 歩</div>
    <div class="roulette-item-value" id="rou-val-1">---</div>
    <span class="tap-hint">タップで確定</span>
  </div>
  <div class="roulette-item" id="rou-2" onclick="lockRoulette(2)">
    <div class="roulette-item-label">家 賃</div>
    <div class="roulette-item-value" id="rou-val-2">---</div>
    <span class="tap-hint">タップで確定</span>
  </div>
  <button class="btn-roulette-next" id="btn-rou-next" onclick="gotoResult()">称号を見る →</button>
</div>

<!-- ④ 結果 -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="result-title">間 取 り 結 果</div>
    <div class="result-property-card pop-in">
      <div class="result-property-name" id="res-room-label">---</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-label">築年数</div>
          <div class="result-stat-value" id="res-age">--<span class="result-stat-unit">年</span></div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">駅徒歩</div>
          <div class="result-stat-value" id="res-walk">--<span class="result-stat-unit">分</span></div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">家賃</div>
          <div class="result-stat-value" id="res-rent">--<span class="result-stat-unit">万円</span></div>
        </div>
      </div>
    </div>
    <hr class="result-divider">
    <div class="result-title-section">
      <div class="result-title-label">獲 得 称 号</div>
      <div class="result-title-badge new pop-in" id="res-title-badge">---</div>
    </div>
    <div class="result-comment" id="res-comment"></div>
    <div class="result-btns">
      <button class="btn-result primary" onclick="gotoGame()">も う 一 度</button>
      <button class="btn-result secondary" onclick="gotoStart()">戻 る</button>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────
// 画面管理
// ────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar=document.getElementById('game-bottom-bar');
  if(bar){
    if(id==='screen-game'){
      bar.style.display='flex';
    }else{
      bar.style.display='none';
    }
  }
}

let madoriSnapshot=null;
function captureMadoriSnapshot(){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas)return;
  const clone=document.createElement('canvas');
  clone.width=canvas.width; clone.height=canvas.height;
  clone.getContext('2d').drawImage(canvas,0,0);
  madoriSnapshot=clone;
}
function showMadoriBg(visible){
  const bg=document.getElementById('madori-bg');
  if(visible&&madoriSnapshot){
    bg.innerHTML='';
    const c=document.createElement('canvas');
    c.width=madoriSnapshot.width; c.height=madoriSnapshot.height;
    c.getContext('2d').drawImage(madoriSnapshot,0,0);
    bg.appendChild(c);
    requestAnimationFrame(()=>bg.classList.add('visible'));
  }else{
    bg.classList.remove('visible');
    setTimeout(()=>{bg.innerHTML='';},600);
  }
}

let gameStarted=false;
let gameScene=null;

function gotoStart(){
  showMadoriBg(false);
  showScreen('screen-start');
}
function gotoGame(){
  showMadoriBg(false);
  showScreen('screen-game');
  document.getElementById('btn-complete-overlay').classList.remove('visible');
  if(!gameStarted){
    gameStarted=true;
    setTimeout(()=>startPhaserGame(),50);
  }else if(gameScene){
    gameScene.scene.restart();
  }
}
function onCompleteBtn(){
  if(!gameScene)return;
  // ★バグ③修正: スナップショットを先に取り、収納描画はルーレット画面遷移後
  captureMadoriSnapshot();
  showMadoriBg(true);
  showScreen('screen-roulette');
  startRoulette();
  // 背景用スナップショットは遷移後に収納を描画してから再取得（任意）
}
function gotoResult(){
  showMadoriBg(true);
  showScreen('screen-result');
  showResult();
}

// ────────────────────────────────────────
// モーダル
// ────────────────────────────────────────
function openModal(type){
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  if(type==='saves'){
    title.textContent='間取り保存一覧';
    body.innerHTML='<div class="modal-empty">保存された間取りはありません。<br>ゲームプレイ後に保存できます。</div>';
  }else{
    const titles=JSON.parse(localStorage.getItem('madori-titles')||'[]');
    title.textContent='称号一覧';
    body.innerHTML=titles.length===0
      ?'<div class="modal-empty">まだ称号がありません。<br>プレイして称号を獲得しよう！</div>'
      :titles.map(t=>`<div style="padding:10px 0;border-bottom:1px solid rgba(90,74,58,.1);font-family:'Noto Serif JP',serif;color:var(--brown-dark)">${t}</div>`).join('');
  }
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('active');
}

// ────────────────────────────────────────
// ルーレット
// ────────────────────────────────────────
const ROULETTE_POOLS={
  age:[0,1,2,3,4,5,10,15,20,25,30,35,40,45,50],
  walk:[1,2,3,4,5,7,10,12,15,20,30,40,50],
  rent:[4,5,6,7,8,9,10,12,15,18,20,25,30,35,40,50,75,100]
};
const rouletteKeys=['age','walk','rent'];
const rouletteLocked=[false,false,false];
const rouletteValues=[null,null,null];
const rouletteUnits=['年','分','万円'];
let rouletteIntervals=[null,null,null];
let lockedCount=0;
function startRoulette(){
  lockedCount=0;
  for(let i=0;i<3;i++){
    rouletteLocked[i]=false; rouletteValues[i]=null;
    document.getElementById('rou-'+i).classList.remove('locked');
    document.getElementById('rou-val-'+i).classList.add('spinning');
  }
  document.getElementById('btn-rou-next').classList.remove('visible');
  for(let i=0;i<3;i++){
    if(rouletteIntervals[i])clearInterval(rouletteIntervals[i]);
    (idx=>{
      rouletteIntervals[idx]=setInterval(()=>{
        const pool=ROULETTE_POOLS[rouletteKeys[idx]];
        document.getElementById('rou-val-'+idx).textContent=pool[Math.floor(Math.random()*pool.length)]+rouletteUnits[idx];
      },80);
    })(i);
  }
}
function lockRoulette(idx){
  if(rouletteLocked[idx])return;
  for(let i=0;i<idx;i++)if(!rouletteLocked[i])return;
  clearInterval(rouletteIntervals[idx]);
  const pool=ROULETTE_POOLS[rouletteKeys[idx]];
  const val=pool[Math.floor(Math.random()*pool.length)];
  rouletteValues[idx]=val;
  rouletteLocked[idx]=true;
  document.getElementById('rou-val-'+idx).textContent=val+rouletteUnits[idx];
  document.getElementById('rou-val-'+idx).classList.remove('spinning');
  document.getElementById('rou-'+idx).classList.add('locked');
  if(++lockedCount===3) document.getElementById('btn-rou-next').classList.add('visible');
}

// ────────────────────────────────────────
// 称号・結果
// ────────────────────────────────────────
function generateTitle(age,walk,rent,roomTypes){
  const has=t=>roomTypes.has(t);
  if(age<=5&&walk<=5&&rent<=8) return{title:'掘り出し物件の達人',comment:'新しくて駅近で安い！そんな夢の物件を作り上げました。',isNew:true};
  if(age>=40) return{title:'レトロ愛好家',comment:'年季の入った物件に味わいを感じる。そんな間取りすとです。',isNew:true};
  if(walk<=3) return{title:'駅前派',comment:'徒歩3分以内！毎日の通勤が楽になりそうです。',isNew:true};
  if(walk>=30) return{title:'静寂の探求者',comment:'駅から離れた場所でこそ感じられる、静かな暮らしがあります。',isNew:true};
  if(rent>=50) return{title:'高級志向',comment:'良いものには相応の対価を。上質な暮らしを追求した間取りです。',isNew:true};
  if(rent<=6&&walk<=10) return{title:'コスパ王',comment:'リーズナブルな家賃で駅近を確保。生活力の高い間取りすとです。',isNew:true};
  if(has('washitsu')&&has('youshitsu')) return{title:'和洋折衷の使い手',comment:'和室と洋室を組み合わせた、センス溢れる間取りです。',isNew:true};
  if(has('wic')) return{title:'収納マニア',comment:'WICを完備！整理整頓が行き届いた暮らしが目に浮かびます。',isNew:true};
  if(has('balcony')) return{title:'採光重視派',comment:'バルコニーで光と風を取り込む。気持ちの良い間取りです。',isNew:true};
  if(!has('bath')&&!has('toilet')) return{title:'謎の間取りすと',comment:'お風呂もトイレもない…？独自の美学を持つ間取りすとです。',isNew:true};
  return{title:'間取りすと見習い',comment:'はじめての一歩！経験を積んで素敵な間取りを目指そう。',isNew:false};
}
function countRoomLabel(roomTypes,counts){
  const r=(counts['youshitsu']||0)+(counts['washitsu']||0);
  const ldk=(counts['kitchen']||0)>0?'LDK':'K';
  return r===0?ldk:`${r}${ldk}`;
}
function showResult(){
  const age=rouletteValues[0]??'--';
  const walk=rouletteValues[1]??'--';
  const rent=rouletteValues[2]??'--';
  document.getElementById('res-age').innerHTML=age+'<span class="result-stat-unit">年</span>';
  document.getElementById('res-walk').innerHTML=walk+'<span class="result-stat-unit">分</span>';
  document.getElementById('res-rent').innerHTML=rent+'<span class="result-stat-unit">万円</span>';
  const roomTypes=new Set(), counts={};
  if(gameScene&&gameScene.grid){
    gameScene.grid.forEach(row=>row.forEach(cell=>{
      if(cell&&!cell.fixed){roomTypes.add(cell.type);counts[cell.type]=(counts[cell.type]||0)+1;}
    }));
  }
  document.getElementById('res-room-label').textContent=countRoomLabel(roomTypes,counts);
  const {title,comment,isNew}=generateTitle(age,walk,rent,roomTypes);
  const badge=document.getElementById('res-title-badge');
  badge.textContent=title;
  badge.className='result-title-badge pop-in'+(isNew?' new':'');
  document.getElementById('res-comment').textContent=comment;
  const saved=JSON.parse(localStorage.getItem('madori-titles')||'[]');
  if(!saved.includes(title)){saved.unshift(title);localStorage.setItem('madori-titles',JSON.stringify(saved));}
}

function svgToCanvas(dataUrl){
  return new Promise(resolve=>{
    const b64=dataUrl.split(',')[1];
    const bin=atob(b64), bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      cv.width=img.naturalWidth||80; cv.height=img.naturalHeight||80;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url); resolve(cv);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

const CS=40,COLS=9,ROWS=10,UI_R=180;
const CANVAS_W=COLS*CS+UI_R, CANVAS_H=ROWS*CS;
const GENKAN_COLOR=0xD4A870;

class PuzzleGame extends Phaser.Scene{
  constructor(){super('PuzzleGame');}
  sx(c){return c*CS;} sy(r){return r*CS;}

  create(){
    gameScene=this;
    this._storageGfx=null;
    this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    // pid -> オブジェクトのMapで管理（restart時も必ずリセット）
    this.boardImgs={};
    this.boardLabels={};
    this.partCount=0;
    this.undoStack=[];
    this.currentDef=null; this.rotation=0;
    this.curC=Math.floor(COLS/2); this.curR=0;
    this.holdDef=null; this.holdUsed=false;
    this.queue=[];
    for(let i=0;i<4;i++)this.queue.push(this.pickRandom());
    this.bgGfx=this.add.graphics().setDepth(0);
    this.gridGfx=this.add.graphics().setDepth(1);
    this.previewGfx=this.add.graphics().setDepth(4);
    this.previewImg=null;
    this.drawBg();
    // テクスチャをロードしてから玄関・ゲーム開始
    const entries=Object.entries(SVG_TEX);
    Promise.all(entries.map(([k,v])=>svgToCanvas(v).then(cv=>{
      if(cv&&!this.textures.exists(k))this.textures.addCanvas(k,cv);
    }))).then(()=>{
      this.placeGenkan(); // ★テクスチャロード後に呼ぶ
      this.drawBoard();
      this.nextPiece();
      this.drawUI();
    });
    this.setupKeys();
  }

  setupKeys(){
    const K=Phaser.Input.Keyboard.KeyCodes;
    this.xKey    =this.input.keyboard.addKey(K.X);
    this.zKey    =this.input.keyboard.addKey(K.Z);
    this.ctrlKey =this.input.keyboard.addKey(K.CTRL);
    this.cKey    =this.input.keyboard.addKey(K.C);
    this.shiftKey=this.input.keyboard.addKey(K.SHIFT);
    this.leftKey =this.input.keyboard.addKey(K.LEFT);
    this.rightKey=this.input.keyboard.addKey(K.RIGHT);
    this.downKey =this.input.keyboard.addKey(K.DOWN);
    this.upKey   =this.input.keyboard.addKey(K.UP);
    this.spaceKey=this.input.keyboard.addKey(K.SPACE);
    this.enterKey=this.input.keyboard.addKey(K.ENTER);
    this.xKey.on('down',()=>this.rotatePiece(1));
    this.zKey.on('down',()=>{ if(this.ctrlKey.isDown)this.doUndo(); else this.rotatePiece(-1); });
    this.cKey.on('down',()=>this.doHold());
    this.shiftKey.on('down',()=>this.doHold());
    this.spaceKey.on('down',()=>this.placeAtCursor());
    this.enterKey.on('down',()=>this.placeAtCursor());
    this._moveRepeat={timer:null,delay:200,interval:80};
    const startRepeat=(dc,dr)=>{
      this.moveCursor(dc,dr);
      const rep=this._moveRepeat; clearTimeout(rep.timer);
      rep.timer=setTimeout(()=>{rep.timer=setInterval(()=>this.moveCursor(dc,dr),rep.interval);},rep.delay);
    };
    const stopRepeat=()=>{
      const rep=this._moveRepeat; clearTimeout(rep.timer); clearInterval(rep.timer); rep.timer=null;
    };
    this.leftKey.on('down',()=>startRepeat(-1,0)); this.rightKey.on('down',()=>startRepeat(1,0));
    this.downKey.on('down',()=>startRepeat(0,1));  this.upKey.on('down',()=>startRepeat(0,-1));
    this.leftKey.on('up',stopRepeat); this.rightKey.on('up',stopRepeat);
    this.downKey.on('up',stopRepeat); this.upKey.on('up',stopRepeat);
  }

  pickRandom(){return PARTS_DEF[Math.floor(Math.random()*PARTS_DEF.length)];}
  getShape(def,rot){
    let s=[];
    for(let r=0;r<def.h;r++){s.push([]);for(let c=0;c<def.w;c++)s[r].push(1);}
    for(let i=0;i<(rot%4);i++){
      const nr=[],rows=s.length,cols=s[0].length;
      for(let c=0;c<cols;c++){nr.push([]);for(let r=rows-1;r>=0;r--)nr[c].push(s[r][c]);}
      s=nr;
    }
    return s;
  }

  nextPiece(){
    this.currentDef=this.queue.shift(); this.queue.push(this.pickRandom());
    this.rotation=0; this.holdUsed=false;
    const shape=this.getShape(this.currentDef,0);
    this.curC=Math.floor((COLS-shape[0].length)/2); this.curR=0;
    this.drawUI(); this.updatePreview(this.curC,this.curR); this.checkNoPlace();
  }
  rotatePiece(dir=1){
    if(!this.currentDef)return;
    this.rotation=(this.rotation+dir+4)%4;
    this.updatePreview(this.curC,this.curR); this.drawUI();
  }
  doHold(){
    if(!this.currentDef)return;
    if(this.holdDef){[this.holdDef,this.currentDef]=[this.currentDef,this.holdDef];}
    else{this.holdDef=this.currentDef;this.currentDef=this.queue.shift();this.queue.push(this.pickRandom());}
    this.rotation=0; this.holdUsed=false;
    this.updatePreview(this.curC,this.curR); this.drawUI();
    // checkNoPlace()はキー離し後のnextPiece()から呼ばれるので、ここでは呼ばない
  }
  doUndo(){
    if(this.undoStack.length===0)return;
    const state=this.undoStack.pop();
    this.grid=state.grid;
    this.currentDef=state.currentDef; this.rotation=state.rotation;
    this.queue=state.queue.slice(); this.holdDef=state.holdDef;
    this.holdUsed=state.holdUsed; this.partCount=state.partCount;
    // 全ビジュアルを破棄して再構築
    this._destroyAllBoardVisuals();
    this.rebuildBoardVisuals();
    this.drawBoard(); this.drawUI();
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.updatePreview(this.curC,this.curR);
    document.getElementById('btn-complete-overlay').classList.remove('visible');
    this.checkNoPlace();
  }

  // ★ ビジュアル全破棄（boardImgs + boardLabels を Map として管理）
  _destroyAllBoardVisuals(){
    Object.values(this.boardImgs).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardImgs={};
    Object.values(this.boardLabels).forEach(o=>{if(o&&o.destroy)o.destroy();});
    this.boardLabels={};
  }

  // ★ ビジュアル再構築（グリッドを走査、pid単位で1度だけ生成）
  rebuildBoardVisuals(){
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell=this.grid[r][c];
        if(!cell||drawn.has(cell.pid))continue;
        drawn.add(cell.pid);
        this._createCellVisual(cell);
      }
    }
  }

  // ★ 1セル分のビジュアル生成（img + label を boardImgs/boardLabels[pid] に登録）
  _createCellVisual(cell){
    // 既に生成済みなら何もしない（重複防止）
    if(this.boardImgs.hasOwnProperty(cell.pid)) return;
    const px=this.sx(cell.mnC), py=this.sy(cell.mnR);
    const pw=(cell.mxC-cell.mnC+1)*CS, ph=(cell.mxR-cell.mnR+1)*CS;
    const pid=cell.pid;
    // 画像
    if(cell.fixed){
      const img=this.add.image(px+pw/2,py+ph/2,'genkan')
        .setDisplaySize(pw-2,ph-2).setDepth(2);
      this.boardImgs[pid]=img;
    }else if(cell.type==='washitsu'){
      const g=this.add.graphics().setDepth(2);
      this.drawWashitsuOnGraphics(g,px,py,pw,ph);
      this.boardImgs[pid]=g;
    }else if(this.textures.exists(cell.type)){
      const rot=(cell.rotation||0)%4;
      const dw=rot%2===0?pw:ph, dh=rot%2===0?ph:pw;
      const img=this.add.image(px+pw/2,py+ph/2,cell.type)
        .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setDepth(2);
      this.boardImgs[pid]=img;
    }else{
      const g=this.add.graphics().setDepth(2);
      g.fillStyle(cell.color,1); g.fillRect(px+1,py+1,pw-2,ph-2);
      this.boardImgs[pid]=g;
    }
    // ラベル（pid単位で1つだけ）
    const labelText=cell.fixed?'玄関':(cell.label||'');
    const lbl=this.add.text(px+pw/2,py+ph/2,labelText,{
      fontSize:cell.fixed?'12px':'11px',
      fill:cell.fixed?'#5a3010':'#3a3028',
      align:'center',fontFamily:'Meiryo',
      stroke:'#ffffffaa',strokeThickness:2
    }).setOrigin(0.5,0.5).setDepth(5);
    this.boardLabels[pid]=lbl;
  }

  placeGenkan(){
    const gx=Phaser.Math.Between(1,COLS-3);
    const pid='genkan';
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)
      this.grid[ROWS-2+dr][gx+dc]={color:GENKAN_COLOR,fixed:true,pid,
        mnR:ROWS-2,mxR:ROWS-1,mnC:gx,mxC:gx+1,label:'玄関',rotation:0};
    this._createCellVisual(this.grid[ROWS-2][gx]);
  }

  checkNoPlace(){
    if(this.cKey&&this.cKey.isDown)return;
    if(this.shiftKey&&this.shiftKey.isDown)return;
    const candidates=[];
    if(this.currentDef)candidates.push(this.currentDef);
    if(this.holdDef)candidates.push(this.holdDef);
    if(candidates.length===0)return;
    const allBlocked=candidates.every(def=>{
      for(let rot=0;rot<4;rot++){
        const shape=this.getShape(def,rot);
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.canPlace(shape,c,r))return false;
      }
      return true;
    });
    if(allBlocked) document.getElementById('btn-complete-overlay').classList.add('visible');
  }
  canPlace(shape,c,r){
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++){
        if(!shape[dr][dc])continue;
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||this.grid[nr][nc])return false;
      }
    return true;
  }
  placePiece(def,shape,c,r){
    this.undoStack.push({
      grid:this.grid.map(row=>row.map(cell=>cell?{...cell}:null)),
      currentDef:def,rotation:this.rotation,queue:this.queue.slice(),
      holdDef:this.holdDef,holdUsed:this.holdUsed,partCount:this.partCount
    });
    if(this.undoStack.length>30)this.undoStack.shift();
    const pid='p'+(++this.partCount);
    const color=def.color;
    for(let dr=0;dr<shape.length;dr++)
      for(let dc=0;dc<shape[0].length;dc++)
        if(shape[dr][dc])
          this.grid[r+dr][c+dc]={color,pid,type:def.type,rotation:this.rotation,
            mnR:r,mxR:r+shape.length-1,mnC:c,mxC:c+shape[0].length-1,label:def.label};
    this._createCellVisual(this.grid[r][c]);
    this.drawBoard();
    this.nextPiece();
  }

  drawBg(){
    const g=this.bgGfx; g.clear();
    g.fillStyle(0xf8f4ee,1); g.fillRect(0,0,COLS*CS,ROWS*CS);
    g.lineStyle(1,0xd8cfc4,1);
    for(let r=0;r<=ROWS;r++)g.lineBetween(0,this.sy(r),COLS*CS,this.sy(r));
    for(let c=0;c<=COLS;c++)g.lineBetween(this.sx(c),0,this.sx(c),ROWS*CS);
    g.lineStyle(3,0x8a7060,1); g.strokeRect(0,0,COLS*CS,ROWS*CS);
    g.fillStyle(0xeae4dc,1); g.fillRect(COLS*CS,0,UI_R,CANVAS_H);
  }
  drawBoard(){
    const g=this.gridGfx; g.clear();
    const drawn=new Set();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=this.grid[r][c];
      if(!cell||drawn.has(cell.pid))continue;
      drawn.add(cell.pid);
      const px=this.sx(cell.mnC),py=this.sy(cell.mnR);
      const pw=(cell.mxC-cell.mnC+1)*CS,ph=(cell.mxR-cell.mnR+1)*CS;
      if(!this.boardImgs.hasOwnProperty(cell.pid)){g.fillStyle(cell.color,1);g.fillRect(px+1,py+1,pw-2,ph-2);}
      g.lineStyle(2,0x705840,1); g.strokeRect(px+1,py+1,pw-2,ph-2);
    }
  }

  drawUI(){
    if(this._uiObjs){this._uiObjs.forEach(o=>o&&o.destroy());}
    this._uiObjs=[];
    const add=o=>{this._uiObjs.push(o);return o;};
    const RX=COLS*CS, RCX=RX+UI_R/2;
    let y=14;

    // NEXT
    add(this.add.text(RCX,y,'NEXT',{fontSize:'10px',fill:'#9a8878',letterSpacing:4,fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    y+=18;
    for(let i=0;i<Math.min(2,this.queue.length);i++){
      const def=this.queue[i];
      const shape=this.getShape(def,0);
      const sh=shape.length,sw=shape[0].length;
      const cellSz=Math.min(Math.floor((UI_R-24)/sw),Math.floor(64/sh));
      const pw=sw*cellSz,ph=sh*cellSz;
      const ox=RCX-pw/2,oy=y;
      const alpha=i===0?1:0.45;
      const g=this.add.graphics().setDepth(10); add(g);
      if(def.type==='washitsu'){this.drawWashitsuOnGraphics(g,ox,oy,pw,ph);g.setAlpha(alpha);}
      else if(this.textures.exists(def.type)){add(this.add.image(ox+pw/2,oy+ph/2,def.type).setDisplaySize(pw-2,ph-2).setAlpha(alpha).setDepth(10));}
      else{g.fillStyle(def.color,alpha);g.fillRect(ox,oy,pw,ph);}
      g.lineStyle(1,0x908070,alpha);g.strokeRect(ox,oy,pw,ph);
      add(this.add.text(RCX,oy+ph+3,def.name,{fontSize:'9px',fill:i===0?'#6a5a4a':'#a09080',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
      y+=ph+16;
    }
    // 区切り
    y+=4;
    const gd=this.add.graphics().setDepth(10);add(gd);gd.lineStyle(1,0xb8a898,.5);gd.lineBetween(RX+12,y,RX+UI_R-12,y);y+=10;
    // HOLD
    add(this.add.text(RCX,y,'HOLD',{fontSize:'10px',fill:'#9a8878',letterSpacing:4,fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    y+=18;
    if(this.holdDef){
      const shape=this.getShape(this.holdDef,0);
      const sh=shape.length,sw=shape[0].length;
      const cellSz=Math.min(Math.floor((UI_R-24)/sw),Math.floor(60/sh));
      const pw=sw*cellSz,ph=sh*cellSz;
      const ox=RCX-pw/2,oy=y;
      const g=this.add.graphics().setDepth(10);add(g);
      if(this.holdDef.type==='washitsu'){this.drawWashitsuOnGraphics(g,ox,oy,pw,ph);}
      else if(this.textures.exists(this.holdDef.type)){add(this.add.image(ox+pw/2,oy+ph/2,this.holdDef.type).setDisplaySize(pw-2,ph-2).setDepth(10));}
      else{g.fillStyle(this.holdDef.color,1);g.fillRect(ox,oy,pw,ph);}
      g.lineStyle(2,0x706050,1);g.strokeRect(ox,oy,pw,ph);
      y+=ph+4;
    }else{
      const g=this.add.graphics().setDepth(10);add(g);g.lineStyle(1,0xb8a898,.5);g.strokeRect(RCX-34,y,68,52);
      add(this.add.text(RCX,y+26,'なし',{fontSize:'10px',fill:'#c0b0a0',fontFamily:'Meiryo'}).setOrigin(0.5,0.5).setDepth(10));
      y+=56;
    }
    // 区切り
    y+=8;
    const gd2=this.add.graphics().setDepth(10);add(gd2);gd2.lineStyle(1,0xb8a898,.5);gd2.lineBetween(RX+12,y,RX+UI_R-12,y);y+=12;
    // 配置数
    add(this.add.text(RCX,y,'配置数',{fontSize:'10px',fill:'#9a8878',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));y+=16;
    add(this.add.text(RCX,y,String(this.partCount),{fontSize:'26px',fill:'#5a4e42',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));y+=36;
    if(this.undoStack.length>0){
      add(this.add.text(RCX,y,'Ctrl+Z / 戻す',{fontSize:'9px',fill:'#8a6840',fontFamily:'Meiryo'}).setOrigin(0.5,0).setDepth(10));
    }
  }

  moveCursor(dc,dr){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    this.curC=Phaser.Math.Clamp(this.curC+dc,0,COLS-shape[0].length);
    this.curR=Phaser.Math.Clamp(this.curR+dr,0,ROWS-shape.length);
    this.updatePreview(this.curC,this.curR);
  }
  placeAtCursor(){
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    if(!this.canPlace(shape,this.curC,this.curR))return;
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    this.placePiece(this.currentDef,shape,this.curC,this.curR);
  }
  stopPreviewTween(){
    if(this._previewTween){this._previewTween.stop();this._previewTween=null;}
  }
  updatePreview(c,r){
    this.stopPreviewTween();
    if(this.previewImg){this.previewImg.destroy();this.previewImg=null;}
    this.previewGfx.clear();
    if(!this.currentDef)return;
    const shape=this.getShape(this.currentDef,this.rotation);
    const ok=this.canPlace(shape,c,r);
    const g=this.previewGfx;
    for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++){
      if(!shape[dr][dc])continue;
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      g.fillStyle(ok?0x88cc88:0xcc4444,.3);
      g.fillRect(this.sx(nc)+1,this.sy(nr)+1,CS-2,CS-2);
    }
    if(ok){
      const pw=shape[0].length*CS,ph=shape.length*CS;
      const px=this.sx(c),py=this.sy(r);
      let target=null;
      if(this.currentDef.type==='washitsu'){
        const g2=this.add.graphics().setDepth(4);
        this.drawWashitsuOnGraphics(g2,px,py,pw,ph);g2.setAlpha(0.75);target=g2;
      }else if(this.textures.exists(this.currentDef.type)){
        const rot=this.rotation%4,dw=rot%2===0?pw:ph,dh=rot%2===0?ph:pw;
        target=this.add.image(px+pw/2,py+ph/2,this.currentDef.type)
          .setDisplaySize(dw-2,dh-2).setAngle(rot*90).setAlpha(.75).setDepth(4);
      }
      if(target){
        this.previewImg=target;
        this._previewTween=this.tweens.add({targets:target,alpha:{from:.75,to:.35},duration:600,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      }
    }
  }

  fillEmptyAsStorage(){
    if(this._storageGfx){this._storageGfx.destroy();}
    const g=this.add.graphics().setDepth(2);
    this._storageGfx=g;
    const storageColor=0xEEDCC8,storageStroke=0xA07848;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(this.grid[r][c])continue;
      const px=this.sx(c),py=this.sy(r);
      g.fillStyle(storageColor,.85);g.fillRect(px+1,py+1,CS-2,CS-2);
      g.lineStyle(.7,storageStroke,.35);
      for(let d=4;d<CS*2;d+=8){
        const x1=px+1+Math.max(0,d-CS+2),y1=py+1+Math.max(0,CS-2-d);
        const x2=px+1+Math.min(CS-2,d),y2=py+1+Math.min(CS-2,d);
        if(x1<px+CS-1&&y1<py+CS-1)g.lineBetween(x1,y1,x2,y2);
      }
    }
    let labelPlaced=false;
    for(let r=0;r<ROWS&&!labelPlaced;r++)for(let c=0;c<COLS&&!labelPlaced;c++){
      if(!this.grid[r][c]){
        this.add.text(this.sx(c)+CS/2,this.sy(r)+CS/2,'収納',
          {fontSize:'9px',fill:'#8a6840',fontFamily:'Meiryo',stroke:'#ffffffaa',strokeThickness:1.5})
          .setOrigin(.5,.5).setDepth(6).setAlpha(.7);
        labelPlaced=true;
      }
    }
  }

  drawWashitsuOnGraphics(g,px,py,pw,ph){
    g.fillStyle(0xeaf2da,1);g.fillRect(px,py,pw,ph);
    const cw2=pw/2,cw3=pw/3,ch=ph/4;
    this.drawTatami(g,px,py,cw2,ch,true);this.drawTatami(g,px+cw2,py,cw2,ch,true);
    this.drawTatami(g,px,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px+cw3,py+ch,cw3,ch,true);this.drawTatami(g,px+cw3,py+ch*2,cw3,ch,true);
    this.drawTatami(g,px+cw3*2,py+ch,cw3,ch*2,false);
    this.drawTatami(g,px,py+ch*3,cw2,ch,true);this.drawTatami(g,px+cw2,py+ch*3,cw2,ch,true);
    g.lineStyle(3,0x5a8040,1);g.strokeRect(px+1,py+1,pw-2,ph-2);
  }
  drawTatami(g,x,y,w,h,horizontal){
    if(w<=2||h<=2)return;
    const p=2;
    g.fillStyle(0xe0eeca,1);g.fillRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(1,0x7a9a55,1);g.strokeRect(x+p,y+p,w-p*2,h-p*2);
    g.lineStyle(.5,0x8aab6a,.55);
    if(horizontal){for(let ly=y+p+4;ly<y+h-p;ly+=4)g.lineBetween(x+p+2,ly,x+w-p-2,ly);}
    else{for(let lx=x+p+4;lx<x+w-p;lx+=4)g.lineBetween(lx,y+p+2,lx,y+h-p-2);}
  }
}

function startPhaserGame(){
  new Phaser.Game({
    type:Phaser.AUTO,width:CANVAS_W,height:CANVAS_H,
    backgroundColor:'#f0ece6',parent:'game-container',scene:PuzzleGame,
  });
}
